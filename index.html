<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biotech Scenario Screener</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b12;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;color:#c8cdd8}
:root{--mb:#991b1b;--bear:#ef4444;--base:#f59e0b;--bull:#22c55e;--pb:#a855f7;--bg1:#0d1019;--bg2:#131722;--bg3:#1a1f2e;--border:#ffffff12;--text1:#e2e4ea;--text2:#8890a0;--mono:'JetBrains Mono',monospace}
.wrap{max-width:1800px;margin:0 auto;padding:12px 20px 24px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.hdr h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr .bar{width:4px;height:36px;border-radius:99px;background:linear-gradient(180deg,#3b82f6,#8b5cf6);box-shadow:0 0 16px #3b82f644}
.sub{color:var(--text2);font-size:.95rem;margin-bottom:28px;margin-left:18px}
.sub a{color:#60a5fa;text-decoration:none}.sub a:hover{text-decoration:underline}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:22px;scroll-margin-top:180px}
.card-title{font-size:1.15rem;font-weight:700;color:var(--text1);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.card-title .dot{width:8px;height:22px;border-radius:99px}
.card-sub{font-size:.82rem;color:var(--text2);margin-bottom:18px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.stat{border-radius:10px;padding:14px;border:1px solid;text-align:center}
.stat .lbl{font-size:.72rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.stat .val{font-size:1.8rem;font-weight:800;font-family:var(--mono)}
.stat .desc{font-size:.65rem;color:var(--text2);margin-top:2px}
.stat.s-mb{background:linear-gradient(135deg,#991b1b18,#991b1b08);border-color:#991b1b44}.stat.s-mb .val{color:#f87171}
.stat.s-br{background:linear-gradient(135deg,#ef444418,#ef444408);border-color:#ef444444}.stat.s-br .val{color:#fca5a5}
.stat.s-bs{background:linear-gradient(135deg,#f59e0b18,#f59e0b08);border-color:#f59e0b44}.stat.s-bs .val{color:#fbbf24}
.stat.s-bl{background:linear-gradient(135deg,#22c55e18,#22c55e08);border-color:#22c55e44}.stat.s-bl .val{color:#86efac}
.stat.s-pb{background:linear-gradient(135deg,#a855f718,#a855f708);border-color:#a855f744}.stat.s-pb .val{color:#d8b4fe}
.ptf-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.ptf-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.78rem;font-family:var(--mono);cursor:pointer;transition:.15s;color:var(--text1)}
.ptf-tag:hover{border-color:#ef4444}.ptf-tag .x{color:#ef4444;font-weight:700;margin-left:4px}
.ptf-add{background:#3b82f622;border:1px dashed #3b82f644;border-radius:6px;padding:4px 12px;font-size:.78rem;color:#60a5fa;cursor:pointer;font-family:var(--mono)}
.ptf-add:hover{background:#3b82f633}
.ptf-results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ptf-res{border-radius:8px;padding:12px;text-align:center;border:1px solid}
.ptf-res .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.ptf-res .val{font-size:1.3rem;font-weight:800;font-family:var(--mono)}
.dd-wrap{position:relative;display:inline-block}
.dd-input{width:220px;padding:5px 10px;border-radius:6px;font-size:.8rem;font-family:var(--mono);background:var(--bg1);border:1px solid var(--border);color:var(--text1);outline:none}
.dd-input:focus{border-color:#3b82f6}
.dd-list{position:absolute;top:100%;left:0;width:320px;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;z-index:100;display:none}
.dd-list.open{display:block}
.dd-item{padding:6px 10px;cursor:pointer;font-size:.78rem;border-bottom:1px solid #ffffff04;display:flex;justify-content:space-between}
.dd-item:hover{background:#ffffff08}
.dd-item .t{font-family:var(--mono);font-weight:700;color:#60a5fa;margin-right:8px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;font-size:.8rem;border-collapse:collapse;white-space:nowrap}
thead{background:var(--bg1);border-bottom:2px solid #ffffff18}
th{padding:9px 10px;font-weight:600;text-align:left;color:var(--text2);cursor:pointer;transition:.15s;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:var(--text1);background:#ffffff06}
th.r,td.r{text-align:right}
td{padding:7px 10px}
tbody tr{border-bottom:1px solid #ffffff06;transition:.15s}
tbody tr:hover{background:#ffffff06}
.tk{color:#60a5fa;font-weight:700;font-family:var(--mono);cursor:pointer;text-decoration:none;font-size:.82rem}
.tk:hover{text-decoration:underline;color:#93c5fd}
.mono{font-family:var(--mono);font-weight:600}
.ptf-chk{width:14px;height:14px;accent-color:#a855f7;cursor:pointer}
.chart-box{background:var(--bg1);border-radius:10px;padding:16px;border:1px solid var(--border)}
.rs-wrap{background:var(--bg1);border-radius:10px;border:1px solid var(--border);padding:12px 0;overflow-x:auto}
.rs-legend{display:flex;gap:16px;padding:0 16px 12px;font-size:.72rem;font-weight:600;color:var(--text2);flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:8px}
.rs-legend .li{display:flex;align-items:center;gap:5px}.rs-legend .bx{width:10px;height:10px;border-radius:50%}
.rs-row{display:flex;align-items:center;padding:3px 0;transition:.15s}.rs-row:hover{background:#ffffff06}
.rs-tk{width:54px;text-align:right;padding-right:6px;font-family:var(--mono);font-weight:700;font-size:.75rem;color:#60a5fa;flex-shrink:0;cursor:pointer;text-decoration:none}
.rs-tk:hover{color:#93c5fd;text-decoration:underline}
.rs-rr{width:42px;text-align:right;padding-right:8px;font-family:var(--mono);font-weight:700;font-size:.68rem;flex-shrink:0}
.rs-track{flex:1;height:24px;position:relative;margin-right:12px}
.rs-line{position:absolute;top:50%;height:2px;transform:translateY(-50%);border-radius:1px}
.rs-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);border:1.5px solid var(--bg1);z-index:2;cursor:default}
.rs-dot:hover{width:13px;height:13px;z-index:3}
.rs-dot .tip{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:.68rem;font-family:var(--mono);white-space:nowrap;z-index:10;color:var(--text1);pointer-events:none}
.rs-dot:hover .tip{display:block}
.rs-zero{position:absolute;top:0;bottom:0;width:1px;background:#ffffff30;z-index:1}
.rs-zero-lbl{position:absolute;top:-14px;left:-6px;font-size:.6rem;color:var(--text2);font-family:var(--mono)}
.rs-axis{display:flex;align-items:center;margin-top:4px;border-top:1px solid var(--border);padding-top:6px}
.rs-axis-track{flex:1;position:relative;height:14px;margin-right:12px}
.rs-axis-lbl{position:absolute;top:0;transform:translateX(-50%);font-size:.6rem;color:var(--text2);font-family:var(--mono)}
.loading{text-align:center;padding:60px;color:var(--text2);font-size:.9rem}
.topbar{position:sticky;top:0;z-index:200;background:#080b12ee;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-weight:800;font-size:1rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.topbar-dd{position:relative;flex:1;max-width:400px}
.topbar-input{width:100%;padding:7px 12px;border-radius:7px;font-size:.82rem;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);color:var(--text1);outline:none}
.topbar-input:focus{border-color:#3b82f6}
.topbar-list{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;z-index:300;display:none}
.topbar-list.open{display:block}
.topbar-item{padding:8px 12px;cursor:pointer;font-size:.8rem;border-bottom:1px solid #ffffff04;display:flex;justify-content:space-between;align-items:center}
.topbar-item:hover{background:#ffffff08}
.topbar-item .t{font-family:var(--mono);font-weight:700;color:#60a5fa;margin-right:8px}
.topbar-item .n{color:var(--text2);font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-count{font-size:.75rem;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.topbar-nav{display:flex;gap:2px;margin-left:auto}
.topbar-nav button{background:transparent;border:1px solid transparent;border-radius:5px;padding:4px 10px;font-size:.68rem;font-family:var(--mono);color:var(--text2);cursor:pointer;white-space:nowrap;transition:.15s}
.topbar-nav button:hover{background:#ffffff08;color:var(--text1)}
.topbar-nav button.active{background:#3b82f622;border-color:#3b82f644;color:#60a5fa}
.sticky-filters{position:sticky;top:46px;z-index:190;background:#080b12ee;backdrop-filter:blur(12px);padding:6px 20px 0;border-bottom:1px solid var(--border);display:none}
.sticky-filters .fbar{margin-bottom:6px;padding:6px 10px}
.sticky-filters .fl2-row{margin-bottom:6px;padding:2px 10px 4px}
.sticky-filters .stats{margin-bottom:6px}
@media(max-width:1000px){.stats,.ptf-results{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats,.ptf-results{grid-template-columns:1fr}}
.fbar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.fbar-lbl{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-right:4px;font-weight:600}
.fchip{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:.15s;white-space:nowrap}
.fchip:hover{border-color:#60a5fa;color:var(--text1)}
.fchip.active{background:#3b82f622;border-color:#3b82f6;color:#93c5fd}
.fchip .cnt{font-size:.6rem;opacity:.6;margin-left:3px}
.fchip-rare{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid #f59e0b44;background:#f59e0b08;color:#f59e0b;transition:.15s}
.fchip-rare:hover{border-color:#f59e0b;color:#fbbf24;background:#f59e0b18}
.fchip-rare.active{background:#f59e0b22;border-color:#f59e0b;color:#fbbf24}
.fsep{width:1px;height:20px;background:var(--border);margin:0 4px}
.fsel{padding:4px 8px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);outline:none;font-family:var(--mono)}
.fsel:focus{border-color:#3b82f6}
.fl2-row{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 8px;margin-bottom:12px}
.fl2chip{padding:3px 8px;border-radius:5px;font-size:.67rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg1);color:var(--text2);transition:.15s}
.fl2chip:hover{border-color:#a855f7;color:var(--text1)}
.fl2chip.active{background:#a855f722;border-color:#a855f7;color:#d8b4fe}
.fl2chip .cnt{font-size:.58rem;opacity:.5;margin-left:2px}
.purity-badge{display:inline-block;font-size:.62rem;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:#a855f722;color:#c084fc;margin-left:5px;font-weight:700;border:1px solid #a855f733}
</style>
</head>
<body>
<div id="topbar" class="topbar" style="display:none">
  <span class="topbar-title">Biotech Screener</span>
  <div class="topbar-dd">
    <input class="topbar-input" id="topSearch" placeholder="Search company → open model..." onfocus="document.getElementById('topList').classList.add('open')" onblur="setTimeout(()=>document.getElementById('topList').classList.remove('open'),200)" oninput="window._topFilter(this.value)"/>
    <div class="topbar-list" id="topList"></div>
  </div>
  <span class="topbar-count" id="topCount"></span>
  <nav class="topbar-nav" id="topNav">
    <button onclick="document.getElementById('sec-range').scrollIntoView({behavior:'smooth',block:'start'})" data-sec="sec-range">Range</button>
    <button onclick="document.getElementById('sec-pipeline').scrollIntoView({behavior:'smooth',block:'start'})" data-sec="sec-pipeline">Pipeline</button>
    <button onclick="document.getElementById('sec-catalyst').scrollIntoView({behavior:'smooth',block:'start'})" data-sec="sec-catalyst">Catalysts</button>
    <button onclick="document.getElementById('sec-portfolio').scrollIntoView({behavior:'smooth',block:'start'})" data-sec="sec-portfolio">Portfolio</button>
    <button onclick="document.getElementById('sec-table').scrollIntoView({behavior:'smooth',block:'start'})" data-sec="sec-table">Table</button>
  </nav>
</div>
<div id="stickyFilters" class="sticky-filters"></div>
<div class="wrap">
<div id="app"><div class="loading">Loading configs&hellip;</div></div>
</div>
<script>
const CCY={EUR:"\u20AC",USD:"$",HKD:"HK$",SEK:"kr",JPY:"\u00A5",GBP:"\u00A3",CHF:"CHF "};
const ccySym=c=>CCY[c]||"$";
const ccyDec=c=>(c==="JPY"||c==="HKD"||c==="SEK")?0:2;
const FX_TO_USD={USD:1,EUR:1.08,GBP:1.27,CHF:1.12,JPY:0.0067,HKD:0.128,SEK:0.095}; // approximate rates
const toUSD=(val,ccy)=>val*(FX_TO_USD[ccy]||1);
const SK=["mega_bear","bear","base","bull","psychedelic_bull"];
const SN={mega_bear:"Mega Bear",bear:"Bear",base:"Base",bull:"Bull",psychedelic_bull:"Psych Bull"};
const SC={mega_bear:"#991b1b",bear:"#ef4444",base:"#f59e0b",bull:"#22c55e",psychedelic_bull:"#a855f7"};
const SS={mega_bear:"s-mb",bear:"s-br",base:"s-bs",bull:"s-bl",psychedelic_bull:"s-pb"};
const L1_NAMES={oncology:"Oncology",cns:"CNS",immunology:"Immunology",cardio_metabolic:"Cardio-Metabolic",dermatology:"Derm",ophthalmology:"Ophtho",infectious_disease:"Infectious",musculoskeletal:"MSK",endocrine:"Endocrine",respiratory:"Respiratory",hematology:"Hematology"};
const L1_ORDER=["oncology","cns","immunology","cardio_metabolic","dermatology","respiratory","ophthalmology","infectious_disease","musculoskeletal","endocrine","hematology"];
const PHASE_NAMES={commercial:"Commercial",nda_filed:"NDA Filed",phase3:"Phase 3",phase2:"Phase 2",phase1:"Phase 1"};
const PHASE_ORDER=["commercial","nda_filed","phase3","phase2","phase1"];

function deriveCompanyMeta(cfg){
  const areas=new Set(),modalities=new Set(),areaTAM={},areaWTD={};
  let totalTAM=0,rareTAM=0,totalWTD=0,rareWTD=0;
  const baseAssump=cfg.scenarios?.base?.assumptions||{};
  for(const asset of cfg.assets){
    if(asset.modality){modalities.add(asset.modality);const p=asset.modality.split(".");modalities.add(p[0]);if(p[1])modalities.add(p[0]+"."+p[1]);}
    for(const ind of asset.indications){
      if(ind.area){
        areas.add(ind.area);
        const p=ind.area.split(".");areas.add(p[0]);if(p[1])areas.add(p[0]+"."+p[1]);
        const tam=ind.market?.tamB||(ind.market?.patientsK&&ind.market?.pricingK?ind.market.patientsK*ind.market.pricingK/1000:0);
        const a=baseAssump[asset.id]?.[ind.id]||{};
        const pos=(a.pos??100)/100,apr=(a.apr??100)/100;
        const wtd=tam*pos*apr;
        areaTAM[ind.area]=(areaTAM[ind.area]||0)+tam;
        areaWTD[ind.area]=(areaWTD[ind.area]||0)+wtd;
        if(p[1]){areaTAM[p[0]+"."+p[1]]=(areaTAM[p[0]+"."+p[1]]||0)+tam;areaWTD[p[0]+"."+p[1]]=(areaWTD[p[0]+"."+p[1]]||0)+wtd;}
        areaTAM[p[0]]=(areaTAM[p[0]]||0)+tam;areaWTD[p[0]]=(areaWTD[p[0]]||0)+wtd;
        totalTAM+=tam;totalWTD+=wtd;
        if(ind.rare){rareTAM+=tam;rareWTD+=wtd;}
      }
    }
  }
  const mkFocus=(tamMap,total)=>total>0?Object.entries(tamMap).filter(([k])=>k.split(".").length>=2).map(([area,t])=>({area,purity:Math.round(t/total*100)})).sort((a,b)=>b.purity-a.purity):[];
  // Optionality = total TAM leverage (raw / risk-adjusted - 1)
  const optionality=totalWTD>0?Math.round((totalTAM/totalWTD-1)*100):0;
  return{areas:[...areas],modalities:[...modalities],
    focus:mkFocus(areaTAM,totalTAM),focusWtd:mkFocus(areaWTD,totalWTD),
    phase:cfg.company.phase||"phase1",
    rare:cfg.assets.some(a=>a.indications.some(i=>i.rare)),
    rarePurity:totalTAM>0?Math.round(rareTAM/totalTAM*100):0,
    rarePurityWtd:totalWTD>0?Math.round(rareWTD/totalWTD*100):0,
    optionality,totalTAM,totalWTD};
}

function computeScenario(cfg,scenKey,state){
  const co=cfg.company,scen=state.scenarios[scenKey],val=scen.val;
  const isSOTP=val.pipelineDR!=null;
  let pipeRA=0,pipeGross=0,commRev=0,totalRA=0,totalGross=0,lymeC=0;
  for(const asset of cfg.assets){for(const ind of asset.indications){
    const a=scen.assumptions?.[asset.id]?.[ind.id]||{pos:0,apr:0,pen:1};
    const m=ind.market;const isComm=asset.id==="commercial";
    if(isComm&&isSOTP){commRev=val.commercialRevM||0;continue;}
    let pk=0;
    if(m.patientsK)pk=m.patientsK*m.pricingK*(m.penPct/100)*a.pen;
    else if(m.tamB){const tam=m.tamB*(1+(m.expansionPct||0)/100);pk=tam*(m.penPct/100)*a.pen*1000;}
    const comp=(a.pos/100)*(a.apr/100),ra=pk*comp;
    if(isSOTP){pipeRA+=ra;pipeGross+=pk;}
    totalRA+=ra;totalGross+=pk;
    if(asset.id==="vla15")lymeC=comp;
  }}
  const dM=1-(val.dil||0)/100;let ev;
  if(isSOTP){
    const cEV=commRev*(val.commercialMult||2.5);
    const yr=(2031)-2026,df=Math.pow(1+(val.pipelineDR||14)/100,yr);
    const pEV=(pipeRA*(val.pipelineMult||4))/df;
    const mEV=(val.milestones||0)*lymeC;
    ev=cEV+pEV+mEV+(state.cash||0);
  }else{
    const can=val.cannib?totalRA*(val.cannib/100):0,net=totalRA-can;
    const yr=2033-2026,df=Math.pow(1+val.dr/100,yr);
    const pa=totalGross>0?(val.plat+val.exus)*(net/totalGross):0;
    ev=(net*val.mult+pa)/df+(state.cash||0);
  }
  return{tp:(ev/co.sharesOut)*dM,ev};
}
function computeAll(cfg){
  const st={scenarios:JSON.parse(JSON.stringify(cfg.scenarios)),cash:cfg.company.cash,markets:{}};
  for(const a of cfg.assets)for(const i of a.indications)st.markets[a.id+"_"+i.id]=i.market;
  const sks=Object.keys(st.scenarios),res={};
  sks.forEach(s=>{res[s]=computeScenario(cfg,s,st);});
  const wts=sks.map(s=>st.scenarios[s].wt),tW=wts.reduce((a,b)=>a+b,0);
  const nw=wts.map(w=>w/tW);
  const wTP=sks.reduce((s,k,i)=>s+res[k].tp*nw[i],0);
  return{results:res,weightedTP:wTP};
}
// Compute weighted TP with overridden PoS/Apr for a specific asset.indication
// Flat override: force asset.indication to specific pos/apr across ALL scenarios
function computeTPOverride(cfg,assetId,indId,pos,apr){
  const mod=JSON.parse(JSON.stringify(cfg));
  for(const sk in mod.scenarios){
    const a=mod.scenarios[sk].assumptions;
    if(!a[assetId])a[assetId]={};
    if(!a[assetId][indId])a[assetId][indId]={pos:0,apr:0,pen:1};
    a[assetId][indId].pos=pos;
    a[assetId][indId].apr=apr;
  }
  return computeAll(mod).weightedTP;
}
// Compute weighted TP with floor/ceiling PoS override + custom scenario weights
// mode='floor': MAX(current, override) — for success (lift pessimists, keep optimists)
// mode='ceil':  MIN(current, override) — for fail (lower optimists, keep pessimists)
function computeTPShifted(cfg,assetId,indId,pos,apr,weights,mode){
  const mod=JSON.parse(JSON.stringify(cfg));
  const sks=Object.keys(mod.scenarios);
  for(const sk of sks){
    const a=mod.scenarios[sk].assumptions;
    if(!a[assetId])a[assetId]={};
    if(!a[assetId][indId])a[assetId][indId]={pos:0,apr:0,pen:1};
    const cur=a[assetId][indId];
    if(mode==='floor'){
      cur.pos=Math.max(cur.pos,pos);
      cur.apr=Math.max(cur.apr,apr);
    }else{
      cur.pos=Math.min(cur.pos,pos);
      cur.apr=Math.min(cur.apr,apr);
    }
    mod.scenarios[sk].wt=weights[sk];
  }
  return computeAll(mod).weightedTP;
}
// Compute catalyst impact as % change in model TP (not vs stock price)
function computeCatalysts(cfg,currentPrice){
  if(!cfg.catalysts||!cfg.catalysts.length)return[];
  const baseA=cfg.scenarios?.base?.assumptions||{};
  const {results:baseResults,weightedTP:baseWTP}=computeAll(cfg);
  const today=new Date();
  const SKS=Object.keys(cfg.scenarios);
  const sorted=SKS.slice().sort((a,b)=>baseResults[a].tp-baseResults[b].tp);
  const optimism={};
  const mid=(sorted.length-1)/2;
  sorted.forEach((sk,i)=>{optimism[sk]=i;});
  const origWts={};SKS.forEach(sk=>{origWts[sk]=cfg.scenarios[sk].wt;});

  return cfg.catalysts.map(cat=>{
    // Materiality — what fraction of weighted TP comes from this asset?
    const zeroTP=computeTPOverride(cfg,cat.asset,cat.indication,0,0);
    const m=baseWTP>0?Math.min(1,Math.max(0,(baseWTP-zeroTP)/baseWTP)):0;

    // Shift scenario weights proportional to materiality
    function shiftWeights(direction){
      const raw={};
      SKS.forEach(sk=>{
        const shift=direction==='success'?(optimism[sk]-mid):(mid-optimism[sk]);
        raw[sk]=Math.max(0.001,origWts[sk]*(1+m*shift));
      });
      const total=Object.values(raw).reduce((s,v)=>s+v,0);
      SKS.forEach(sk=>{raw[sk]=raw[sk]/total*100;});
      return raw;
    }

    // Compute TPs with shifted weights + floor/ceiling PoS override
    const successWts=shiftWeights('success');
    const failWts=shiftWeights('fail');
    const successTP=computeTPShifted(cfg,cat.asset,cat.indication,cat.success_pos,cat.success_apr,successWts,'floor');
    const failTP=computeTPShifted(cfg,cat.asset,cat.indication,cat.fail_pos,cat.fail_apr,failWts,'ceil');

    // NEW: Moves as % change in model TP (not vs stock price)
    const successMove=baseWTP>0?Math.round((successTP-baseWTP)/baseWTP*100):0;
    const failMove=baseWTP>0?Math.max(-100,Math.round((failTP-baseWTP)/baseWTP*100)):0;
    const swingPct=successMove-failMove;

    // Your PoS by catalyst type
    const ba=baseA[cat.asset]?.[cat.indication]||{};
    const CLINICAL_TYPES=new Set(['phase1_data','phase2_data','phase3_data','phase3_start','phase2_start']);
    const REGULATORY_TYPES=new Set(['pdufa','ema_approval','label_expansion']);
    const yourPoS=CLINICAL_TYPES.has(cat.type)?Math.round(ba.pos||0)
      :REGULATORY_TYPES.has(cat.type)?Math.round(ba.apr||0)
      :Math.round((ba.pos||0)/100*(ba.apr||0)/100*100);

    // Expected return
    const expectedReturn=Math.round(yourPoS/100*successMove+(1-yourPoS/100)*failMove);
    const catDate=new Date(cat.dateSort);
    const daysOut=Math.max(0,Math.round((catDate-today)/(1000*60*60*24)));
    return{...cat,failTP,successTP,baseTP:baseWTP,swingPct,successMove,failMove,
      yourPoS,expectedReturn,daysOut,materiality:Math.round(m*100)};
  }).sort((a,b)=>a.daysOut-b.daysOut);
}

function buildRangeStrip(rows,activeArea,filterRare,sortMode,purityMode){
  // Helper: compute purity for a row given active filters and mode
  function getPurity(r){
    const foc=purityMode==='wtd'?r.meta.focusWtd:r.meta.focus;
    const rp=purityMode==='wtd'?r.meta.rarePurityWtd:r.meta.rarePurity;
    if(activeArea&&foc){
      const depth=activeArea.split(".").length;
      if(depth===1)return foc.filter(f=>f.area.startsWith(activeArea+".")&&f.area.split(".").length===2).reduce((s,f)=>s+f.purity,0);
      const m=foc.find(f=>f.area===activeArea);return m?m.purity:0;
    }
    if(filterRare===true)return rp||0;
    return 0;
  }
  // Compute per-row metrics for sorting
  const enriched=rows.map(r=>{
    const baseUp=r.tps.base?((r.tps.base-r.price)/r.price*100):0;
    // R/R
    const bullUp=r.tps.bull!=null&&r.tps.bull>r.price?((r.tps.bull-r.price)/r.price*100):0;
    let bearDn=r.tps.bear!=null&&r.tps.bear<r.price?((r.price-r.tps.bear)/r.price*100):0;
    if(bearDn<1&&r.tps.mega_bear!=null&&r.tps.mega_bear<r.price)bearDn=((r.price-r.tps.mega_bear)/r.price*100);
    const rr=bearDn>1?(bullUp/bearDn):(bullUp>0?999:0);
    // Purity
    let purity=getPurity(r);
    return{...r,baseUp,rr,purity,optionality:r.meta.optionality||0};
  });

  // Sort
  if(sortMode==='rr') enriched.sort((a,b)=>b.rr-a.rr);
  else if(sortMode==='purity') enriched.sort((a,b)=>b.purity-a.purity||b.baseUp-a.baseUp);
  else if(sortMode==='optionality') enriched.sort((a,b)=>b.optionality-a.optionality||b.baseUp-a.baseUp);
  else enriched.sort((a,b)=>b.baseUp-a.baseUp);

  const sorted=enriched;
  // Compute upside for each stock × scenario: (TP - Price) / Price
  // Positive = TP above price (upside), Negative = TP below price (downside)
  const data=sorted.map(r=>{
    const vals={};
    SK.forEach(sk=>{vals[sk]=r.tps[sk]?((r.tps[sk]-r.price)/r.price*100):null;});
    return{ticker:r.ticker,name:r.name,vals,price:r.price,ccy:r.ccy,dec:r.dec,meta:r.meta,purity:r.purity};
  });
  // Scale: -100 to +500, cap outliers
  const LO=-100,HI=500;
  const pct=v=>{const clamped=Math.max(LO,Math.min(HI,v));return((clamped-LO)/(HI-LO))*100;};
  const zeroPct=pct(0);

  let h='<div class="rs-wrap">';
  // Legend
  h+='<div class="rs-legend">';
  SK.forEach(sk=>{h+=`<div class="li"><div class="bx" style="background:${SC[sk]}"></div>${SN[sk]}</div>`;});
  h+='<div class="li" style="margin-left:auto;color:#ffffff40">R/R = bull up \u00f7 worst down \u00b7 \u25C0 Downside | Upside \u25B6</div>';
  h+='</div>';
  // Rows
  data.forEach(d=>{
    const allVals=SK.map(sk=>d.vals[sk]).filter(v=>v!=null);
    if(!allVals.length)return;
    const minV=Math.min(...allVals),maxV=Math.max(...allVals);
    // Risk/Reward: bull upside / bear downside (absolute values)
    const bullUp=d.vals.bull!=null&&d.vals.bull>0?d.vals.bull:0;
    // Use bear downside, fall back to mega_bear downside if bear has no downside
    let bearDn=d.vals.bear!=null&&d.vals.bear<0?Math.abs(d.vals.bear):0;
    if(bearDn<1&&d.vals.mega_bear!=null&&d.vals.mega_bear<0)bearDn=Math.abs(d.vals.mega_bear);
    const rr=bearDn>1?(bullUp/bearDn):null;
    let rrCol,rrTxt;
    if(rr==null){rrCol='#86efac';rrTxt=bullUp>0?'\u221E':'—';}
    else if(rr<0.01){rrCol='#ef4444';rrTxt='\u26A0 0x';}
    else if(rr<0.3){rrCol='#ef4444';rrTxt=rr.toFixed(2)+'x';}
    else if(rr<1){rrCol='#fb923c';rrTxt=rr.toFixed(1)+'x';}
    else if(rr<2){rrCol='#fbbf24';rrTxt=rr.toFixed(1)+'x';}
    else if(rr<10){rrCol='#86efac';rrTxt=rr.toFixed(1)+'x';}
    else{rrCol='#86efac';rrTxt=rr.toFixed(0)+'x';}
    h+=`<div class="rs-row">`;
    h+=`<a class="rs-tk" href="model.html?ticker=${d.ticker}">${d.ticker}</a>`;
    // Purity when area filter active
    // Purity badge
    const pVal=d.purity||0;
    const pCol2=filterRare===true?'#fbbf24':'#c084fc';
    if(pVal>0)h+=`<span style="width:28px;text-align:right;padding-right:2px;font-family:var(--mono);font-weight:700;font-size:.58rem;color:${pCol2};flex-shrink:0">${Math.min(pVal,100)}%</span>`;
    else h+=`<span style="width:28px;flex-shrink:0"></span>`;
    h+=`<span class="rs-rr" style="color:${rrCol}" title="R/R: bull up ${bullUp.toFixed(0)}% \u00f7 ${d.vals.bear!=null&&d.vals.bear<-1?'bear':'mega bear'} down ${bearDn.toFixed(0)}%">${rrTxt}</span>`;
    h+=`<div class="rs-track">`;
    // Zero line
    h+=`<div class="rs-zero" style="left:${zeroPct}%"><div class="rs-zero-lbl"></div></div>`;
    // Connecting line from leftmost to rightmost dot
    const leftPct=pct(Math.max(LO,minV)),rightPct=pct(Math.min(HI,maxV));
    h+=`<div class="rs-line" style="left:${leftPct}%;width:${rightPct-leftPct}%;background:linear-gradient(90deg,${SC.mega_bear}44,${SC.psychedelic_bull}44)"></div>`;
    // Dots — draw in reverse order so mega_bear (rightmost usually) is on top
    SK.forEach(sk=>{
      const v=d.vals[sk];if(v==null)return;
      const x=pct(v);
      const capped=v>HI||v<LO;
      const label=(v>=0?'+':'')+v.toFixed(0)+'%';
      h+=`<div class="rs-dot" style="left:${x}%;background:${SC[sk]}" title="${SN[sk]}: ${label}">`;
      h+=`<div class="tip"><span style="color:${SC[sk]}">${SN[sk]}</span> ${label}${capped?' \u26A0':''}</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  // Axis labels
  h+='<div class="rs-axis"><div style="width:124px;flex-shrink:0"></div><div class="rs-axis-track">';
  [-100,-50,0,50,100,200,300,400,500].forEach(v=>{
    h+=`<div class="rs-axis-lbl" style="left:${pct(v)}%;${v===0?'color:#e2e4ea;font-weight:700':''}">${v>=0?'+':''}${v}%</div>`;
  });
  h+='</div></div>';
  h+='</div></div>';
  return h;
}

const CORS_PROXIES=[
  url=>"https://corsproxy.io/?"+encodeURIComponent(url),
  url=>"https://api.allorigins.win/raw?url="+encodeURIComponent(url),
];
async function fetchLivePrice(yahooTicker){
  if(!yahooTicker)return null;
  const url="https://query1.finance.yahoo.com/v8/finance/chart/"+yahooTicker+"?interval=1d&range=1d";
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(5000)});
      if(!res.ok)continue;
      const data=await res.json();
      const meta=data?.chart?.result?.[0]?.meta;
      if(meta?.regularMarketPrice)return{price:meta.regularMarketPrice,prevClose:meta.chartPreviousClose||meta.previousClose};
    }catch{}
  }
  return null;
}

  let stripSort="base";

  let catSortKey="expectedReturn"; // column key to sort catalyst table by

  function render(){

    function applyFiltersExcept(src, skipArea, skipMod, skipPhase, skipRare, skipBucket){
      let f=src;
      if(!skipArea){
        if(filterL1) f=f.filter(r=>r.meta.areas.some(a=>a===filterL1||a.startsWith(filterL1+".")));

        if(filterMod2) f=f.filter(r=>r.meta.modalities.some(m=>m===filterMod2||m.startsWith(filterMod2+".")));

      if(!skipPhase&&filterPhase) f=f.filter(r=>r.meta.phase===filterPhase);
      if(!skipRare&&filterRare!==null) f=f.filter(r=>r.meta.rare===filterRare);
      if(!skipBucket&&activeFilter) f=f.filter(r=>bucketOf(r)===activeFilter);
      return f;
    }
    const forArea=applyFiltersExcept(rows,true,false,false,false,false);
    const forMod=applyFiltersExcept(rows,false,true,false,false,false);
    const forPhase=applyFiltersExcept(rows,false,false,true,false,false);
    const forRare=applyFiltersExcept(rows,false,false,false,true,false);
    function countAreas(src){
      const c1={},c2={},c3={};let rc=0;

        const s1=new Set(),s2=new Set(),s3=new Set();
        r.meta.areas.forEach(a=>{const p=a.split(".");
          if(p.length===1&&!s1.has(a)){c1[a]=(c1[a]||0)+1;s1.add(a);}
          if(p.length===2){const k=p[0]+"."+p[1];if(!s2.has(k)){c2[k]=(c2[k]||0)+1;s2.add(k);}}
          if(p.length===3&&!s3.has(a)){c3[a]=(c3[a]||0)+1;s3.add(a);}});
        if(r.meta.rare)rc++;
      });
      return{c1,c2,c3,rc};
    }
    function countMods(src){
      const c1={},c2={},c3={};
      src.forEach(r=>{
        const s1=new Set(),s2=new Set(),s3=new Set();
        r.meta.modalities.forEach(m=>{const p=m.split(".");
          if(p.length===1&&!s1.has(m)){c1[m]=(c1[m]||0)+1;s1.add(m);}

          if(p.length===3&&!s3.has(m)){c3[m]=(c3[m]||0)+1;s3.add(m);}});
      });

    }
    const {c1:l1Counts,c2:l2Counts,c3:l3Counts,rc:rareCount}=countAreas(forArea);

    const m1Counts=countMods(forMod);

    forMod.forEach(r=>{
      const s2=new Set(),s3=new Set();
      r.meta.modalities.forEach(m=>{const p=m.split(".");
        if(p.length===2){const k=p[0]+"."+p[1];if(!s2.has(k)){m2Counts[k]=(m2Counts[k]||0)+1;s2.add(k);}}
        if(p.length===3&&!s3.has(m)){m3Counts[m]=(m3Counts[m]||0)+1;s3.add(m);}});
    });
    // Rare count from forRare (all filters except rare)
    const rareCountCross=forRare.filter(r=>r.meta.rare).length;

    // Apply all filters
    let filtered=rows;
    if(filterL1) filtered=filtered.filter(r=>r.meta.areas.some(a=>a===filterL1||a.startsWith(filterL1+".")));
    if(filterL2) filtered=filtered.filter(r=>r.meta.areas.some(a=>a===filterL2||a.startsWith(filterL2+".")));

    if(filterMod2) filtered=filtered.filter(r=>r.meta.modalities.some(m=>m===filterMod2||m.startsWith(filterMod2+".")));
    if(filterMod3) filtered=filtered.filter(r=>r.meta.modalities.some(m=>m===filterMod3));

      }
      // Timeline X positions with collision nudging for same-day catalysts
      const catPos=allCats.map(c=>({c,x:Math.min(Math.max(c.daysOut/maxDays*100,1),98)}));
      catPos.sort((a,b)=>a.x-b.x);
      const MIN_GAP=3.5;
      for(let pass=0;pass<8;pass++){
        let moved=false;
        for(let i=1;i<catPos.length;i++){
          if(catPos[i].x-catPos[i-1].x<MIN_GAP){
            const shift=(MIN_GAP-(catPos[i].x-catPos[i-1].x))/2;
            catPos[i-1].x-=shift;
            catPos[i].x+=shift;
            moved=true;
          }
        }
        if(!moved)break;
      }
      catPos.forEach(p=>{p.x=Math.max(1,Math.min(98,p.x));});

      // Materiality → radius (bottom E[R] dot size)
      function matRadius(mat){
        const m=Math.max(0,Math.min(100,mat||0));
        return Math.max(3,3+Math.sqrt(m)*1.4); // 3px at 0%, ~17px at 100%
      }
      function matOpacity(mat){
        if(mat<5)return 0.32;
        if(mat<20)return 0.60;
        if(mat<50)return 0.85;
        return 1.0;
      }

      // === Label placement: greedy anti-collision in chart-% space ===
      // Tracks occupied rectangles and tries candidate Y positions in order of
      // preference (above top dot first, then below bottom dot, alternating by
      // parity for variety). Falls back to first candidate if every slot is
      // taken. Leader line is drawn at render time when label is displaced > 5%.
      const labelPositions=new Array(catPos.length);
      const placedRects=[];
      const LABEL_H_PCT=3.2;
      function estLabelWidth(c){
        const txt=c.ticker+(c.swingPct>BREAK?' '+c.swingPct+'%':'')+(c.options&&c.options.direction&&c.options.direction!=='neutral'?' \u25B2':'');
        return Math.max(4.0,txt.length*0.85);
      }
      function rectsOverlap(a,b){
        const pad=0.5;
        return !(a.x+a.w+pad<b.x||b.x+b.w+pad<a.x||a.y+a.h+pad<b.y||b.y+b.h+pad<a.y);
      }
      catPos.forEach((p,idx)=>{
        const c=p.c;
        const w=estLabelWidth(c);
        const ySwing=yPct(c.swingPct);
        const yER=yPct(c.expectedReturn);
        const topY=Math.max(ySwing,yER);
        const botY=Math.min(ySwing,yER);
        const rBot=matRadius(c.materiality||0);
        // Build candidate Y positions: alternate above/below starting from dot edge,
        // pushing outward. Parity on idx just adds variety to break ties.
        const cands=[];
        const startAbove=idx%2===0;
        for(let step=0;step<10;step++){
          const dy=3+step*LABEL_H_PCT;
          if(startAbove){
            cands.push({y:topY+dy,side:'top'});
            cands.push({y:botY-dy-rBot/3,side:'bot'});
          }else{
            cands.push({y:botY-dy-rBot/3,side:'bot'});
            cands.push({y:topY+dy,side:'top'});
          }
        }
        let chosen=null;
        for(const cand of cands){
          if(cand.y<2||cand.y>97)continue;
          const rect={x:p.x-w/2,y:cand.y-LABEL_H_PCT/2,w,h:LABEL_H_PCT};
          if(!placedRects.some(r=>rectsOverlap(rect,r))){
            placedRects.push(rect);
            chosen={...cand,displaced:Math.abs(cand.y-(cand.side==='top'?topY:botY))>6};
            break;
          }
        }
        if(!chosen){
          // Fallback — take first candidate, accept overlap
          chosen={...cands[0],displaced:true};
        }
        labelPositions[idx]=chosen;
      });

      catPos.forEach(({c,x},idx)=>{
        const ySwing=yPct(c.swingPct);
        const yER=yPct(c.expectedReturn);
        const er=c.expectedReturn;
        // Color tercile — simpler and cleaner
        const col=er>10?'#22c55e':er>-10?'#6b7080':'#ef4444';
        const op=matOpacity(c.materiality||0);
        const rBot=matRadius(c.materiality||0);
        const rTop=5; // top swing dot fixed small
        const optSwingTT=c.options&&c.options.impliedMove?(c.options.impliedMove*2)+'%':'n/a';
        const volEdgeTT=c.options&&c.options.impliedMove&&c.swingPct?(c.swingPct/(c.options.impliedMove*2)).toFixed(1)+'x':'n/a';
        // Barbell line
        const lineTop=Math.max(ySwing,yER);
        const lineBot=Math.min(ySwing,yER);
        const lineH=lineTop-lineBot;
        h+=`<div style="position:absolute;left:${x}%;bottom:${lineBot}%;width:1.5px;height:${lineH}%;background:${col};opacity:${op*0.35};transform:translateX(-50%);z-index:1" title="${c.ticker}: ${c.title}"></div>`;
        // Top dot — Swing
        h+=`<div style="position:absolute;left:${x}%;bottom:${ySwing}%;transform:translate(-50%,50%);width:${rTop}px;height:${rTop}px;border-radius:50%;background:${col};opacity:${op};border:1px solid ${col};cursor:pointer;z-index:3" title="${c.ticker}: ${c.title}\nDays: ${c.daysOut} | Swing: ${c.swingPct}% | Mkt: ${optSwingTT} | Vol Edge: ${volEdgeTT}\nE[R]: ${c.expectedReturn>0?'+':''}${c.expectedReturn}% | PoS: ${c.yourPoS}%\nIf win: ${c.successMove>0?'+':''}${c.successMove}% | If fail: ${c.failMove>0?'+':''}${c.failMove}%\nMateriality: ${c.materiality}%"></div>`;
        // Bottom dot — E[R] sized by materiality
        h+=`<div style="position:absolute;left:${x}%;bottom:${yER}%;transform:translate(-50%,50%);width:${rBot*2}px;height:${rBot*2}px;border-radius:50%;background:${col};opacity:${op*0.8};border:1.5px solid ${col};cursor:pointer;z-index:3" title="${c.ticker}: E[R]=${c.expectedReturn>0?'+':''}${c.expectedReturn}% | Materiality ${c.materiality}%"></div>`;
        // Ticker label — position computed by anti-collision pass
        const aboveBreak=c.swingPct>BREAK;
        const flowArrow=c.options&&c.options.direction?
          (c.options.direction==='bullish'?'<span style="color:#22c55e">\u25B2</span>':
           c.options.direction==='bearish'?'<span style="color:#ef4444">\u25BC</span>':''):'';
        const lp=labelPositions[idx];
        const labelOp=Math.max(0.55,op+0.1);
        const anchorY=lp.side==='top'?ySwing:yER;
        // Leader line — thin dashed connector when label is displaced from dot
        if(lp.displaced){
          const lLow=Math.min(lp.y,anchorY);
          const lHi=Math.max(lp.y,anchorY);
          h+=`<div style="position:absolute;left:${x}%;bottom:${lLow}%;width:1px;height:${lHi-lLow}%;background:${col};opacity:${op*0.25};transform:translateX(-50%);z-index:2;border-left:1px dashed ${col}"></div>`;
        }
        h+=`<div style="position:absolute;left:${x}%;bottom:${lp.y}%;transform:translateX(-50%);font-size:.5rem;font-family:var(--mono);color:${col};opacity:${labelOp};font-weight:700;white-space:nowrap;pointer-events:none;z-index:4">${c.ticker}${flowArrow}${aboveBreak?' '+c.swingPct+'%':''}</div>`;
        // Options implied swing — yellow dash
        if(c.options&&c.options.impliedMove){
          const optSwing=c.options.impliedMove*2;
          const yOpt=yPct(optSwing);
          h+=`<div style="position:absolute;left:${x}%;bottom:${yOpt}%;transform:translate(-50%,50%);width:14px;height:2px;background:#eab308;z-index:5;opacity:.9" title="Options implied swing: +-${c.options.impliedMove}% (${optSwing}% total)\nStraddle: $${c.options.straddleCost} at $${c.options.atmStrike}\nExpiry: ${c.options.expiryUsed} | Call IV: ${c.options.callIV}% | Put IV: ${c.options.putIV}%"></div>`;
        }
      });
      // Empty state
      if(allCats.length===0){
        h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text2);font-size:.75rem;font-family:var(--mono)">No catalysts in this window</div>';
      }
      h+='</div>';
      // Legend
      h+='<div style="display:flex;gap:14px;margin:22px 0 10px;font-size:.6rem;color:var(--text2);flex-wrap:wrap;align-items:center">';
      h+='<span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#6b7080;vertical-align:middle"></span>Swing (top)</span>';
      h+='<span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#6b7080;vertical-align:middle"></span>E[R] \u00b7 size = materiality</span>';
      h+='<span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:14px;height:2px;background:#eab308;vertical-align:middle"></span>Options implied</span>';
      h+='<span style="color:var(--text2)">\u2502</span>';
      h+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;vertical-align:middle;margin-right:3px"></span>E[R] &gt; +10%</span>';
      h+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b7080;vertical-align:middle;margin-right:3px"></span>flat</span>';
      h+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;vertical-align:middle;margin-right:3px"></span>E[R] &lt; -10%</span>';
      if(hiddenCount>0)h+=`<span style="margin-left:auto;color:#f59e0b;font-family:var(--mono)">${hiddenCount} outside window</span>`;
      h+='</div>';
      // Table
      h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.65rem;font-family:var(--mono)">';
      // Sortable header builder
      function catSortValue(c,key){
        switch(key){
          case 'ticker': return c.ticker||'';
          case 'title': return c.title||'';
          case 'mktSwing': return (c.options&&c.options.impliedMove)?c.options.impliedMove*2:-Infinity;
          case 'volEdge': {
            const o=(c.options&&c.options.impliedMove)?c.options.impliedMove*2:null;
            return o?c.swingPct/o:-Infinity;
          }
          case 'flow': {
            const d=c.options&&c.options.direction;
            return d==='bullish'?1:d==='bearish'?-1:-Infinity;
          }
          default: return (c[key]!=null&&!isNaN(c[key]))?c[key]:-Infinity;
        }
      }
      function th(label,key,align,extraStyle,tip){
        const active=catSortKey===key;
        const arrow=active?(catSortDir==='desc'?' \u25BE':' \u25B4'):'';
        const baseColor=active?'#60a5fa':'var(--text2)';
        const titleAttr=tip?` title="${tip}"`:'';
        return `<th style="text-align:${align};padding:6px 8px;cursor:pointer;user-select:none;color:${baseColor};${extraStyle||''}" onclick="window._setCatSort('${key}')"${titleAttr}>${label}${arrow}</th>`;
      }
      h+='<tr style="border-bottom:1px solid #ffffff12">';
      h+=th('Ticker','ticker','left','');
      h+=th('Catalyst','title','left','');
      h+=th('Days','daysOut','center','');
      h+=th('If Win','successMove','center','');
      h+=th('If Fail','failMove','center','');
      h+=th('Swing','swingPct','center','');
      h+=th('Mkt Swing','mktSwing','center','color:#eab308;');
      h+=th('E[R]','expectedReturn','center','');
      h+=th('Mat','materiality','center','','% of model value from this asset. High = catalyst IS the company.');
      h+=th('Your PoS','yourPoS','center','');
      h+=th('Vol Edge','volEdge','center','color:#eab308;min-width:60px;','Your Swing / Options Swing. >1.5x = options cheap vs your model. <0.7x = options expensive.');
      h+=th('Flow','flow','center','min-width:50px;','Options flow direction: Put/Call OI, volume, and 25-delta IV skew');
      h+='</tr>';
      // Apply sort
      const sortedCats=[...allCats].sort((a,b)=>{
        const va=catSortValue(a,catSortKey);
        const vb=catSortValue(b,catSortKey);
        if(typeof va==='string'||typeof vb==='string'){
          const sa=String(va),sb=String(vb);
          return catSortDir==='asc'?sa.localeCompare(sb):sb.localeCompare(sa);
        }
        return catSortDir==='asc'?va-vb:vb-va;
      });
      sortedCats.forEach(c=>{
        const erCol=c.expectedReturn>10?'#22c55e':c.expectedReturn>0?'#4ade80':c.expectedReturn>-10?'#6b7080':c.expectedReturn>-30?'#f97316':'#ef4444';
        const urgency=c.daysOut<30?'#ef4444':c.daysOut<90?'#f59e0b':'var(--text2)';
        const winCol=c.successMove>=0?'#22c55e':'#ef4444';
        const failCol=c.failMove>=0?'#22c55e':'#ef4444';
        h+=`<tr style="border-bottom:1px solid #ffffff06">`;
        h+=`<td style="padding:5px 8px;font-weight:700"><a href="model.html?ticker=${c.ticker}" style="color:#60a5fa;text-decoration:none">${c.ticker}</a></td>`;
        h+=`<td style="padding:5px 4px;color:var(--text2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>`;
        h+=`<td style="padding:5px 4px;text-align:center;color:${urgency};font-weight:700">${c.daysOut}d</td>`;
        h+=`<td style="padding:5px 4px;text-align:center;color:${winCol}">${c.successMove>0?'+':''}${c.successMove}%</td>`;
        h+=`<td style="padding:5px 4px;text-align:center;color:${failCol}">${c.failMove>0?'+':''}${c.failMove}%</td>`;
        h+=`<td style="padding:5px 4px;text-align:center">${c.swingPct}%</td>`;
        const optSwing=c.options&&c.options.impliedMove?c.options.impliedMove*2:null;
        const swingRatio=optSwing&&c.swingPct?c.swingPct/optSwing:null;
        const mktCol=!optSwing?'var(--text2)':swingRatio>1.5?'#f97316':swingRatio<0.7?'#60a5fa':'var(--text2)';
        h+=`<td style="padding:5px 4px;text-align:center;color:${mktCol}">${optSwing?optSwing+'%':'--'}</td>`;
        h+=`<td style="padding:5px 4px;text-align:center;font-weight:700;color:${erCol}">${c.expectedReturn>0?'+':''}${c.expectedReturn}%</td>`;
        const matCol=c.materiality>50?'#22c55e':c.materiality>20?'#4ade80':c.materiality>5?'#6b7080':'#ffffff22';
        h+=`<td style="padding:5px 4px;text-align:center;color:${matCol}">${c.materiality}%</td>`;
        h+=`<td style="padding:5px 4px;text-align:center">${c.yourPoS}%</td>`;
        // Vol Edge: ratio of your swing to options swing
        if(optSwing&&optSwing>0){
          const ratio=(c.swingPct/optSwing).toFixed(1);
          const edgeCol=ratio>1.5?'#22c55e':ratio>0.9?'#eab308':ratio>0.5?'#f97316':'#ef4444';
          h+=`<td style="padding:5px 4px;text-align:center;font-weight:700;color:${edgeCol}" title="Your swing ${c.swingPct}% / Options ${optSwing}% = ${ratio}x\n>1.5x = options cheap | <0.7x = options expensive">${ratio}x</td>`;
        }else{
          h+=`<td style="padding:5px 4px;text-align:center;color:var(--text2);opacity:.3">--</td>`;
        }
        // Flow: directional signal from options
        const opts=c.options;
        if(opts&&opts.direction){
          const dir=opts.direction;
          const dCol=dir==='bullish'?'#22c55e':dir==='bearish'?'#ef4444':'#6b7080';
          const arrow=dir==='bullish'?'\u25B2':dir==='bearish'?'\u25BC':'\u25C6';
          const tip=`Skew: ${opts.skew25d>0?'+':''}${opts.skew25d||0}pp (${opts.skew25d>10?'bearish':opts.skew25d<-10?'bullish':'neutral'})\nP/C OI: ${opts.pcOI||'?'} (${opts.pcOI<0.7?'bullish':opts.pcOI>1.3?'bearish':'neutral'}) — Calls: ${(opts.totalCallOI||0).toLocaleString()} Puts: ${(opts.totalPutOI||0).toLocaleString()}\nP/C Vol: ${opts.pcVol||'?'} (${opts.pcVol<0.7?'bullish':opts.pcVol>1.3?'bearish':'neutral'})`;
          h+=`<td style="padding:5px 4px;text-align:center;font-weight:700;color:${dCol}" title="${tip}">${arrow} ${dir[0].toUpperCase()}</td>`;
        }else{
          h+=`<td style="padding:5px 4px;text-align:center;color:var(--text2);opacity:.3">--</td>`;
        }
        h+=`</tr>`;
      });
      h+='</table></div>';
      h+='<div style="margin-top:8px;font-size:.58rem;color:var(--text2)">Click any column header to sort. If Win/Fail = % change in model TP (not vs stock price). Vol Edge = your swing / options swing (green >1.5x = options cheap). Flow = 25-delta skew + P/C OI + volume.</div>';
      h+='</div>';
    }

    // Portfolio
    h+='<div class="card" id="sec-portfolio"><div class="card-title"><div class="dot" style="background:linear-gradient(180deg,#a855f7,#ec4899)"></div>Portfolio Scenario Simulator</div>';
    h+='<div class="card-sub">Select stocks via checkboxes or search — average return per stock under each scenario</div>';
    h+='<div class="ptf-bar">';
    ptfSet.forEach(tk=>{h+=`<span class="ptf-tag" onclick="window._toggle('${tk}')">${tk}<span class="x">\u00d7</span></span>`;});
    h+='<div class="dd-wrap"><input class="dd-input" id="ddIn" placeholder="+ Add ticker\u2026" onfocus="window._ddOpen()" oninput="window._ddFilter(this.value)" onblur="setTimeout(()=>window._ddClose(),200)"/>';
    h+='<div class="dd-list" id="ddList">';
    rows.forEach(r=>{if(!ptfSet.has(r.ticker))h+=`<div class="dd-item" onmousedown="window._toggle('${r.ticker}')"><span><span class="t">${r.ticker}</span>${r.name}</span><span style="color:var(--text2);font-size:.7rem">${r.ccy}${r.price.toFixed(r.dec)}</span></div>`;});
    h+='</div></div></div>';
    h+='<div class="ptf-results">';
    SK.forEach(sk=>{
      const v=ptfScen[sk],cls=SS[sk];
      h+=`<div class="ptf-res stat ${cls}"><div class="lbl">${SN[sk]}</div><div class="val" style="color:${v>=0?SC[sk]:'#fca5a5'}">${ptfRows.length?((v>=0?"+":"")+v.toFixed(1)+"%"):"\u2014"}</div></div>`;
    });
    h+='</div>';
    if(ptfRows.length)h+=`<div style="margin-top:8px;font-size:.72rem;color:var(--text2)">${ptfRows.length} stocks \u00b7 Equal-share (avg of individual % returns) \u00b7 Top row = all stocks hit same scenario</div>`;

    // Monte Carlo simulator
    if(ptfRows.length>=2){
      const SIMS=10000;
      const corrVal=typeof window._corrVal==='number'?window._corrVal:30;
      // Manual overrides
      const ovr=window._manualOvr||{};
      // Scenario weights
      const W=[0.05,0.15,0.50,0.25,0.05];
      const cumW=[0.05,0.20,0.70,0.95,1.00];
      // Run Monte Carlo
      const returns=[];
      for(let s=0;s<SIMS;s++){
        // Correlation: shared random factor
        const shared=Math.random();
        let ptfRet=0;
        for(const r of ptfRows){
          let si;
          if(ovr[r.ticker]!=null){si=ovr[r.ticker];}
          else{
            // Blend shared + individual randomness based on correlation
            const u=corrVal/100*shared+(1-corrVal/100)*Math.random();
            si=0;for(let i=0;i<5;i++){if(u<=cumW[i]){si=i;break;}}
          }
          const sk=SK[si];
          const tp=r.tps[sk]||r.price;
          ptfRet+=((tp-r.price)/r.price*100);
        }
        returns.push(ptfRet/ptfRows.length);
      }
      returns.sort((a,b)=>a-b);
      const median=returns[Math.floor(SIMS/2)];
      const mean=returns.reduce((a,b)=>a+b,0)/SIMS;
      const p10=returns[Math.floor(SIMS*0.1)];
      const p90=returns[Math.floor(SIMS*0.9)];
      const pLoss=returns.filter(r=>r<0).length/SIMS*100;
      // Histogram: use P5-P95 as visible range, outliers in edge bins
      const bins=40;
      const hMin=Math.min(returns[Math.floor(SIMS*0.02)],-50);
      const hMax=Math.max(returns[Math.floor(SIMS*0.98)],50);
      const bw=(hMax-hMin)/bins;
      const hist=new Array(bins).fill(0);
      returns.forEach(r=>{const i=Math.min(bins-1,Math.max(0,Math.floor((r-hMin)/bw)));hist[i]++;});
      const hPeak=Math.max(...hist);
      const zeroPctHist=(0-hMin)/(hMax-hMin);

      h+=`<div style="margin-top:20px;padding-top:18px;border-top:1px solid var(--border)">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">`;
      h+=`<div style="font-weight:700;color:var(--text1);font-size:.95rem">\u{1F3B2} Monte Carlo Simulation <span style="font-weight:400;color:var(--text2);font-size:.75rem">${SIMS.toLocaleString()} runs</span></div>`;
      h+=`<div style="display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--text2)">`;
      h+=`<span>Correlation:</span>`;
      h+=`<input type="range" min="0" max="100" value="${corrVal}" onchange="window._setCorr(this.value)" oninput="document.getElementById('corrLbl').textContent=this.value+'%'" style="width:120px;accent-color:#a855f7"/>`;
      h+=`<span id="corrLbl" style="font-family:var(--mono);width:36px">${corrVal}%</span>`;
      h+=`<span style="font-size:.65rem;color:var(--text2)">(0%=independent, 100%=all same scenario)</span>`;
      h+=`</div></div>`;

      const spread=p90-p10;

      // Stats row
      h+=`<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px">`;
      [{l:'Median',v:median,c:'#e2e4ea'},{l:'Expected',v:mean,c:'#60a5fa'},{l:'P10 (bad)',v:p10,c:'#fca5a5'},{l:'P90 (good)',v:p90,c:'#86efac'},{l:'Spread',v:spread,c:'#c084fc'},{l:'P(loss)',v:pLoss,c:pLoss>50?'#fca5a5':pLoss>10?'#fbbf24':'#86efac',pct:true}].forEach(s=>{
        h+=`<div style="background:var(--bg1);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)">`;
        h+=`<div style="font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">${s.l}</div>`;
        h+=`<div style="font-size:1.2rem;font-weight:800;font-family:var(--mono);color:${s.c}">${s.pct?s.v.toFixed(0)+'%':((s.v>=0?'+':'')+s.v.toFixed(1)+'%')}</div>`;
        h+=`</div>`;
      });
      h+=`</div>`;

      // Histogram
      h+=`<div style="background:var(--bg1);border-radius:8px;padding:12px;border:1px solid var(--border);position:relative">`;
      // 0% marker line
      if(zeroPctHist>0&&zeroPctHist<1){
        const zL=zeroPctHist;
        h+=`<div style="position:absolute;left:calc(12px + (100% - 24px) * ${zL.toFixed(4)});top:12px;bottom:34px;width:2px;background:#ffffff50;z-index:2"></div>`;
        h+=`<div style="position:absolute;left:calc(12px + (100% - 24px) * ${zL.toFixed(4)});bottom:20px;transform:translateX(-50%);font-size:.65rem;font-family:var(--mono);color:#e2e4ea;font-weight:700;z-index:3">0%</div>`;
      }
      // Median marker line
      const medPctHist=((median-hMin)/(hMax-hMin));
      if(medPctHist>0&&medPctHist<1){
        h+=`<div style="position:absolute;left:calc(12px + (100% - 24px) * ${medPctHist.toFixed(4)});top:12px;bottom:34px;width:1px;background:#60a5fa88;z-index:2;border-left:1px dashed #60a5fa"></div>`;
        h+=`<div style="position:absolute;left:calc(12px + (100% - 24px) * ${medPctHist.toFixed(4)});top:4px;transform:translateX(-50%);font-size:.6rem;font-family:var(--mono);color:#60a5fa;z-index:3">med</div>`;
      }
      h+=`<div style="display:flex;align-items:flex-end;height:110px;gap:1px;position:relative;z-index:1">`;
      for(let i=0;i<bins;i++){
        const bStart=hMin+i*bw;
        const bMid=bStart+bw/2;
        const pctH=(hist[i]/hPeak)*100;
        const col=bMid<-20?'#ef4444':bMid<0?'#f59e0b':bMid<30?'#22c55e':'#a855f7';
        const tt=`${bStart.toFixed(0)}% to ${(bStart+bw).toFixed(0)}%: ${hist[i]} runs (${(hist[i]/SIMS*100).toFixed(1)}%)`;
        h+=`<div style="flex:1;height:${pctH}%;background:${col}88;border-radius:2px 2px 0 0;min-width:2px" title="${tt}"></div>`;
      }
      h+=`</div>`;
      // Axis with more labels
      h+=`<div style="position:relative;height:16px;margin-top:4px;font-size:.6rem;color:var(--text2);font-family:var(--mono)">`;
      const niceSteps=[hMin,0,hMax];
      // Add intermediate ticks
      const step=Math.ceil((hMax-hMin)/5/50)*50;
      for(let v=Math.ceil(hMin/step)*step;v<=hMax;v+=step){
        const lPct=((v-hMin)/(hMax-hMin))*100;
        if(lPct<2||lPct>98)continue;
        h+=`<span style="position:absolute;left:${lPct}%;transform:translateX(-50%);${v===0?'color:var(--text1);font-weight:700':''}">${v>=0?'+':''}${v.toFixed(0)}%</span>`;
      }
      h+=`<span style="position:absolute;left:0">${hMin.toFixed(0)}%</span>`;
      h+=`<span style="position:absolute;right:0">${hMax>=0?'+':''}${hMax.toFixed(0)}%</span>`;
      h+=`</div></div>`;

      // Manual override section
      h+=`<details style="margin-top:12px"><summary style="cursor:pointer;font-size:.8rem;color:#60a5fa;font-weight:600">\u{1F527} Override individual scenarios</summary>`;
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">`;
      ptfRows.forEach(r=>{
        const cur=ovr[r.ticker];
        h+=`<div style="background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:6px">`;
        h+=`<span style="font-family:var(--mono);font-weight:700;font-size:.75rem;color:#60a5fa;width:42px">${r.ticker}</span>`;
        h+=`<select onchange="window._setOvr('${r.ticker}',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text1);font-size:.72rem;font-family:var(--mono)">`;
        h+=`<option value="auto" ${cur==null?'selected':''}>Weighted</option>`;
        SK.forEach((sk,i)=>{h+=`<option value="${i}" style="color:${SC[sk]}" ${cur===i?'selected':''}>${SN[sk]}</option>`;});
        h+=`</select></div>`;
      });
      h+=`</div></details>`;
      h+=`</div>`;
    }
    h+='</div>';

    // Table
    h+='<div class="card" id="sec-table"><div class="card-title"><div class="dot" style="background:linear-gradient(180deg,#10b981,#14b8a6)"></div>Company Analysis';
    if(activeFilter)h+=`<span style="font-size:.75rem;font-weight:500;color:var(--text2);margin-left:10px">(${visibleRows.length} of ${rows.length} — filtered)</span>`;
    h+='</div>';
    h+='<div class="card-sub">Click ticker for full 5-scenario model \u00b7 Check box to add to portfolio \u00b7 Click headers to sort</div>';
    h+='<div class="tbl-wrap"><table><thead><tr>';
    h+='<th style="width:28px">Ptf</th>';
    h+='<th onclick="window._sort(\'ticker\')">Ticker</th>';
    h+='<th onclick="window._sort(\'name\')">Company</th>';
    h+='<th class="r" onclick="window._sort(\'price\')">Price</th>';
    h+='<th class="r" onclick="window._sort(\'ev\')">EV ($M)</th>';
    h+='<th class="r" onclick="window._sort(\'cashPS\')">Cash/Sh</th>';
    SK.forEach(sk=>{h+=`<th class="r" style="color:${SC[sk]}" onclick="window._sort('${sk}')">${SN[sk]}</th>`;});
    h+='<th class="r" onclick="window._sort(\'wtUp\')">Wtd Up%</th>';
    h+='</tr></thead><tbody>';
    visibleRows.forEach(r=>{
      const c=r.ccy,d=r.dec;
      h+='<tr>';
      h+=`<td><input type="checkbox" class="ptf-chk" ${ptfSet.has(r.ticker)?'checked':''} onchange="window._toggle('${r.ticker}')"/></td>`;
      h+=`<td><a class="tk" href="model.html?ticker=${r.ticker}">${r.ticker}</a></td>`;
      let nameExtra='';
      const foc=purityMode==='wtd'?r.meta.focusWtd:r.meta.focus;
      const rp=purityMode==='wtd'?r.meta.rarePurityWtd:r.meta.rarePurity;
      if(filterL1||filterL2||filterL3){
        const fArea=filterL3||filterL2||filterL1;
        const depth=fArea.split(".").length;
        let pct=0;
        if(depth===1){pct=foc.filter(f=>f.area.startsWith(fArea+".")&&f.area.split(".").length===2).reduce((s,f)=>s+f.purity,0);}
        else{const m=foc.find(f=>f.area===fArea);if(m)pct=m.purity;}
        if(pct>0)nameExtra=`<span class="purity-badge">${Math.min(pct,100)}%</span>`;
      }else if(filterRare===true&&rp>0){
        nameExtra=`<span class="purity-badge" style="background:#f59e0b22;color:#fbbf24;border-color:#f59e0b33">${rp}%</span>`;
      }
      h+=`<td style="color:var(--text2);font-size:.75rem;max-width:220px;overflow:hidden;text-overflow:ellipsis">${r.name}${nameExtra}</td>`;
      h+=`<td class="r mono">${c}${r.price.toFixed(d)}`;
      if(r.live&&r.prevClose){const chg=((r.price-r.prevClose)/r.prevClose*100);h+=`<span style="font-size:.65rem;margin-left:3px;color:${chg>=0?'#86efac':'#fca5a5'}">${chg>=0?'+':''}${chg.toFixed(1)}%</span>`;}
      if(r.live)h+=`<span style="font-size:.55rem;color:#22c55e;margin-left:2px" title="Live price">\u25CF</span>`;
      h+=`</td>`;
      h+=`<td class="r mono" style="color:var(--text2)">${Math.round(r.ev).toLocaleString()}</td>`;
      h+=`<td class="r mono" style="color:#c084fc">${c}${r.cashPS.toFixed(d)}</td>`;
      SK.forEach(sk=>{
        const tp=r.tps[sk];if(tp==null){h+='<td class="r" style="opacity:.3">\u2014</td>';return;}
        const up=((tp-r.price)/r.price*100);
        const col=up>30?'#86efac':up>0?'#fbbf24':up>-20?'#fdba74':'#fca5a5';
        h+=`<td class="r mono" style="color:${col}">${c}${tp.toFixed(d)}</td>`;
      });
      const wc=r.wtUp>30?'#86efac':r.wtUp>0?'#fbbf24':'#fca5a5';
      h+=`<td class="r mono" style="color:${wc}">${r.wtUp>=0?'+':''}${r.wtUp.toFixed(0)}%</td>`;
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';

    h+=`<div style="padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:.78rem;color:var(--text2)">`;
    h+=`<strong style="color:var(--text1)">Data:</strong> ${Object.keys(configs).length} companies \u00b7 `;
    const liveCount=Object.keys(livePrices).length;
    if(liveCount>0)h+=`<span style="color:#22c55e">\u25CF ${liveCount} live prices</span> \u00b7 `;
    else h+=`<span style="color:var(--text2)">Fetching live prices\u2026</span> \u00b7 `;
    h+=`5 scenarios (mega bear 5% / bear 15% / base 50% / bull 25% / psych bull 5%) \u00b7 `;
    h+=`<strong style="color:var(--text1)">Wtd Up%</strong> = (5%\u00d7MB + 15%\u00d7Bear + 50%\u00d7Base + 25%\u00d7Bull + 5%\u00d7PB \u2212 Price) / Price \u00b7 `;
    h+=`<strong style="color:var(--text1)">Chart:</strong> Upside = (TP \u2212 Price) / Price \u00b7 Right of 0% = upside, left = downside \u00b7 `;
    h+=`<a href="https://github.com/orbite-lab/BioTechStocks" style="color:#60a5fa">Source configs</a> \u00b7 `;
    h+=`<a href="model.html" style="color:#60a5fa">Open model viewer</a></div>`;

    document.getElementById('stickyFilters').innerHTML=fh;
    document.getElementById('stickyFilters').style.display='block';
    app.innerHTML=h;
  }

  window._sort=function(k){if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}doSort();render();};
  window._toggle=function(tk){if(ptfSet.has(tk))ptfSet.delete(tk);else ptfSet.add(tk);render();};
  window._filter=function(k){activeFilter=(activeFilter===k)?null:k;render();};
  window._fL1=function(l1){if(filterL1===l1){filterL1=null;filterL2=null;filterL3=null;}else{filterL1=l1;filterL2=null;filterL3=null;}render();};
  window._fL2=function(l2){filterL2=l2;filterL3=null;render();};
  window._fL3=function(l3){filterL3=l3;render();};
  window._fPhase=function(p){filterPhase=p||null;render();};
  window._fRare=function(){filterRare=filterRare===true?null:true;render();};
  window._fMod1=function(m1){if(filterMod1===m1){filterMod1=null;filterMod2=null;filterMod3=null;}else{filterMod1=m1;filterMod2=null;filterMod3=null;}render();};
  window._fMod2=function(m2){filterMod2=m2;filterMod3=null;render();};
  window._fMod3=function(m3){filterMod3=m3;render();};
  window._stripSort=function(s){stripSort=s;render();};
  window._setCatZoom=function(d){catZoom=d;render();};
  window._setCatSort=function(key){
    if(catSortKey===key){
      catSortDir=catSortDir==='desc'?'asc':'desc';
    }else{
      catSortKey=key;
      // Default direction: ascending for text columns, descending for numeric
      catSortDir=(key==='ticker'||key==='title')?'asc':'desc';
    }
    render();
  };
  window._purityMode=function(){purityMode=purityMode==='wtd'?'raw':'wtd';render();};
  window._catY=function(m){catYAxis=m;render();};
  window._fClear=function(){filterL1=null;filterL2=null;filterL3=null;filterPhase=null;filterRare=null;filterMod1=null;filterMod2=null;filterMod3=null;activeFilter=null;stripSort='base';render();};
  window._setCorr=function(v){window._corrVal=+v;render();};
  window._setOvr=function(tk,v){if(!window._manualOvr)window._manualOvr={};if(v==='auto')delete window._manualOvr[tk];else window._manualOvr[tk]=+v;render();};
  window._ddOpen=function(){document.getElementById('ddList')?.classList.add('open');};
  window._ddClose=function(){document.getElementById('ddList')?.classList.remove('open');};
  window._ddFilter=function(q){const dd=document.getElementById('ddList');if(!dd)return;dd.classList.add('open');
    dd.querySelectorAll('.dd-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});};

  render();

  // Background: fetch live prices for any tickers missing from prices.json cache
  (async()=>{
    const tickers=Object.keys(configs).filter(tk=>!livePrices[tk]);
    if(tickers.length===0){pricesLoaded=true;return;}
    const BATCH=6;
    let updated=0;
    for(let i=0;i<tickers.length;i+=BATCH){
      const batch=tickers.slice(i,i+BATCH);
      const results=await Promise.all(batch.map(tk=>{
        const yt=configs[tk].company.yahooTicker||tk;
        return fetchLivePrice(yt).then(r=>r?[tk,r]:null);
      }));
      results.filter(Boolean).forEach(([tk,lp])=>{livePrices[tk]=lp;updated++;});
      if(updated>0){rows=buildRows();doSort();render();}
    }
    if(updated>0){pricesLoaded=true;rows=buildRows();doSort();render();}
  })();
}
main();
// Scroll observer for nav button highlighting
(function(){
  const secs=['sec-range','sec-pipeline','sec-catalyst','sec-portfolio','sec-table'];
  const btns=document.querySelectorAll('#topNav button');
  if(!btns.length)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        btns.forEach(b=>b.classList.remove('active'));
        const btn=[...btns].find(b=>b.dataset.sec===en.target.id);
        if(btn)btn.classList.add('active');
      }
    });
  },{rootMargin:'-30% 0px -50% 0px',threshold:0});
  // Observe once sections exist (after first render)
  setTimeout(()=>{secs.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});},2000);
})();
</script>
</body>
</html>
