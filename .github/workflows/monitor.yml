name: Biotech catalyst monitor

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # Manual trigger button in GitHub UI

concurrency:
  group: catalyst-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run catalyst monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/recurring/monitor.py

      - name: Commit and push if changed
        run: |
          git config user.name "Catalyst Bot"
          git config user.email "bot@catalyst-monitor"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SUMMARY=$(python -c "
          import json, os
          try:
            with open('changelog/latest_summary.txt') as f:
              print(f.read().strip())
          except:
            print('Config updates')
          ")
            git commit -m "🔬 $SUMMARY"
            # Retry push up to 3 times with rebase in case main moved during the run
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded on attempt $i"
                exit 0
              fi
              echo "Push attempt $i failed; rebasing..."
              git pull --rebase origin main
            done
            echo "Push failed after 3 retries"
            exit 1
          fi
