name: Validate Configs
on:
  push:
    paths: ['configs/**', 'data/taxonomy.json']
  pull_request:
    paths: ['configs/**', 'data/taxonomy.json']

concurrency:
  group: validate-configs
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate configs against taxonomy
        run: python scripts/recurring/validate.py

      # Coherence pass: regenerate derived / cross-config state in place.
      # Taxonomy is 100% derived from configs. company.phase is derived from
      # each asset's stage string. Both are hand-set by default so they drift.
      # On PRs we FAIL if they are stale (contributor must fix + push so the
      # diff is reviewable). On main we AUTO-COMMIT the corrections via
      # github-actions[bot] so the model-deployed site always matches the data.
      - name: Rebuild taxonomy
        run: python scripts/recurring/rebuild_taxonomy.py

      - name: Reconcile company.phase
        run: python scripts/ops/reconcile_phase.py --write

      - name: Reconcile market.regions from authoritative epi
        run: python scripts/ops/reconcile_sliders.py

      - name: Fail if stale (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet data/taxonomy.json configs/; then
            echo "❌ Derived state is stale. Run locally:"
            echo "    python scripts/recurring/rebuild_taxonomy.py"
            echo "    python scripts/ops/reconcile_phase.py --write"
            git diff --stat data/taxonomy.json configs/
            git diff data/taxonomy.json configs/ | head -80
            exit 1
          fi
          echo "✅ taxonomy.json + company.phase are up to date"

      - name: Auto-commit regenerated state (main pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet data/taxonomy.json configs/; then
            echo "✅ nothing to reconcile"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/taxonomy.json configs/
          # Build a commit message listing what changed
          MSG="chore: auto-reconcile derived state"
          if ! git diff --cached --quiet data/taxonomy.json; then
            MSG="$MSG (taxonomy)"
          fi
          if ! git diff --cached --quiet configs/; then
            CHANGED_CFGS=$(git diff --cached --name-only configs/ | wc -l)
            MSG="$MSG ($CHANGED_CFGS configs)"
          fi
          git commit -m "$MSG"
          # Retry push up to 3 times with rebase in case main moved during the run
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 retries"
          exit 1
