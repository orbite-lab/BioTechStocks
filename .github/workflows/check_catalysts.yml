name: Catalyst Completeness Check

on:
  schedule:
    # 1st and 15th of every month at 06:00 UTC (08:00 Geneva winter, 07:00 summer)
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

concurrency:
  group: catalyst-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run catalyst check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/check_catalysts.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/ changelog/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly catalyst auto-sync"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; rebasing..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 retries"
          exit 1
