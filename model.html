    // ═══════════════════════════════════════
    // LOADER: try fetch, fallback to embedded
    // ═══════════════════════════════════════

    function useConfigs() {
      const [configs, setConfigs] = useState(null);
      const [taxonomy, setTaxonomy] = useState(null);
      const [financials, setFinancials] = useState({});
      const [sectorBenchmarks, setSectorBenchmarks] = useState(null);
      const [initialPrices, setInitialPrices] = useState({});
      const [loading, setLoading] = useState(true);
      const [source, setSource] = useState(null);

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch("configs/manifest.json");
            if (!res.ok) throw new Error("no manifest");
            const tickers = await res.json();
            const entries = await Promise.all(tickers.map(async (t) => {
              try {
                const r = await fetch("configs/" + t + ".json");
                if (!r.ok) { console.warn("skip " + t + " (404)"); return null; }
                return [t, await r.json()];
              } catch { console.warn("skip " + t); return null; }
            }));
            const cfgs = {};
            entries.filter(Boolean).forEach(([t, cfg]) => { cfgs[t] = cfg; });
            if (Object.keys(cfgs).length === 0) throw new Error("no configs loaded");
            setConfigs(cfgs);
            setSource("server");
            try {
              const tr = await fetch("data/taxonomy.json");
              if (tr.ok) setTaxonomy(await tr.json());
            } catch { /* taxonomy optional */ }
            try {
              const fr = await fetch("data/financials.json");
              if (fr.ok) setFinancials(await fr.json());
            } catch { /* financials optional */ }
            try {
              const sb = await fetch("data/sector_benchmarks.json");
              if (sb.ok) setSectorBenchmarks(await sb.json());
            } catch { /* benchmarks optional */ }
            // Seed cached prices from prices.json (GitHub Actions, ~30 min cadence)
            try {
              const pr = await fetch("data/prices.json?v=" + Date.now());
              if (pr.ok) {
                const pj = await pr.json();
                const seeded = {};
                for (const [tk, rec] of Object.entries(pj)) {
                  if (tk === "_meta" || !cfgs[tk]) continue;
                  if (rec && typeof rec.price === "number" && rec.price > 0) {
                    seeded[tk] = { price: rec.price, prevClose: rec.prevClose || null };
                  }
                }
                setInitialPrices(seeded);
              }
            } catch { /* prices cache not available — live fetch will handle it */ }
          } catch (err) {
            // Fallback to embedded configs
            setConfigs(EMBEDDED_CONFIGS);
            setSource("embedded");
          } finally {
            setLoading(false);
          }
        }
        load();
      }, []);

      return { configs, taxonomy, financials, sectorBenchmarks, initialPrices, loading, source };
    }

    // ═══════════════════════════════════════
    // TAXONOMY / COMPETITOR LOOKUP
    // ═══════════════════════════════════════

    function lookupTaxonomyNode(tax, areaPath) {
      if (!tax || !areaPath || !tax.therapeutic_areas) return null;
      const parts = areaPath.split(".");
      let node = tax.therapeutic_areas;
      for (let i = 0; i < parts.length; i++) {
        if (!node || typeof node !== "object") return null;
        // For L4: after reaching L3 node, look inside "sub" for the L4 key
        if (node[parts[i]]) {
          node = node[parts[i]];
        } else if (node.sub && node.sub[parts[i]]) {
          node = node.sub[parts[i]];
        } else {
          return null;
        }
      }
      return node;
    }

    function indicationTAM(ind) {
      const m = ind.market || {};
      if (m.regions) {
        let addr = 0;
        for (const r of Object.values(m.regions)) {
          if (!r) continue;
          addr += (r.patientsK || 0) * ((r.wtpPct || 0) / 100) * (r.priceK || 0);
        }
        return addr / 1000; // $B
      }
      if (m.tamB) return m.tamB;
      if (m.patientsK && m.pricingK) return (m.patientsK * m.pricingK) / 1000;
      return 0;
    }

    function findCompetitors(areaPath, configs, taxonomy, excludeTicker) {
      // Try exact L4 match first, then fall back to L3 parent for broader competitors
      let node = lookupTaxonomyNode(taxonomy, areaPath);
      const parts = areaPath.split(".");
      let companySet = new Set();
      if (node && Array.isArray(node.companies)) node.companies.forEach(c => companySet.add(c));
      // If L4, also include L3 parent companies (broader market competitors)
      if (parts.length === 4) {
        const l3Path = parts.slice(0, 3).join(".");
        const l3Node = lookupTaxonomyNode(taxonomy, l3Path);
        if (l3Node && Array.isArray(l3Node.companies)) l3Node.companies.forEach(c => companySet.add(c));
        // Also include sibling L4 companies
        if (l3Node && l3Node.sub) {
          for (const sub of Object.values(l3Node.sub)) {
            if (Array.isArray(sub.companies)) sub.companies.forEach(c => companySet.add(c));
          }
        }
      }
      if (companySet.size === 0) return { marketed: [], development: [] };
      const marketed = [], development = [];
      for (const tk of companySet) {
        const cfg = configs[tk];
        if (!cfg) continue;
        let totalTAM = 0, matchTAM = 0;
        const matches = [];
        for (const a of cfg.assets) {
          for (const ind of a.indications) {
            const tam = indicationTAM(ind);
            totalTAM += tam;
            if (ind.area === areaPath || (parts.length === 4 && ind.area === parts.slice(0,3).join(".")) || (ind.area && ind.area.startsWith(areaPath + ".")) || (areaPath.startsWith(ind.area + "."))) {
              matchTAM += tam;
              matches.push({ asset: a, ind, tam });
            }
          }
        }
        if (matches.length === 0) continue;
        const purityPct = totalTAM > 0 ? Math.round((matchTAM / totalTAM) * 100) : 0;
        const isSelf = tk === excludeTicker;
        for (const match of matches) {
          const stg = (match.asset.stage || "").toLowerCase();
          const isMarketed = match.asset.id === "commercial" || stg.includes("commercial") || stg.includes("approved") || stg.includes("launched") || stg.includes("marketed");
          let sales = null, salesIsReported = false;
          const mkt = match.ind.market || {};
          if (mkt.salesM != null && mkt.salesM > 0) {
            sales = mkt.salesM; salesIsReported = true;
          } else if (mkt.regions) {
            sales = indicationTAM(match.ind) * ((mkt.penPct || 0) / 100) * 1000;
          } else if (mkt.patientsK && mkt.pricingK) {
            sales = mkt.patientsK * mkt.pricingK * ((mkt.penPct || 0) / 100);
          } else if (mkt.tamB) {
            sales = mkt.tamB * ((mkt.penPct || 0) / 100) * 1000;
          }
          let nextCatalyst = null;
          if (Array.isArray(cfg.catalysts)) {
            const catMatches = cfg.catalysts.filter(c => c.asset === match.asset.id && c.indication === match.ind.id);
            catMatches.sort((a, b) => (a.dateSort || "").localeCompare(b.dateSort || ""));
            nextCatalyst = catMatches.find(c => !c.dateSort || c.dateSort >= "2026-04-15") || catMatches[catMatches.length - 1] || null;
          }
          const salesYear = mkt.salesYear || null;
          const entry = { ticker: tk, name: cfg.company.name, assetName: match.asset.name, stage: match.asset.stage, purityPct, sales, salesIsReported, salesYear, nextCatalyst, tam: match.tam, isSelf };
          if (isMarketed) marketed.push(entry); else development.push(entry);
        }
      }
      marketed.sort((a, b) => (b.sales || 0) - (a.sales || 0));
      const stageOrder = { "nda filed": 1, "bla filed": 1, "phase 3": 2, "phase 2/3 pivotal": 2.5, "phase 2b": 3, "phase 2a": 3.5, "phase 2": 4, "phase 1b": 5, "phase 1 exp": 5.5, "phase 1": 6, "preclinical": 7 };
      development.sort((a, b) => (stageOrder[(a.stage || "").toLowerCase()] || 99) - (stageOrder[(b.stage || "").toLowerCase()] || 99));
      return { marketed, development };
    }

    // ═══════════════════════════════════════
    // ENGINE
    // ═══════════════════════════════════════

    function computeScenario(config, scenKey, state) {
      const co = config.company;
      const scen = state.scenarios[scenKey];
      const val = scen.val;
      const isSOTP = val.pipelineDR != null;
      let pipelineRA = 0, pipelineGross = 0, commercialRev = 0;
      let totalRA = 0, totalGross = 0;
      let lymeComposite = 0;
      const assetDetails = [];

      for (const asset of config.assets) {
        for (const ind of asset.indications) {
          const a = scen.assumptions?.[asset.id]?.[ind.id] || { pos: 0, apr: 0, pen: 1 };
          const m = state.markets[asset.id + "_" + ind.id] || ind.market;
          const yr = (m.peakYear || 2033) - 2026;
          let peakRev = 0;
          const stgLower = (asset.stage || "").toLowerCase();
          const isCommercial = asset.id === "commercial" || (isSOTP && (stgLower.includes("commercial") || stgLower.includes("launched") || stgLower.includes("marketed")));

          if (isCommercial && isSOTP) {
            // Commercial assets are valued via the commercialRevM slider, not per-indication
            // Just tag them in details — the actual EV comes from commercialRevM × commercialMult
            assetDetails.push({ asset: asset.name, ind: ind.name, peakRev: 0, composite: 1, ra: 0, type: "commercial" });
            continue;
          }

          if (m.company_slice && m.regions) {
            // SOM path: peakRev = Σ TAM_patients × reachPct × companyWtp × companyPrice
            let som = 0;
            for (const [rk, cs] of Object.entries(m.company_slice)) {
              const tr = m.regions[rk];
              if (!tr || !cs) continue;
              som += (tr.patientsK || 0) * ((cs.reachPct || 0) / 100) * ((cs.wtpPct || 0) / 100) * (cs.priceK || 0);
            }
            if (m.cagrPct) som *= Math.pow(1 + m.cagrPct / 100, yr);
            if (m.expansionPct) som *= (1 + m.expansionPct / 100);
            peakRev = som * a.pen;
          } else if (m.regions) {
            let addr = 0;
            for (const r of Object.values(m.regions)) {
              if (!r) continue;
              addr += (r.patientsK || 0) * ((r.wtpPct || 0) / 100) * (r.priceK || 0);
            }
            if (m.cagrPct) addr *= Math.pow(1 + m.cagrPct / 100, yr);
            if (m.expansionPct) addr *= (1 + m.expansionPct / 100);
            peakRev = addr * ((m.penPct || 0) / 100) * a.pen;
          } else if (m.patientsK) {
            peakRev = m.patientsK * m.pricingK * (m.penPct / 100) * a.pen;
          } else if (m.tamB) {
            const tam = m.tamB * (m.cagrPct ? Math.pow(1 + m.cagrPct / 100, yr) : 1) * (1 + (m.expansionPct || 0) / 100);
            peakRev = tam * (m.penPct / 100) * a.pen * 1000;
          }
          const composite = (a.pos / 100) * (a.apr / 100);
          const ra = peakRev * composite;

          if (isSOTP) { pipelineRA += ra; pipelineGross += peakRev; }
          totalRA += ra; totalGross += peakRev;

          if (asset.id === "vla15") lymeComposite = composite;
          assetDetails.push({ asset: asset.name, ind: ind.name, peakRev, composite, ra, type: isCommercial ? "commercial" : "pipeline" });
        }
      }

      const dilMult = 1 - (val.dil || 0) / 100;
      let ev, tp, commercialEV = 0, pipelineEV = 0, milestonesEV = 0;

      if (isSOTP) {
        // SOTP: commercial at EV/Rev + pipeline rNPV + milestones
        commercialRev = val.commercialRevM || commercialRev || 0;
        commercialEV = commercialRev * (val.commercialMult || 2.5);
        // NOTE: hardcoded 2031 to match index.html computeScenario and scripts/lib/compute.py.
        // Previously used state.avgPeakYear (derived from per-indication peakYear), but that
        // caused model.html TPs to drift 10-20% lower than the screener for companies whose
        // indications peak later than 2031. Sync is now authoritative across all three paths.
        const avgYr = 2031 - 2026;
        const df = Math.pow(1 + (val.pipelineDR || 14) / 100, avgYr);
        pipelineEV = (pipelineRA * (val.pipelineMult || 4)) / df;
        milestonesEV = (val.milestones || 0) * lymeComposite;
        ev = commercialEV + pipelineEV + milestonesEV + state.cash;
      } else {
        // Flat: single DR/mult for everything
        const cannib = val.cannib ? totalRA * (val.cannib / 100) : 0;
        const netRA = totalRA - cannib;
        // Hardcoded 2033 to match index.html + scripts/lib/compute.py -- see SOTP note above.
        const avgYr = 2033 - 2026;
        const df = Math.pow(1 + val.dr / 100, avgYr);
        const platExusAdj = totalGross > 0 ? (val.plat + val.exus) * (netRA / totalGross) : 0;
        ev = (netRA * val.mult + platExusAdj) / df + state.cash;
      }

      tp = (ev / co.sharesOut) * dilMult;
      return { tp, ev, totalRA, totalGross, pipelineRA, pipelineGross, commercialRev, commercialEV, pipelineEV, milestonesEV, lymeComposite,
        cannib: val.cannib ? totalRA * (val.cannib / 100) : 0, assetDetails, isSOTP,
        dr: isSOTP ? val.pipelineDR : val.dr, dil: val.dil, mult: isSOTP ? val.pipelineMult : val.mult,
        commercialMult: val.commercialMult, milestones: val.milestones };
    }

    function Sl({ label, value, onChange, min, max, step, unit, color, source }) {
      step = step || 1; unit = unit || ""; color = color || "#6b7080";

      if (source && (source.url || source.note)) {
        const title = [source.note, source.url].filter(Boolean).join(" — ");
        srcEl = source.url
          ? e("a", { href: source.url, target: "_blank", rel: "noopener noreferrer", title, style: { fontSize: 10, color: "#60a5fa", textDecoration: "none", marginLeft: 4, cursor: "help" } }, "\u24D8")
          : e("span", { title, style: { fontSize: 10, color: "#6b7080", marginLeft: 4, cursor: "help" } }, "\u24D8");
      }
      return e("div", { style: { marginBottom: 10 } },
        e("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 2 } },
          e("span", { style: { fontSize: 11, color: "#6b7080" } }, label, srcEl),
          e("span", { style: { fontSize: 11, fontWeight: 700, color, fontFamily: "'JetBrains Mono'" } }, (step < 1 ? value.toFixed(1) : value) + unit)
        ),
        e("input", { type: "range", min, max, step, value, onChange: ev => onChange(parseFloat(ev.target.value)),
          style: { width: "100%", height: 3, appearance: "none", WebkitAppearance: "none", background: "linear-gradient(90deg," + color + " " + pct + "%,#2a2d35 " + pct + "%)", borderRadius: 2, outline: "none", cursor: "pointer" } })
      );
    }

    const NAMED_CC = { megabear: "#991b1b", mega_bear: "#991b1b", bear: "#ef4444", base: "#f59e0b", bull: "#22c55e", bluesky: "#3b82f6", blue_sky: "#3b82f6", psychedelic_bull: "#a855f7" };
    const FALLBACK_PAL = ["#991b1b", "#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#8b5cf6", "#ec4899"];
    const sentC = { "\u2713": "#22c55e", "\u2717": "#ef4444", "~": "#f59e0b", "\u2192": "#6b7080" };

    // ═══════════════════════════════════════
    // LIVE PRICE FETCHER (Yahoo Finance)
    // ═══════════════════════════════════════

    const CORS_PROXIES = [
      url => "https://corsproxy.io/?" + encodeURIComponent(url),
      url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    ];

    async function fetchLivePrice(yahooTicker) {
      if (!yahooTicker) return null;
      const url = "https://query1.finance.yahoo.com/v8/finance/chart/" + yahooTicker + "?interval=1d&range=1d";

      for (const proxy of CORS_PROXIES) {
        try {
          const res = await fetch(proxy(url), { signal: AbortSignal.timeout(5000) });
          if (!res.ok) continue;
          const data = await res.json();
          const meta = data?.chart?.result?.[0]?.meta;
          if (meta?.regularMarketPrice) {
            return { price: meta.regularMarketPrice, prevClose: meta.chartPreviousClose || meta.previousClose, currency: meta.currency };
          }
        } catch (e) { /* try next proxy */ }
      }
      return null;
    }

    // ═══════════════════════════════════════

    function App() {
      const { configs, taxonomy, financials, sectorBenchmarks, initialPrices, loading, source } = useConfigs();

      if (loading) return e("div", { className: "loading" }, "Loading company configs...");

      return e(ModelView, { configs, taxonomy, financials, sectorBenchmarks, initialPrices, source });
    }

    function ModelView({ configs, taxonomy, financials, sectorBenchmarks, initialPrices, source }) {
      const tickers = Object.keys(configs);
      const urlTicker = new URLSearchParams(window.location.search).get("ticker");
      const initTicker = (urlTicker && tickers.includes(urlTicker)) ? urlTicker : tickers[0];
      const [ticker, setTicker] = useState(initTicker);
      const [search, setSearch] = useState("");
      const [showDropdown, setShowDropdown] = useState(false);
      const config = configs[ticker];

      const buildState = useCallback(function(cfg) {
        const markets = {};
        const peakYears = [];
        for (const a of cfg.assets) {
          for (const ind of a.indications) {
            markets[a.id + "_" + ind.id] = JSON.parse(JSON.stringify(ind.market));
            peakYears.push(ind.market.peakYear || 2033);
          }
        }
        return {
          scenarios: JSON.parse(JSON.stringify(cfg.scenarios)),
          markets,
          avgPeakYear: Math.round(peakYears.reduce((a, b) => a + b, 0) / peakYears.length),
          currentPrice: cfg.company.currentPrice,
          cash: cfg.company.cash
        };
      }, []);

      const [state, setState] = useState(() => buildState(config));
      const [priceStatus, setPriceStatus] = useState("loading"); // "loading" | "live" | "stale"
      const [showMarkets, setShowMarkets] = useState(true);
      const [showSliders, setShowSliders] = useState(true);
      const [showPipeline, setShowPipeline] = useState(false);
      const [showContext, setShowContext] = useState(true);
      const [showMethodology, setShowMethodology] = useState(true);
      const [scenExpanded, setScenExpanded] = useState(false);
      const [expandedMkt, setExpandedMkt] = useState({});
      const [activeTab, setActiveTab] = useState("markets"); // markets | assumptions | catalysts | peers | risks

      // On company switch: use cached price from prices.json immediately, then refresh from Yahoo in background
      useEffect(() => {
        const cached = initialPrices && initialPrices[ticker];
        if (cached && cached.price > 0) {
          setState(prev => ({ ...prev, currentPrice: Math.round(cached.price * 100) / 100 }));
          setPriceStatus("live");
        } else {
          setPriceStatus("loading");
        }
        const yt = config.company.yahooTicker || config.company.ticker;
        fetchLivePrice(yt).then(result => {
          if (result && result.price > 0) {
            setState(prev => ({ ...prev, currentPrice: Math.round(result.price * 100) / 100 }));
            setPriceStatus("live");
          } else if (!cached) {
            setPriceStatus("stale");
          }
        });
      }, [ticker]);

      function switchCo(t) { setTicker(t); setState(buildState(configs[t])); setSearch(""); setShowDropdown(false); }
      function upd(path, val) {
        setState(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const keys = path.split(".");
          let obj = next;
          for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
          obj[keys[keys.length - 1]] = val;
          return next;
        });
      }

      const scenarioKeys = Object.keys(state.scenarios);
      const CC = {};
      scenarioKeys.forEach((sk, i) => { CC[sk] = NAMED_CC[sk] || FALLBACK_PAL[i % FALLBACK_PAL.length]; });

      const model = useMemo(() => {
        const co = { ...config.company, cash: state.cash, currentPrice: state.currentPrice };
        const results = {};
        const sks = Object.keys(state.scenarios);
        sks.forEach(sk => { results[sk] = computeScenario({ ...config, company: co }, sk, state); });
        const wts = sks.map(sk => state.scenarios[sk].wt);
        const tW = wts.reduce((a, b) => a + b, 0) || 1;
        const normW = wts.map(w => w / tW);
        const weightedTP = sks.reduce((s, k, i) => s + results[k].tp * normW[i], 0);
        const upside = ((weightedTP - state.currentPrice) / state.currentPrice) * 100;

        // "Today" implied scenario: interpolate assumptions between the two scenarios bracketing the stock price
        const price = state.currentPrice;
        const sortedScens = sks.map(sk => ({ sk, tp: results[sk].tp }))
          .filter(s => typeof s.tp === "number" && !isNaN(s.tp))
          .sort((a,b) => a.tp - b.tp);
        let todayImplied = null;
        if (sortedScens.length >= 2) {
          let a, b, alpha, edge = null;
          if (price <= sortedScens[0].tp) { a = sortedScens[0]; b = sortedScens[1]; alpha = 1; edge = "below"; }
          else if (price >= sortedScens[sortedScens.length-1].tp) { const n = sortedScens.length; a = sortedScens[n-2]; b = sortedScens[n-1]; alpha = 0; edge = "above"; }
          else { for (let i = 0; i < sortedScens.length - 1; i++) { if (price >= sortedScens[i].tp && price <= sortedScens[i+1].tp) { a = sortedScens[i]; b = sortedScens[i+1]; alpha = (b.tp - price) / (b.tp - a.tp); break; } } }
          const scA = state.scenarios[a.sk], scB = state.scenarios[b.sk];
          // Interpolate assumptions per asset/indication
          const assumptions = {};
          for (const asset of config.assets) {
            for (const ind of asset.indications) {
              const aA = scA.assumptions?.[asset.id]?.[ind.id];
              const aB = scB.assumptions?.[asset.id]?.[ind.id];
              if (!aA || !aB) continue;
              assumptions[asset.id] = assumptions[asset.id] || {};
              assumptions[asset.id][ind.id] = {
                pos: Math.round(alpha * aA.pos + (1 - alpha) * aB.pos),
                apr: Math.round(alpha * aA.apr + (1 - alpha) * aB.apr),
                pen: Math.round((alpha * aA.pen + (1 - alpha) * aB.pen) * 10) / 10,
              };
            }
          }
          // Interpolate val fields
          const val = {};
          const fields = new Set([...Object.keys(scA.val || {}), ...Object.keys(scB.val || {})]);
          for (const f of fields) {
            const vA = scA.val?.[f] ?? 0;
            const vB = scB.val?.[f] ?? 0;
            if (typeof vA === "number" && typeof vB === "number") {
              const raw = alpha * vA + (1 - alpha) * vB;
              // Round: % fields and whole-dollar $M to integer; multipliers to 1 decimal
              val[f] = (f === "mult" || f === "pipelineMult" || f === "commercialMult") ? Math.round(raw * 10) / 10 : Math.round(raw);
            }
          }
          todayImplied = { a: a.sk, b: b.sk, alpha, edge, assumptions, val, price };
        }

        return { results, normW, weightedTP, upside, cashPS: co.cash / co.sharesOut, sks, todayImplied };
      }, [state, config]);

      const CCY_MAP = { EUR: "\u20AC", USD: "$", HKD: "HK$", SEK: "kr", JPY: "\u00A5", GBP: "\u00A3", CHF: "CHF " };
      const ccyOf = c => CCY_MAP[c] || "$";
      const ccyDec = c => (c === "JPY" || c === "HKD" || c === "SEK") ? 0 : 2;
      const ccy = ccyOf(config.company.currency);
      const dec = ccyDec(config.company.currency);

      return e("div", { style: { minHeight: "100vh", background: "#0f1117", color: "#e2e4ea", padding: "28px 20px" } },
        e("div", { style: { maxWidth: 1800, margin: "0 auto" } },

          // Back button + Company search bar
          e("div", { style: { display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" } },
            e("a", { href: "index.html", style: { display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono'", background: "#161920", border: "1px solid #ffffff18", color: "#60a5fa", textDecoration: "none", cursor: "pointer", transition: "border 0.2s", whiteSpace: "nowrap" },
              onMouseEnter: ev => { ev.currentTarget.style.borderColor = "#60a5fa"; },
              onMouseLeave: ev => { ev.currentTarget.style.borderColor = "#ffffff18"; } }, "\u2190 Screener"),
            e("div", { style: { position: "relative", flex: 1, minWidth: 200, maxWidth: 400 } },
              e("input", { type: "text", value: search,
                placeholder: config.company.ticker + " \u2014 " + config.company.name + " (type to switch)",
                onFocus: () => setShowDropdown(true),
                onBlur: () => setTimeout(() => setShowDropdown(false), 200),
                onChange: ev => { setSearch(ev.target.value); setShowDropdown(true); },
                style: { width: "100%", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontFamily: "'JetBrains Mono'",
                  background: "#161920", border: "1px solid " + (showDropdown ? "#f97316" : "#ffffff18"), color: "#e2e4ea", outline: "none", transition: "border 0.2s" } }),
              showDropdown && e("div", { style: { position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, background: "#161920", border: "1px solid #ffffff18", borderRadius: 8, overflow: "hidden", zIndex: 100, maxHeight: 240, overflowY: "auto" } },
                tickers.filter(t => {
                  if (!search) return true;
                  const q = search.toLowerCase();
                  const c = configs[t].company;
                  return t.toLowerCase().includes(q) || c.name.toLowerCase().includes(q) || (c.subtitle || "").toLowerCase().includes(q);
                }).map(t => {
                  const c = configs[t].company;
                  const cached = initialPrices && initialPrices[t];
                  const displayPrice = (cached && cached.price > 0) ? cached.price : c.currentPrice;
                  const isLive = !!(cached && cached.price > 0);
                  return e("div", { key: t, onMouseDown: () => switchCo(t),
                    style: { padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
                      background: t === ticker ? "#f9731616" : "transparent", borderBottom: "1px solid #ffffff06",
                      transition: "background 0.15s" },
                    onMouseEnter: ev => { ev.target.style.background = "#ffffff08"; },
                    onMouseLeave: ev => { ev.target.style.background = t === ticker ? "#f9731616" : "transparent"; } },
                    e("div", null,
                      e("span", { style: { fontFamily: "'JetBrains Mono'", fontWeight: 700, fontSize: 13, color: t === ticker ? "#f97316" : "#e2e4ea", marginRight: 10 } }, t),
                      e("span", { style: { fontSize: 12, color: "#6b7080" } }, c.name)),
                    e("span", { style: { fontSize: 11, color: isLive ? "#e2e4ea" : "#6b7080", fontFamily: "'JetBrains Mono'", opacity: isLive ? 1 : 0.6 }, title: isLive ? "live (prices.json)" : "stale (config default — no cache)" }, ccyOf(c.currency) + Number(displayPrice).toFixed(ccyDec(c.currency)))
                  );
                }),
                tickers.filter(t => { const q = search.toLowerCase(); const c = configs[t].company; return !search || t.toLowerCase().includes(q) || c.name.toLowerCase().includes(q); }).length === 0 &&

              )
            ),

            e("button", { onClick: () => {
              setState(buildState(config));
              setPriceStatus("loading");

              const isSOTP = scen.val.pipelineDR != null;
              return e("div", { key: sk, style: { background: "#161920", borderRadius: 10, padding: "14px 16px", border: "1px solid " + CC[sk] + "22", position: "relative", overflow: "hidden" } },
                e("div", { style: { position: "absolute", top: 0, left: 0, right: 0, height: 2, background: CC[sk] } }),
                e("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 10, marginTop: 4 } },
                  e("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: CC[sk] } }, sk),
                  e("div", { style: { fontSize: 13, fontWeight: 800, fontFamily: "'JetBrains Mono'", color: CC[sk] } }, ccy + model.results[sk].tp.toFixed(dec))
                ),
                // Per-asset sliders
                config.assets.filter(a => a.id !== "commercial").map(asset => asset.indications.map(ind => {
                  const a = scen.assumptions?.[asset.id]?.[ind.id]; if (!a) return null;
                  const path = "scenarios." + sk + ".assumptions." + asset.id + "." + ind.id;
                  return e("div", { key: asset.id + "_" + ind.id, style: { marginBottom: 8 } },
                    e("div", { style: { fontSize: 10, fontWeight: 700, color: "#b0b4c0", marginBottom: 4 } }, ind.name),
                    e(Sl, { label: "Clinical (%)", value: a.pos, onChange: v => upd(path + ".pos", v), min: 0, max: 100, unit: "%", color: CC[sk] }),
                    e(Sl, { label: "Regulatory (%)", value: a.apr, onChange: v => upd(path + ".apr", v), min: 0, max: 100, unit: "%", color: CC[sk] }),
                    e(Sl, { label: "Pen mult", value: a.pen, onChange: v => upd(path + ".pen", v), min: 0.1, max: 3, step: 0.1, unit: "x", color: CC[sk] })
                  );
                })),
                // Valuation sliders — with spacer
                e("div", { style: { borderTop: "1px solid #ffffff12", paddingTop: 10, marginTop: 12 } },
                  e("div", { style: { fontSize: 9, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: "#ffffff22", marginBottom: 8 } }, "Valuation"),
                  isSOTP ? [
                    e(Sl, { key: "pdr", label: "Pipeline DR (%)", value: scen.val.pipelineDR, onChange: v => upd("scenarios." + sk + ".val.pipelineDR", v), min: 8, max: 30, unit: "%", color: CC[sk] }),
                    e(Sl, { key: "pm", label: "Pipeline mult", value: scen.val.pipelineMult, onChange: v => upd("scenarios." + sk + ".val.pipelineMult", v), min: 2, max: 8, step: 0.5, unit: "x", color: CC[sk] }),
                    e(Sl, { key: "cr", label: "Comm. rev (" + ccy + "M)", value: scen.val.commercialRevM, onChange: v => upd("scenarios." + sk + ".val.commercialRevM", v), min: 50, max: Math.max(3000, scen.val.commercialRevM * 2), unit: "M", color: CC[sk] }),
                    e(Sl, { key: "cm", label: "Comm. EV/Rev", value: scen.val.commercialMult, onChange: v => upd("scenarios." + sk + ".val.commercialMult", v), min: 1, max: 10, step: 0.5, unit: "x", color: CC[sk] }),
                    e(Sl, { key: "mi", label: "Milestones (" + ccy + "M)", value: scen.val.milestones, onChange: v => upd("scenarios." + sk + ".val.milestones", v), min: 0, max: 1500, unit: "M", color: CC[sk] }),
                    e(Sl, { key: "di", label: "Dilution (%)", value: scen.val.dil, onChange: v => upd("scenarios." + sk + ".val.dil", v), min: 0, max: 25, unit: "%", color: CC[sk] })
                  ] : [
                    e(Sl, { key: "dr", label: "DR (%)", value: scen.val.dr, onChange: v => upd("scenarios." + sk + ".val.dr", v), min: 8, max: 50, unit: "%", color: CC[sk] }),
                    e(Sl, { key: "di", label: "Dilution (%)", value: scen.val.dil, onChange: v => upd("scenarios." + sk + ".val.dil", v), min: 0, max: 40, unit: "%", color: CC[sk] }),
                    e(Sl, { key: "mu", label: "Multiple", value: scen.val.mult, onChange: v => upd("scenarios." + sk + ".val.mult", v), min: 2, max: 10, step: 0.5, unit: "x", color: CC[sk] }),
                    e(Sl, { key: "pl", label: "Platform (" + ccy + "M)", value: scen.val.plat, onChange: v => upd("scenarios." + sk + ".val.plat", v), min: 0, max: Math.max(3000, (scen.val.plat || 0) * 2), unit: "M", color: CC[sk] }),
                    e(Sl, { key: "ex", label: "Ex-US (" + ccy + "M)", value: scen.val.exus, onChange: v => upd("scenarios." + sk + ".val.exus", v), min: 0, max: Math.max(1500, (scen.val.exus || 0) * 2), unit: "M", color: CC[sk] }),
                    scen.val.cannib != null && e(Sl, { key: "ca", label: "Cannib (%)", value: scen.val.cannib, onChange: v => upd("scenarios." + sk + ".val.cannib", v), min: 0, max: 50, unit: "%", color: "#fb923c" })
                  ]
                ),
                e("div", { style: { borderTop: "1px solid #ffffff12", paddingTop: 10, marginTop: 12 } },
                  e(Sl, { label: "Scenario weight (%)", value: scen.wt, onChange: v => upd("scenarios." + sk + ".wt", v), min: 0, max: 100, unit: "%", color: CC[sk] })
                )
              );
                  })
                );
              })()
            )
          ),

          // Catalyst timeline (collapsible) -- shows up to 3 most-recent past + 4 upcoming.
          // Auto-derived from catalysts[] (refreshed by the LLM monitor). Falls back to
          // hand-curated config.context for tickers whose catalysts[] is empty.
          activeTab === "catalysts" && (() => {
            const MAX_PAST = 3;
            const MAX_FUTURE = 4;
            const today = new Date().toISOString().slice(0, 10);
            const cats = (config.catalysts || []).slice().sort((a, b) => (a.dateSort || "").localeCompare(b.dateSort || ""));
            const past = cats.filter(c => c.dateSort && c.dateSort < today);
            const future = cats.filter(c => !c.dateSort || c.dateSort >= today);

            const indName = (cat) => {
              const a = config.assets.find(x => x.id === cat.asset);
              if (!a) return "";
              const ind = a.indications.find(i => i.id === cat.indication);
              return (a.name || cat.asset) + (ind ? " \u00b7 " + (ind.name || cat.indication) : "");
            };

            // Materiality: what fraction of weighted TP depends on this catalyst's asset.
            // Computed by zeroing pos=apr=0 for the asset.indication across all scenarios
            // and comparing the new weighted TP to the base.
            const baseWTP = model.weightedTP;
            const catMateriality = (cat) => {
              if (!cat.asset || !cat.indication || !baseWTP || !isFinite(baseWTP)) return null;
              const modState = JSON.parse(JSON.stringify(state));
              for (const sk of model.sks) {
                const asmp = modState.scenarios[sk].assumptions || (modState.scenarios[sk].assumptions = {});
                asmp[cat.asset] = asmp[cat.asset] || {};
                asmp[cat.asset][cat.indication] = { pos: 0, apr: 0, pen: 1 };
              }
              let zeroWTP = 0;
              const co = { ...config.company, cash: state.cash, currentPrice: state.currentPrice };
              model.sks.forEach((sk, i) => {
                const r = computeScenario({ ...config, company: co }, sk, modState);
                zeroWTP += (r.tp || 0) * model.normW[i];
              });
              const m = Math.max(0, Math.min(1, (baseWTP - zeroWTP) / baseWTP));
              return Math.round(m * 100);
            };

            // Normalize a catalyst into a compact display object (+ materiality)
            const normCat = (cat) => ({
              title: cat.title,
              date: cat.date || cat.dateSort || "",
              type: cat.type || "",
              asset: indName(cat),
              rationale: cat._rationale || "",
              materiality: catMateriality(cat),
              sourceUrl: cat._sourceUrl,
              confidence: cat._confidence || "",
              addedAt: cat._addedAt ? cat._addedAt.slice(0, 10) : "",
            });

            // Build lists: prefer catalysts[], fall back to config.context for lastData/nextCatalyst
            let lastList = past.slice(-MAX_PAST).reverse().map(normCat);  // most recent first
            let nextList = future.slice(0, MAX_FUTURE).map(normCat);       // earliest first
            const pastExtra = Math.max(0, past.length - MAX_PAST);
            const futureExtra = Math.max(0, future.length - MAX_FUTURE);

            if (lastList.length === 0 && config.context?.lastData) {
              const ld = config.context.lastData;
              lastList = [{ title: ld.title, date: ld.date || "", type: "", asset: "", rationale: "", materiality: null, sourceUrl: null, confidence: "", addedAt: "", pointsFallback: ld.points || [] }];
            }
            if (nextList.length === 0 && config.context?.nextCatalyst) {
              const nd = config.context.nextCatalyst;
              nextList = [{ title: nd.title, date: nd.date || "", type: "", asset: "", rationale: "", materiality: null, sourceUrl: null, confidence: "", addedAt: "", pointsFallback: nd.thresholds || [] }];
            }

            // Enrich PRIMARY past + next with hand-curated bullets from config.context if titles relate
            const titleMatch = (a, b) => {
              if (!a || !b) return false;
              const na = a.toLowerCase(), nb = b.toLowerCase();
              return na === nb || na.includes(nb.slice(0, 20)) || nb.includes(na.slice(0, 20));
            };
            if (lastList[0] && !lastList[0].pointsFallback && config.context?.lastData?.points?.length) {
              if (titleMatch(lastList[0].title, config.context.lastData.title)) {
                lastList[0].curatedBullets = config.context.lastData.points;
              }
            }
            if (config.context?.nextCatalyst?.thresholds?.length) {
              // Attach the curated "what to watch" bullets to the catalyst whose
              // title matches context.nextCatalyst.title. If no match, leave
              // unattached -- bullets curated for one event (e.g. PDUFA) should
              // not bleed onto a different upcoming event (e.g. an earlier Ph3
              // readout that happens to land first on the calendar).
              const targetTitle = config.context.nextCatalyst.title;
              const targetEntry = nextList.find(c => !c.pointsFallback && titleMatch(c.title, targetTitle));
              if (targetEntry) {
                targetEntry.curatedBullets = config.context.nextCatalyst.thresholds;
              }
            }

            if (lastList.length === 0 && nextList.length === 0) return null;

            const primaryLast = lastList[0];
            const primaryNext = nextList[0];
            const nextMoreBadge = future.length > 1
              ? e("span", { style: { background: "#22c55e22", color: "#86efac", fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 4, marginLeft: 6, fontFamily: "'JetBrains Mono'" } }, "+" + (future.length - 1))
              : null;

            const linkBtn = (url) => url ? e("a", { href: url, target: "_blank", style: { fontSize: 10, color: "#60a5fa", textDecoration: "none", marginLeft: 6 }, onClick: (ev) => ev.stopPropagation() }, "\u2197") : null;

            // Materiality chip color: >25% red (binary risk), 10-25% amber, <10% neutral
            const matColor = (m) => m == null ? "#6b7080" : m >= 25 ? "#ef4444" : m >= 10 ? "#fbbf24" : "#86efac";

            // A single compact event block (used in the expanded list)
            const eventBlock = (c, isFirst, color) => e("div", {
              style: { background: "#0a0c10", border: "1px solid " + color + "22", borderRadius: 6, padding: "8px 10px", marginBottom: 6 }
            },
              e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 2 } },
                e("div", { style: { fontSize: 10, color: color, fontWeight: 700, fontFamily: "'JetBrains Mono'", letterSpacing: 0.3 } }, (c.date || "").toUpperCase()),
                c.materiality != null && e("div", {
                  style: { fontSize: 9, color: matColor(c.materiality), fontWeight: 700, fontFamily: "'JetBrains Mono'", background: matColor(c.materiality) + "18", padding: "1px 6px", borderRadius: 3, whiteSpace: "nowrap" },
                  title: "Materiality: % of weighted TP that depends on this asset.indication"
                }, "MAT: " + c.materiality + "%")
              ),
              e("div", { style: { fontSize: 11.5, color: "#e2e4ea", fontWeight: 600, marginBottom: 2, lineHeight: 1.35 } }, c.title, linkBtn(c.sourceUrl)),
              c.asset && e("div", { style: { fontSize: 10, color: "#6b7080", marginBottom: 3 } }, c.asset),
              c.rationale && e("div", { style: { fontSize: 10, color: "#8b8f99", lineHeight: 1.45, marginBottom: 3 } }, c.rationale),
              (c.pointsFallback || []).map((p, i) => e("div", { key: "pf" + i, style: { fontSize: 10, color: "#8b8f99", lineHeight: 1.45 } }, "\u2022 " + p)),
              (c.curatedBullets || []).length > 0 && e("div", { style: { marginTop: 4, marginBottom: 3, paddingTop: 4, borderTop: "1px solid #ffffff06" } },
                e("div", { style: { fontSize: 9, color: "#6b7080", marginBottom: 2, textTransform: "uppercase", letterSpacing: 0.6, fontWeight: 700 } }, "What to watch"),
                (c.curatedBullets || []).map((p, i) => e("div", { key: "cb" + i, style: { fontSize: 10, color: "#b0b4c0", lineHeight: 1.45 } }, "\u2022 " + p))
              ),
              e("div", { style: { display: "flex", gap: 8, marginTop: 4, fontSize: 9, color: "#555", flexWrap: "wrap" } },
                c.type && e("span", { style: { background: "#ffffff08", padding: "1px 5px", borderRadius: 3 } }, c.type.replace(/_/g, " ")),
                c.confidence && e("span", {}, "conf: " + c.confidence),
                c.addedAt && e("span", {}, "refr: " + c.addedAt)
              )
            );

            return e("div", { style: { marginBottom: 14 } },
              e("div", { onClick: () => setShowContext(!showContext), style: { background: "#161920", borderRadius: showContext ? "10px 10px 0 0" : 10, padding: "10px 16px", border: "1px solid #ffffff06", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none" } },
                e("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: "#b0b4c0" } },
                  "Last & Next catalyst \u00b7 ",
                  primaryLast && e("span", { style: { color: "#f97316", fontWeight: 600 } }, primaryLast.title),
                  primaryLast && primaryNext && e("span", { style: { color: "#6b7080" } }, " \u2192 "),
                  primaryNext && e("span", { style: { color: "#22c55e", fontWeight: 600 } }, primaryNext.title),
                  nextMoreBadge
                ),
                e("div", { style: { fontSize: 10, color: "#6b7080", transition: "transform 0.2s", transform: showContext ? "rotate(180deg)" : "rotate(0deg)" } }, "\u25BC")
              ),
              showContext && e("div", { style: { background: "#161920", borderRadius: "0 0 10px 10px", padding: "12px 14px", borderLeft: "1px solid #ffffff06", borderRight: "1px solid #ffffff06", borderBottom: "1px solid #ffffff06", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 } },
                // LEFT: past (orange)
                e("div", {},
                  e("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: 1.2, color: "#f97316", marginBottom: 6, textTransform: "uppercase" } }, "\u25C4 Recent events" + (pastExtra > 0 ? " (" + past.length + " total)" : "")),
                  lastList.length === 0
                    ? e("div", { style: { fontSize: 10, color: "#555", padding: "6px 2px" } }, "No past events recorded")
                    : lastList.map((c, i) => e(React.Fragment, { key: "l" + i }, eventBlock(c, i === 0, "#f97316"))),
                  pastExtra > 0 && e("div", { style: { fontSize: 10, color: "#6b7080", fontStyle: "italic", marginTop: 2 } }, "+" + pastExtra + " earlier")
                ),
                // RIGHT: future (green)
                e("div", {},
                  e("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: 1.2, color: "#22c55e", marginBottom: 6, textTransform: "uppercase" } }, "\u25BA Upcoming" + (futureExtra > 0 ? " (" + future.length + " total)" : "")),
                  nextList.length === 0
                    ? e("div", { style: { fontSize: 10, color: "#555", padding: "6px 2px" } }, "No upcoming catalysts")
                    : nextList.map((c, i) => e(React.Fragment, { key: "n" + i }, eventBlock(c, i === 0, "#22c55e"))),
                  futureExtra > 0 && e("div", { style: { fontSize: 10, color: "#6b7080", fontStyle: "italic", marginTop: 2 } }, "+" + futureExtra + " further out")
                )
              )
            );
          })(),

          // Risks
          activeTab === "risks" && config.context?.risks && e("div", { style: { background: "#161920", borderRadius: 10, padding: "14px 16px", border: "1px solid #ef444418", marginBottom: 22 } },
            e("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: "#ef4444", marginBottom: 8 } }, "Key Risks"),
            e("div", { style: { display: "flex", gap: 16, flexWrap: "wrap" } },
              config.context.risks.map((r, i) => e("div", { key: i, style: { fontSize: 11, color: "#6b7080" } }, "\u25cf " + r))
            )
          ),

          // Methodology (collapsible)
          activeTab === "risks" && e("div", { style: { marginBottom: 16 } },
            e("div", { onClick: () => setShowMethodology(!showMethodology), style: { background: "#161920", borderRadius: showMethodology ? "10px 10px 0 0" : 10, padding: "10px 16px", border: "1px solid #ffffff06", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", userSelect: "none" } },
              e("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: "#b0b4c0" } }, "Methodology & Explanation"),
              e("div", { style: { fontSize: 10, color: "#6b7080", transition: "transform 0.2s", transform: showMethodology ? "rotate(180deg)" : "rotate(0deg)" } }, "\u25BC")
            ),
            showMethodology && e("div", { style: { background: "#161920", borderRadius: "0 0 10px 10px", padding: "18px 20px", borderLeft: "1px solid #ffffff06", borderRight: "1px solid #ffffff06", borderBottom: "1px solid #ffffff06", fontSize: 11, color: "#6b7080", lineHeight: 1.7 } },
            e("strong", { style: { color: "#f97316" } }, "Valuation framework"), e("br"),
            "Two models coexist depending on company structure:", e("br"), e("br"),
            e("strong", { style: { color: "#b0b4c0" } }, "Standard rNPV (pure pipeline companies):"), e("br"),
            "Scenario TP = [ \u03A3(RA\u1D62 \u00d7 Multiple) + (Platform + ExUS) \u00d7 \u03B1 ] / (1+DR)\u207F + Cash ] / Shares \u00d7 (1 \u2212 Dilution)", e("br"),
            "Where RA\u1D62 = Peak Revenue\u1D62 \u00d7 Pen Multiplier\u1D62 \u00d7 PoS\u1D62 \u00d7 Approval\u1D62", e("br"),
            "And \u03B1 = RA / Gross Revenue (scales platform/exUS by composite probability)", e("br"), e("br"),
            e("strong", { style: { color: "#b0b4c0" } }, "SOTP (companies with commercial revenue + pipeline):"), e("br"),
            "EV = Commercial EV + Pipeline rNPV + Milestones (RA) + Cash", e("br"),
            "\u2022 Commercial EV = Steady-state Revenue \u00d7 EV/Revenue Multiple (no discount \u2014 current recurring income)", e("br"),
            "\u2022 Pipeline rNPV = [ \u03A3(RA\u1D62 \u00d7 Pipeline Multiple) ] / (1 + Pipeline DR)\u207F", e("br"),
            "\u2022 Milestones = Total Milestones \u00d7 Lead Asset Composite PoS (risk-adjusted by approval probability)", e("br"),
            "\u2022 TP = EV / Shares \u00d7 (1 \u2212 Dilution)", e("br"), e("br"),
            e("strong", { style: { color: "#f97316" } }, "Market sizing"), e("br"),
            "Two approaches per indication:", e("br"),
            "\u2022 Bottom-up: Addressable Patients (K) \u00d7 Annual Pricing ($K) \u00d7 Peak Penetration (%) \u00d7 Pen Multiplier = Peak Revenue ($M)", e("br"),
            "\u2022 Top-down: TAM ($B) \u00d7 (1 + CAGR)^n \u00d7 (1 + Market Expansion) \u00d7 Peak Penetration (%) \u00d7 Pen Multiplier \u00d7 1000 = Peak Revenue ($M)", e("br"), e("br"),
            e("strong", { style: { color: "#f97316" } }, "Risk parameters"), e("br"),
            "\u2022 Clinical data (%): probability the asset produces approvable data. Set to ~95% for completed trials, lower for ongoing.", e("br"),
            "\u2022 Regulatory (%): probability of regulatory approval given existing data. Independent from clinical PoS.", e("br"),
            "\u2022 Composite PoS = Clinical \u00d7 Regulatory. This is the probability-weight applied to peak revenue.", e("br"),
            "\u2022 Discount Rate: time-value adjustment. Higher for early-stage (25-35%), lower for near-commercial (10-15%).", e("br"),
            "\u2022 Dilution: expected equity dilution from future financing rounds. Reduces TP proportionally.", e("br"),
            "\u2022 Pen Multiplier: scales peak penetration by scenario conviction (bear <1x, bull >1x).", e("br"), e("br"),
            e("strong", { style: { color: "#f97316" } }, "Weighted Target Price"), e("br"),
            "Weighted TP = \u03A3 (Scenario\u1D62 TP \u00d7 P(Scenario\u1D62))", e("br"),
            "Where P(scenario) = scenario weight / sum of all weights. Supports 3-5 scenarios (megabear / bear / base / bull / bluesky). Weights represent analyst conviction, not market-implied probabilities.", e("br"), e("br"),
            e("strong", { style: { color: "#f97316" } }, "Cannibalization (multi-asset)"), e("br"),
            "When two assets serve overlapping markets (e.g. IV + SC formulation), cannibalization reduces total RA: Net RA = Gross RA \u00d7 (1 \u2212 Cannib%). Applied before discounting.", e("br"), e("br"),
            e("strong", { style: { color: "#f97316" } }, "Live price"), e("br"),
            "Stock price fetched from Yahoo Finance on page load. Upside = (Weighted TP / Stock Price \u2212 1) \u00d7 100%. Price is editable for scenario analysis.", e("br"), e("br"),
            e("span", { style: { color: "#555" } }, "Models are illustrative and for educational purposes only. Not financial advice. Do your own research.")
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
