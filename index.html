  // Render the Portfolio Kelly Optimizer card as an HTML string.
  function renderKellyCard(){
    let h='';
    h+='<div style="margin-top:16px;padding-top:16px;border-top:1px solid #ffffff10"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;cursor:pointer;margin-bottom:8px" onclick="window._kellyToggle()">';
    h+='<div style="font-size:.88rem;font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:linear-gradient(180deg,#fbbf24,#22c55e);vertical-align:middle;margin-right:8px"></span>Portfolio Kelly Optimizer <span style="font-size:.62rem;color:#6b7080;font-weight:400;margin-left:6px">multi-asset \u00b7 taxonomy-correlated</span></div>';
    h+=`<div style="font-size:.7rem;color:#6b7080">${kellyOpen?'\u25BE collapse':'\u25B8 expand'}</div>`;
    h+='</div>';
    if(kellyOpen){
      const uniN=kellyUniverse.length;
      const hasFilters=(filterL1.size||filterL2.size||filterL3.size||filterL4.size||filterMod1||filterMod2||filterMod3||filterPhase||filterRare!==null||activeFilter);
      const uniLbl=hasFilters?`<span style="color:#fbbf24;font-weight:600">${uniN} names</span> (filtered from ${rows.length}) \u2014 <span style="color:#6b7080;cursor:pointer;text-decoration:underline" onclick="window._fClear()">clear filters</span> to use full universe`:`<span style="color:#b0b4c0;font-weight:600">${uniN} names</span> (no filters active \u2014 full universe)`;
      h+=`<div class="card-sub">Universe: ${uniLbl}. Solves f* = argmax E[ln(1 + \u03A3 f\u1D62\u00B7r\u1D62)] with taxonomy-based correlation: same-L3 \u03C1=0.70, same-L2 \u03C1=0.45, same-L1 \u03C1=0.25, sector beta \u03C1=0.15.</div>`;
      if(kellyResult && kellyResult._universeSize!==uniN){
        h+=`<div style="background:#7c2d1222;border:1px solid #f59e0b66;border-radius:4px;padding:6px 10px;margin-bottom:10px;font-size:.7rem;color:#fbbf24">\u26A0 Filter changed since last run (was ${kellyResult._universeSize} names, now ${uniN}). Re-run to update results.</div>`;
      }
      // Controls
      h+='<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid #ffffff0a;margin-bottom:12px">';
      h+='<div style="display:flex;gap:4px;align-items:center"><span style="font-size:.7rem;color:#6b7080">Kelly fraction:</span>';
      [[1.0,'Full'],[0.5,'Half'],[0.25,'Quarter'],[0.125,'Eighth']].forEach(([v,lbl])=>{
        const act=Math.abs(kellyOpts.kFrac-v)<1e-6;
        h+=`<span class="fchip ${act?'active':''}" onclick="window._kellyFrac(${v})" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
      });
      h+='</div>';
      h+=`<div style="display:flex;gap:6px;align-items:center"><span style="font-size:.7rem;color:#6b7080">Max per name:</span><input type="range" min="5" max="50" step="5" value="${Math.round(kellyOpts.maxPos*100)}" oninput="window._kellyMaxPos(this.value)" style="width:80px"><span style="font-family:var(--mono);font-size:.7rem;color:#b0b4c0;min-width:32px">${Math.round(kellyOpts.maxPos*100)}%</span></div>`;
      h+=`<div style="display:flex;gap:6px;align-items:center"><span style="font-size:.7rem;color:#6b7080">Max per L1:</span><input type="range" min="20" max="100" step="5" value="${Math.round(kellyOpts.maxL2*100)}" oninput="window._kellyMaxL2(this.value)" style="width:80px"><span style="font-family:var(--mono);font-size:.7rem;color:#b0b4c0;min-width:32px">${Math.round(kellyOpts.maxL2*100)}%</span></div>`;
      h+=`<span class="fchip ${kellyRunning?'':'active'}" style="padding:4px 12px;font-size:.7rem;background:${kellyRunning?'#333':'#fbbf2422'};border-color:${kellyRunning?'#666':'#fbbf2466'};color:${kellyRunning?'#888':'#fbbf24'}" onclick="${kellyRunning?'':'window._kellyRun()'}">${kellyRunning?'\u23F3 Running...':'\u25B6 Run Monte Carlo ('+kellyOpts.N+' samples)'}</span>`;
      h+='</div>';

      if(!kellyResult && !kellyRunning){
        h+='<div style="padding:20px;text-align:center;color:#6b7080;font-size:.75rem">Click <b>Run</b> to compute optimal portfolio weights across the <b>'+uniN+' filtered names</b>. Takes ~1-2 seconds.</div>';
      } else if(kellyRunning){
        h+='<div style="padding:20px;text-align:center;color:#fbbf24;font-size:.75rem">\u23F3 Sampling correlated scenarios and optimizing... this takes ~1-2s.</div>';
      } else if(kellyResult){
        const kr=kellyResult;
        const held=kr.weights.filter(w=>w.w>0.005);
        const excluded=kr.weights.filter(w=>w.w<=0.005);
        h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">';
        const stat=(lbl,val,col)=>`<div style="background:#0a0c10;border:1px solid #ffffff10;border-radius:4px;padding:8px"><div style="font-size:.6rem;color:#6b7080;margin-bottom:2px">${lbl}</div><div style="font-size:1rem;font-weight:700;color:${col};font-family:var(--mono)">${val}</div></div>`;
        const pctS=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
        h+=stat('TOTAL DEPLOYED',(kr.totalDeployed*100).toFixed(0)+'%','#60a5fa');
        h+=stat('E[LOG RETURN]',pctS(kr.expectedLog),kr.expectedLog>0?'#22c55e':'#ef4444');
        h+=stat('MEDIAN RETURN',pctS(kr.pct50),kr.pct50>0?'#22c55e':'#ef4444');
        h+=stat('5%-95% RANGE',pctS(kr.pct5)+' \u2192 '+pctS(kr.pct95),'#b0b4c0');
        h+=stat('P(DRAWDOWN > 20%)',(kr.drawdownProb*100).toFixed(0)+'%',kr.drawdownProb<0.15?'#22c55e':kr.drawdownProb<0.30?'#fbbf24':'#ef4444');
        h+='</div>';

        h+='<div style="font-size:.7rem;color:#fbbf24;font-weight:600;letter-spacing:.5px;margin-bottom:6px">RECOMMENDED POSITIONS ('+held.length+' names, '+kr.K+' considered)</div>';
        if(held.length===0){
          h+='<div style="color:#6b7080;font-size:.75rem;padding:12px">No positive-edge positions at current price / scenario weights. All tickers had negative or zero optimal weight.</div>';
        } else {
          h+='<div style="display:grid;grid-template-columns:60px 1fr 80px 80px 80px;gap:4px;padding:4px 0;border-bottom:1px solid #ffffff15;font-size:.62rem;color:#6b7080;letter-spacing:.5px">';
          h+='<div>TICKER</div><div>AREA</div><div style="text-align:right">WEIGHT</div><div style="text-align:right">FULL-K</div><div style="text-align:right">E[r]</div>';
          h+='</div>';
          held.forEach(w=>{
            const wPct=(w.w*100).toFixed(1);
            const wFullPct=(w.wFull*100).toFixed(0);
            const expPct=((w.expR)*100).toFixed(0);
            const barW=Math.min(100,w.w/kr.maxPos*100);
            h+=`<div style="display:grid;grid-template-columns:60px 1fr 80px 80px 80px;gap:4px;padding:5px 0;border-bottom:1px solid #ffffff06;font-size:.72rem;align-items:center">`;
            h+=`<a href="model.html?ticker=${w.ticker}" style="font-weight:700;color:#e2e4ea;text-decoration:none;font-family:var(--mono)">${w.ticker}</a>`;
            h+=`<div style="color:#b0b4c0;font-size:.65rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${w.area}">${w.area.replace(/_/g,' ')}</div>`;
            h+=`<div style="text-align:right;font-family:var(--mono);font-weight:700;color:#22c55e;position:relative"><div style="position:absolute;right:0;top:50%;transform:translateY(-50%);width:${barW}%;height:14px;background:linear-gradient(90deg,#22c55e22,#22c55e44);border-right:2px solid #22c55e;z-index:0"></div><span style="position:relative;z-index:1">${wPct}%</span></div>`;
            h+=`<div style="text-align:right;font-family:var(--mono);color:#6b7080">${wFullPct}%</div>`;
            h+=`<div style="text-align:right;font-family:var(--mono);color:${w.expR>0?'#22c55e':'#ef4444'}">${w.expR>=0?'+':''}${expPct}%</div>`;
            h+=`</div>`;
          });
        }

        if(excluded.length>0){
          h+=`<div style="margin-top:10px;font-size:.65rem;color:#6b7080"><b>Not held (${excluded.length}):</b> `;
          h+=excluded.map(w=>w.ticker).join(', ');
          h+=' <span style="color:#555">\u2014 negative edge, worse risk-adjusted than peers, or displaced by correlation.</span></div>';
        }

        h+='<div style="margin-top:10px;padding:8px;background:#0a0c10;border-left:3px solid #fbbf24;font-size:.7rem;color:#b0b4c0;line-height:1.5">';
        const fracLbl = kr.kFrac===1?'full':kr.kFrac===0.5?'half':kr.kFrac===0.25?'quarter':(kr.kFrac*100).toFixed(0)+'%';
        h+=`<b style="color:#fbbf24">\u{1F4CA} How to read:</b> At <b>${fracLbl}-Kelly</b> with max ${(kr.maxPos*100).toFixed(0)}% per name and ${(kr.maxL2*100).toFixed(0)}% per L1 sector, the optimizer allocates <b>${(kr.totalDeployed*100).toFixed(0)}%</b> of equity across <b>${held.length}</b> names. Remaining <b>${(100-kr.totalDeployed*100).toFixed(0)}%</b> in cash. Expected geometric return: <b>${pctS(kr.expectedLog)}</b> per period. Try <b>Full Kelly</b> to see max-growth sizing (very concentrated), or <b>Quarter Kelly</b> for defensive (robust to probability misspecification).`;
        h+='</div>';
      }
    }
    h+='</div>';
    return h;
  }

  // Render the Catalyst-Aware Kelly Schedule card.
  // Uses the current kellyUniverse, kellyResult.weights (as baseline), and catalysts on each row.
  function renderCatalystKellyCard(){
    let h='';
    h+='<div style="margin-top:20px;padding-top:16px;border-top:1px solid #ffffff10"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;cursor:pointer;margin-bottom:8px" onclick="window._catKellyToggle()">';
    h+='<div style="font-size:.88rem;font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:linear-gradient(180deg,#22c55e,#ef4444);vertical-align:middle;margin-right:8px"></span>Catalyst-Aware Kelly Schedule <span style="font-size:.62rem;color:#6b7080;font-weight:400;margin-left:6px">event-driven \u00b7 smooth Gaussian kernel</span></div>';
    h+=`<div style="font-size:.7rem;color:#6b7080">${catKellyOpen?'\u25BE collapse':'\u25B8 expand'}</div>`;
    h+='</div>';
    if(!catKellyOpen){ h+='</div>'; return h; }

    // Require: kellyResult available (structural baseline)
    if(!kellyResult){
      h+='<div class="card-sub">Run the Portfolio Kelly Optimizer above first \u2014 this card uses its weights as the structural baseline.</div>';
      h+='</div>'; return h;
    }

    // Gather catalysts across current universe (same filter as Kelly)
    const universe=kellyUniverse;
    const uniTix=new Set(universe.map(r=>r.ticker));
    const catalysts=[];
    universe.forEach(r=>{ (r.catalysts||[]).forEach(c=>catalysts.push({...c,ticker:r.ticker})); });

    // Build schedule
    const schedule=buildCatalystSchedule(universe, catalysts, kellyResult.weights, catKellyOpts);
    const opts=catKellyOpts;

    h+=`<div class="card-sub">Baseline from Portfolio Kelly above (${(kellyResult.totalDeployed*100).toFixed(0)}% deployed), modulated by upcoming catalysts via Gaussian kernel (\u03C3=${opts.sigma}d). No hard entries/exits \u2014 weights rise smoothly toward each catalyst and decay after.</div>`;

    // Controls row
    h+='<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid #ffffff0a;margin-bottom:12px">';
    h+='<div style="display:flex;gap:4px;align-items:center"><span style="font-size:.7rem;color:#6b7080">Horizon:</span>';
    [[3,'3m'],[6,'6m'],[12,'12m'],[24,'24m']].forEach(([v,lbl])=>{
      const act=opts.horizonM===v;
      h+=`<span class="fchip ${act?'active':''}" onclick="window._catKellyHorizon(${v})" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
    });
    h+='</div>';
    h+='<div style="display:flex;gap:4px;align-items:center"><span style="font-size:.7rem;color:#6b7080">Kelly:</span>';
    [[1.0,'Full'],[0.5,'Half'],[0.25,'Quarter'],[0.125,'Eighth']].forEach(([v,lbl])=>{
      const act=Math.abs(opts.kFrac-v)<1e-6;
      h+=`<span class="fchip ${act?'active':''}" onclick="window._catKellyFrac(${v})" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
    });
    h+='</div>';
    h+=`<div style="display:flex;gap:6px;align-items:center" title="0 = ignore catalysts (pure structural Kelly); 1 = max catalyst weighting"><span style="font-size:.7rem;color:#6b7080">Catalyst influence:</span><input type="range" min="0" max="100" step="5" value="${Math.round(opts.catInfluence*100)}" oninput="window._catKellyInfluence(this.value)" style="width:90px"><span style="font-family:var(--mono);font-size:.7rem;color:#b0b4c0;min-width:32px">${Math.round(opts.catInfluence*100)}%</span></div>`;
    h+=`<div style="display:flex;gap:6px;align-items:center" title="Kernel width: how many days before/after a catalyst it influences weight"><span style="font-size:.7rem;color:#6b7080">Kernel \u03C3:</span>`;
    [[7,'7d'],[21,'21d'],[45,'45d']].forEach(([v,lbl])=>{
      const act=opts.sigma===v;
      h+=`<span class="fchip ${act?'active':''}" onclick="window._catKellySigma(${v})" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
    });
    h+='</div>';
    h+='</div>';

    // Tabs
    h+='<div style="display:flex;gap:4px;margin-bottom:10px">';
    [['calendar','\uD83D\uDCC5 Calendar (time series)'],['simulation','\uD83C\uDFB2 Simulation (walk-forward)'],['events','\uD83D\uDCCA Events table']].forEach(([k,lbl])=>{
      const act=catKellyTab===k;
      h+=`<span class="fchip ${act?'active':''}" onclick="window._catKellyTab('${k}')" style="padding:4px 10px;font-size:.7rem">${lbl}</span>`;
    });
    h+='</div>';

    // ============== Tab content ==============
    if(catKellyTab==='calendar'){
      // Stacked area chart (SVG)
      const {timeline, series, tickers, peak, steps, totals, horizonD}=schedule;
      const heldTix=tickers.filter(tk=>peak[tk]>0.005).sort((a,b)=>peak[b]-peak[a]);
      if(!heldTix.length){
        h+='<div style="padding:30px;text-align:center;color:#6b7080;font-size:.75rem">No positions with peak weight above 0.5%. Relax filters or lower the Kelly fraction.</div>';
      } else {
        const W=820, H=280, padL=40, padR=8, padT=10, padB=30;
        const plotW=W-padL-padR, plotH=H-padT-padB;
        // Pre-compute stacked y values
        const stack=heldTix.map(()=>new Float64Array(steps));
        for(let i=0;i<steps;i++){
          let acc=0;
          heldTix.forEach((tk,bi)=>{ acc+=series[tk][i]; stack[bi][i]=acc; });
        }
        const yMax=1.0; // weights are fractions
        const xAt=i=>padL+(timeline[i]/horizonD)*plotW;
        const yAt=v=>padT+(1-v/yMax)*plotH;
        // Color palette (distinct per ticker)
        const PAL=['#60a5fa','#a855f7','#22c55e','#fbbf24','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6','#8b5cf6','#f59e0b','#10b981','#e11d48','#0ea5e9'];
        h+=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="background:#0a0c10;border:1px solid #ffffff10;border-radius:6px;display:block">`;
        // Grid lines (horizontal, 25/50/75/100%)
        [0.25,0.50,0.75,1.0].forEach(v=>{
          h+=`<line x1="${padL}" y1="${yAt(v)}" x2="${W-padR}" y2="${yAt(v)}" stroke="#ffffff10" stroke-dasharray="3,3"/>`;
          h+=`<text x="${padL-4}" y="${yAt(v)+3}" text-anchor="end" fill="#6b7080" font-size="9" font-family="monospace">${(v*100).toFixed(0)}%</text>`;
        });
        // X axis month marks
        const today=new Date();
        const months=Math.ceil(opts.horizonM);
        for(let m=0;m<=months;m++){
          const d=new Date(today); d.setMonth(d.getMonth()+m);
          const x=padL+(m*30/horizonD)*plotW;
          if(x>W-padR) break;
          h+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-padB}" stroke="#ffffff08"/>`;
          h+=`<text x="${x}" y="${H-padB+14}" text-anchor="middle" fill="#6b7080" font-size="9" font-family="monospace">${d.toLocaleString('en',{month:'short'})}</text>`;
        }
        // Stacked area bands (bottom-up)
        heldTix.forEach((tk,bi)=>{
          const col=PAL[bi%PAL.length];
          let pts=[];
          // Top edge (current layer)
          for(let i=0;i<steps;i++) pts.push(`${xAt(i)},${yAt(stack[bi][i])}`);
          // Bottom edge (previous layer, reversed)
          for(let i=steps-1;i>=0;i--){ const below=bi===0?0:stack[bi-1][i]; pts.push(`${xAt(i)},${yAt(below)}`); }
          h+=`<polygon points="${pts.join(' ')}" fill="${col}" fill-opacity="0.55" stroke="${col}" stroke-width="0.5"><title>${tk} \u00b7 peak ${(peak[tk]*100).toFixed(1)}%</title></polygon>`;
        });
        // Catalyst event markers (vertical dashed lines)
        schedule.eventTable.filter(c=>!c.skipped && uniTix.has(c.ticker)).forEach(c=>{
          const x=padL+(c.daysOut/horizonD)*plotW;
          if(x<padL||x>W-padR) return;
          h+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-padB}" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2,4" opacity="0.4"><title>${c.ticker} ${(c.date||c.dateSort)}: ${c.title||c.type}</title></line>`;
          h+=`<circle cx="${x}" cy="${padT+6}" r="3" fill="#fbbf24"><title>${c.ticker}: ${(c.date||c.dateSort)}</title></circle>`;
        });
        h+='</svg>';
        // Legend
        h+='<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:.68rem">';
        heldTix.slice(0,20).forEach((tk,bi)=>{
          const col=PAL[bi%PAL.length];
          h+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:${col};opacity:.7;border-radius:2px;display:inline-block"></span><a href="model.html?ticker=${tk}" style="color:#b0b4c0;text-decoration:none;font-family:var(--mono)">${tk}</a><span style="color:#6b7080">peak ${(peak[tk]*100).toFixed(1)}%</span></span>`;
        });
        h+='</div>';
        // Summary line
        let maxTotal=0, argMax=0;
        for(let i=0;i<steps;i++){ if(totals[i]>maxTotal){ maxTotal=totals[i]; argMax=i; } }
        const peakDate=new Date(today); peakDate.setDate(peakDate.getDate()+timeline[argMax]);
        const meanDeploy=Array.from(totals).reduce((a,b)=>a+b,0)/steps;
        h+=`<div style="margin-top:8px;padding:8px;background:#0a0c10;border-left:3px solid #22c55e;font-size:.7rem;color:#b0b4c0;line-height:1.5">`;
        h+=`<b style="color:#22c55e">\u{1F4CA} Schedule summary:</b> Peak exposure <b>${(maxTotal*100).toFixed(0)}%</b> around <b>${peakDate.toLocaleDateString('en',{month:'short',day:'numeric'})}</b>. Mean deployment <b>${(meanDeploy*100).toFixed(0)}%</b> over the ${opts.horizonM}m horizon. Weights shown are already net of the ${Math.round(opts.catInfluence*100)}% catalyst-influence blend and the ${opts.kFrac===1?'full':opts.kFrac===0.5?'half':opts.kFrac===0.25?'quarter':'eighth'}-Kelly scaling.`;
        h+='</div>';
      }
    } else if(catKellyTab==='simulation'){
      // Walk-forward MC on filtered catalysts
      const valid=schedule.eventTable.filter(c=>!c.skipped && uniTix.has(c.ticker));
      const sim=walkForwardKellySim(valid, opts, opts.N);
      if(!sim){
        h+='<div style="padding:30px;text-align:center;color:#6b7080;font-size:.75rem">No valid catalyst events in horizon (try lengthening horizon or lowering min Kelly).</div>';
      } else {
        // Stats tiles
        const pctS=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
        h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">';
        const stat=(lbl,val,col,sub)=>`<div style="background:#0a0c10;border:1px solid #ffffff10;border-radius:4px;padding:8px"><div style="font-size:.6rem;color:#6b7080;margin-bottom:2px">${lbl}</div><div style="font-size:1rem;font-weight:700;color:${col};font-family:var(--mono)">${val}</div>${sub?`<div style="font-size:.58rem;color:#555;margin-top:2px">${sub}</div>`:''}</div>`;
        h+=stat('EVENTS SIMULATED', sim.events, '#60a5fa', sim.N+' paths');
        h+=stat('MEDIAN RETURN', pctS(sim.median), sim.median>0?'#22c55e':'#ef4444', 'terminal');
        h+=stat('E[LOG RETURN]', pctS(sim.meanLog), sim.meanLog>0?'#22c55e':'#ef4444', 'geometric');
        h+=stat('5% \u2192 95%', pctS(sim.p5)+' \u2192 '+pctS(sim.p95), '#b0b4c0', 'tail range');
        h+=stat('P(loss)', (sim.probLoss*100).toFixed(0)+'%', sim.probLoss<0.3?'#22c55e':sim.probLoss<0.5?'#fbbf24':'#ef4444', 'pathwise DD p95 '+(sim.p95DD*100).toFixed(0)+'%');
        h+='</div>';

        // Histogram of terminal wealth
        const finals=sim.finals;
        const n=finals.length;
        const lo=Math.max(finals[Math.floor(n*0.01)], 0.01);
        const hi=Math.min(finals[Math.floor(n*0.99)], 10);
        const bins=40;
        const bw=(hi-lo)/bins;
        const hist=new Array(bins).fill(0);
        finals.forEach(f=>{ const bi=Math.min(bins-1,Math.max(0,Math.floor((f-lo)/bw))); hist[bi]++; });
        const hMax=Math.max(...hist);
        const W=820,H=180,padL=30,padR=8,padT=10,padB=28;
        const plotW=W-padL-padR, plotH=H-padT-padB;
        h+=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="background:#0a0c10;border:1px solid #ffffff10;border-radius:6px;display:block;margin-bottom:6px">`;
        // Break-even line (x at capital=1)
        const xBreak=padL+((1-lo)/(hi-lo))*plotW;
        if(xBreak>padL && xBreak<W-padR){
          h+=`<line x1="${xBreak}" y1="${padT}" x2="${xBreak}" y2="${H-padB}" stroke="#ffffff33" stroke-dasharray="3,3"/>`;
          h+=`<text x="${xBreak}" y="${padT+10}" text-anchor="middle" fill="#b0b4c0" font-size="9" font-family="monospace">break-even</text>`;
        }
        hist.forEach((c,i)=>{
          const x=padL+(i/bins)*plotW;
          const w=(plotW/bins)-1;
          const hh=(c/hMax)*plotH;
          const binCenter=lo+(i+0.5)*bw;
          const col=binCenter<1?'#ef4444':'#22c55e';
          h+=`<rect x="${x}" y="${H-padB-hh}" width="${w}" height="${hh}" fill="${col}" fill-opacity="0.6"/>`;
        });
        // X axis labels
        [0,0.5,1].forEach(q=>{
          const v=lo+q*(hi-lo);
          const x=padL+q*plotW;
          h+=`<text x="${x}" y="${H-padB+14}" text-anchor="middle" fill="#6b7080" font-size="9" font-family="monospace">\u00D7${v.toFixed(2)}</text>`;
        });
        h+=`<text x="${W-padR}" y="${H-padB+14}" text-anchor="end" fill="#6b7080" font-size="9" font-family="monospace">\u00D7${hi.toFixed(2)}</text>`;
        h+='</svg>';
        h+=`<div style="font-size:.65rem;color:#6b7080;text-align:center">Terminal wealth distribution after ${sim.events} sequential catalyst bets, starting from $1. Red bins = capital lost, green = gain.</div>`;
        h+=`<div style="margin-top:10px;padding:8px;background:#0a0c10;border-left:3px solid #22c55e;font-size:.7rem;color:#b0b4c0;line-height:1.5"><b style="color:#22c55e">\u{1F3B2} How to read:</b> After following the ${opts.kFrac===0.5?'half':opts.kFrac===0.25?'quarter':opts.kFrac===0.125?'eighth':'full'}-Kelly sequence through <b>${sim.events} catalysts</b>, median outcome is <b>${pctS(sim.median)}</b> with <b>${(sim.probLoss*100).toFixed(0)}%</b> chance of ending below starting capital. Worst 5% of paths drawdown to <b>${pctS(sim.p5)}</b>; best 5% reach <b>${pctS(sim.p95)}</b>. Geometric return ${pctS(sim.meanLog)} is the number to optimize \u2014 not the mean.</div>`;
      }
    } else if(catKellyTab==='events'){
      const evs=schedule.eventTable.filter(c=>uniTix.has(c.ticker)).sort((a,b)=>a.daysOut-b.daysOut);
      if(!evs.length){
        h+='<div style="padding:30px;text-align:center;color:#6b7080;font-size:.75rem">No catalyst events in horizon.</div>';
      } else {
        h+='<div style="display:grid;grid-template-columns:80px 60px 1fr 55px 75px 60px 70px 55px;gap:4px;padding:5px 0;border-bottom:1px solid #ffffff15;font-size:.6rem;color:#6b7080;letter-spacing:.5px">';
        h+='<div>DATE</div><div>TICKER</div><div>EVENT</div><div style="text-align:right">PoS</div><div style="text-align:right">+%/-%</div><div style="text-align:right">MAT.</div><div style="text-align:right">KELLY f*</div><div style="text-align:right">BUMP</div>';
        h+='</div>';
        evs.forEach(c=>{
          const kCol=c.skipped?'#555':c.kelly>0.15?'#22c55e':c.kelly>0.05?'#fbbf24':'#ef4444';
          const erCol=c.expR>0?'#22c55e':'#ef4444';
          h+=`<div style="display:grid;grid-template-columns:80px 60px 1fr 55px 75px 60px 70px 55px;gap:4px;padding:5px 0;border-bottom:1px solid #ffffff06;font-size:.72rem;align-items:center">`;
          h+=`<div style="color:#b0b4c0;font-family:var(--mono);font-size:.68rem">${(c.date||c.dateSort)||'?'}</div>`;
          h+=`<a href="model.html?ticker=${c.ticker}" style="font-weight:700;color:#60a5fa;text-decoration:none;font-family:var(--mono)">${c.ticker}</a>`;
          h+=`<div style="color:#b0b4c0;font-size:.68rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(c.title||c.type||'')} (d+${c.daysOut})">${c.title||c.type||''}</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:#b0b4c0">${c.yourPoS||0}%</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);font-size:.66rem"><span style="color:#22c55e">+${c.successMove}</span>/<span style="color:#ef4444">${c.failMove}</span></div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:#b0b4c0">${c.materiality||0}%</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);font-weight:700;color:${kCol}">${(c.kelly*100).toFixed(0)}%${c.skipped?' \u2716':''}</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:${c.eventBump>0?'#60a5fa':'#555'}">${c.eventBump>0?'+'+(c.eventBump*100).toFixed(1)+'%':'\u2014'}</div>`;
          h+=`</div>`;
        });
        h+=`<div style="margin-top:10px;font-size:.65rem;color:#6b7080">Skipped events (Kelly &lt; ${(opts.minKelly*100).toFixed(0)}% threshold) are shown grayed. <b>BUMP</b> = peak weight contribution after half-Kelly scaling and catalyst-influence blend.</div>`;
      }
    }
    h+='</div>'; // close card wrapper
    return h;
  }

  function bucketOf(r){
    if(r.isPrivate)return 'private';
    if(r.tps.bear!=null&&r.price<r.tps.bear)return 'below_bear';
    if(r.tps.base!=null&&r.price<r.tps.base)return 'bear_base';
    if(r.tps.bull!=null&&r.price<r.tps.bull)return 'base_bull';
    if(r.tps.psychedelic_bull!=null&&r.price<r.tps.psychedelic_bull)return 'bull_pb';
    return 'above_pb';
  }

  function buckets(){
    const b={below_bear:0,bear_base:0,base_bull:0,bull_pb:0,above_pb:0};
    rows.forEach(r=>{b[bucketOf(r)]++;});
    return b;
  }

  function render(){
    // Compute L1/L2/L3 counts using cross-filtering
    // Each dimension's counts reflect all OTHER filters, not its own
    function applyFiltersExcept(src, skipArea, skipMod, skipPhase, skipRare, skipBucket){
      let f=src;
      if(!skipArea){
        if(filterL1.size) f=f.filter(r=>r.meta.areas.some(a=>[...filterL1].some(fl=>a===fl||a.startsWith(fl+"."))));
        if(filterL2.size) f=f.filter(r=>r.meta.areas.some(a=>[...filterL2].some(fl=>a===fl||a.startsWith(fl+"."))));
        if(filterL3.size) f=f.filter(r=>r.meta.areas.some(a=>filterL3.has(a)||[...filterL4].some(fl=>a===fl)));
        if(filterL4.size) f=f.filter(r=>r.meta.areas.some(a=>filterL4.has(a)));
      }
      if(!skipMod){
        if(filterMod1) f=f.filter(r=>r.meta.modalities.some(m=>m===filterMod1||m.startsWith(filterMod1+".")));
        if(filterMod2) f=f.filter(r=>r.meta.modalities.some(m=>m===filterMod2||m.startsWith(filterMod2+".")));
        if(filterMod3) f=f.filter(r=>r.meta.modalities.some(m=>m===filterMod3));
      }
      if(!skipPhase&&filterPhase) f=f.filter(r=>r.meta.phase===filterPhase);
      if(!skipRare&&filterRare!==null) f=f.filter(r=>r.meta.rare===filterRare);
      if(!skipBucket&&activeFilter) f=f.filter(r=>bucketOf(r)===activeFilter);
      if(filterMcap.size) f=f.filter(r=>filterMcap.has(r.mcapTier));
      if(filterSignal&&filterSignal.tickers&&filterSignal.tickers.size) f=f.filter(r=>filterSignal.tickers.has(r.ticker));
      return f;
    }
    const forArea=applyFiltersExcept(rows,true,false,false,false,false);
    const forMod=applyFiltersExcept(rows,false,true,false,false,false);
    const forPhase=applyFiltersExcept(rows,false,false,true,false,false);
    const forRare=applyFiltersExcept(rows,false,false,false,true,false);
    // Mcap counts cross-filtered (all other filters applied)
    const mcapCounts={mega:0,large:0,mid:0,small:0,micro:0};
    let mcapBase=rows;
    if(filterL1.size) mcapBase=mcapBase.filter(r=>r.meta.areas.some(a=>[...filterL1].some(fl=>a===fl||a.startsWith(fl+"."))));
    if(filterL2.size) mcapBase=mcapBase.filter(r=>r.meta.areas.some(a=>[...filterL2].some(fl=>a===fl||a.startsWith(fl+"."))));
    if(filterL3.size) mcapBase=mcapBase.filter(r=>r.meta.areas.some(a=>filterL3.has(a)||[...filterL4].some(fl=>a===fl)));
    if(filterL4.size) mcapBase=mcapBase.filter(r=>r.meta.areas.some(a=>filterL4.has(a)));
    if(filterMod1) mcapBase=mcapBase.filter(r=>r.meta.modalities.some(m=>m===filterMod1||m.startsWith(filterMod1+".")));
    if(filterPhase) mcapBase=mcapBase.filter(r=>r.meta.phase===filterPhase);
    if(filterRare!==null) mcapBase=mcapBase.filter(r=>r.meta.rare===filterRare);
    mcapBase.forEach(r=>{mcapCounts[r.mcapTier]=(mcapCounts[r.mcapTier]||0)+1;});
    function countAreas(src){
      const c1={},c2={},c3={};let rc=0;
      src.forEach(r=>{
        const s1=new Set(),s2=new Set(),s3=new Set();
        r.meta.areas.forEach(a=>{
          // Skip pseudo-areas (_* prefix: platform/discovery, not real disease classification)
          if(a.startsWith('_')) return;
          const p=a.split(".");
          if(p.length===1&&!s1.has(a)){c1[a]=(c1[a]||0)+1;s1.add(a);}
          if(p.length===2){const k=p[0]+"."+p[1];if(!s2.has(k)){c2[k]=(c2[k]||0)+1;s2.add(k);}}
          if(p.length>=3){const k3=p.slice(0,3).join(".");if(!s3.has(k3)){c3[k3]=(c3[k3]||0)+1;s3.add(k3);}}});
        if(r.meta.rare)rc++;
      });
      return{c1,c2,c3,rc};
    }
    function countMods(src){
      const c1={},c2={},c3={};
      src.forEach(r=>{
        const s1=new Set(),s2=new Set(),s3=new Set();
        r.meta.modalities.forEach(m=>{const p=m.split(".");
          if(p.length===1&&!s1.has(m)){c1[m]=(c1[m]||0)+1;s1.add(m);}
          if(p.length===2){const k=p[0]+"."+p[1];if(!s2.has(k)){c2[k]=(c2[k]||0)+1;s2.add(k);}}
          if(p.length===3&&!s3.has(m)){c3[m]=(c3[m]||0)+1;s3.add(m);}});
      });
      return c1;
    }
    const {c1:l1Counts,c2:l2Counts,c3:l3Counts,rc:rareCount}=countAreas(forArea);
    const phaseCounts={};forPhase.forEach(r=>{phaseCounts[r.meta.phase]=(phaseCounts[r.meta.phase]||0)+1;});
    const m1Counts=countMods(forMod);
    // Mod L2/L3 counts from forMod (cross-filtered: all except modality)
    const m2Counts={},m3Counts={};
    forMod.forEach(r=>{
      const s2=new Set(),s3=new Set();
      r.meta.modalities.forEach(m=>{const p=m.split(".");
        if(p.length===2){const k=p[0]+"."+p[1];if(!s2.has(k)){m2Counts[k]=(m2Counts[k]||0)+1;s2.add(k);}}
        if(p.length===3&&!s3.has(m)){m3Counts[m]=(m3Counts[m]||0)+1;s3.add(m);}});
    });
    // Rare count from forRare (all filters except rare)
    const rareCountCross=forRare.filter(r=>r.meta.rare).length;

    // Apply all filters
    let filtered=rows;
    if(filterL1.size) filtered=filtered.filter(r=>r.meta.areas.some(a=>[...filterL1].some(fl=>a===fl||a.startsWith(fl+"."))));
    if(filterL2.size) filtered=filtered.filter(r=>r.meta.areas.some(a=>[...filterL2].some(fl=>a===fl||a.startsWith(fl+"."))));
    if(filterL3.size) filtered=filtered.filter(r=>r.meta.areas.some(a=>filterL3.has(a)||[...filterL4].some(fl=>a===fl)));
    if(filterL4.size) filtered=filtered.filter(r=>r.meta.areas.some(a=>filterL4.has(a)));
    if(filterMod1) filtered=filtered.filter(r=>r.meta.modalities.some(m=>m===filterMod1||m.startsWith(filterMod1+".")));
    if(filterMod2) filtered=filtered.filter(r=>r.meta.modalities.some(m=>m===filterMod2||m.startsWith(filterMod2+".")));
    if(filterMod3) filtered=filtered.filter(r=>r.meta.modalities.some(m=>m===filterMod3));
    if(filterPhase) filtered=filtered.filter(r=>r.meta.phase===filterPhase);
    if(filterRare!==null) filtered=filtered.filter(r=>r.meta.rare===filterRare);
    if(activeFilter) filtered=filtered.filter(r=>bucketOf(r)===activeFilter);
    if(filterMcap.size) filtered=filtered.filter(r=>filterMcap.has(r.mcapTier));
    // Snapshot the "without filterSignal" universe -- Target Explorer uses this
    // so clicking a target card doesn't also shrink the target list itself.
    const filteredPreSignal = filtered.slice();
    if(filterSignal&&filterSignal.tickers&&filterSignal.tickers.size) filtered=filtered.filter(r=>filterSignal.tickers.has(r.ticker));
    // Expose current filtered set to Kelly optimizer (runs against active filter)
    kellyUniverse=filtered;

    const bk={below_bear:0,bear_base:0,base_bull:0,bull_pb:0,above_pb:0};
    filtered.forEach(r=>{bk[bucketOf(r)]++;});
    const ptfRows=rows.filter(r=>ptfSet.has(r.ticker));
    const ptfScen={};
    SK.forEach(sk=>{
      if(!ptfRows.length){ptfScen[sk]=0;return;}
      const avg=ptfRows.reduce((s,r)=>{const tp=r.tps[sk]||r.price;return s+((tp-r.price)/r.price*100);},0)/ptfRows.length;
      ptfScen[sk]=avg;
    });

    let h='';
    let fh=''; // filter HTML → goes into sticky bar

    // Compute aggregate TAM per L1 (for chip ordering by market size)
    // Dedupe by leaf area so a popular L3 shared across companies counts once.
    const l1Tams={}; const seenL3byL1={};
    Object.values(configs).forEach(cfg=>{
      cfg.assets.forEach(a=>(a.indications||[]).forEach(ind=>{
        const ar=ind.area||''; if(!ar||ar.startsWith('_')) return;
        const parts=ar.split('.'); const l1=parts[0];
        const leaf=parts.slice(0,Math.min(parts.length,3)).join('.');
        seenL3byL1[l1]=seenL3byL1[l1]||new Set();
        if(seenL3byL1[l1].has(leaf)) return;
        seenL3byL1[l1].add(leaf);
        let tam=0; const m=ind.market||{};
        for(const r of Object.values(m.regions||{})){
          if(r) tam+=(r.patientsK||0)*((r.wtpPct||0)/100)*(r.priceK||0);
        }
        l1Tams[l1]=(l1Tams[l1]||0)+tam;
      }));
    });
    // -------- Row 1: Company-level filters (size, phase, rare) + meta on right --------
    fh+='<div class="fbar fbar-top">';
    fh+='<span class="fbar-lbl">Size</span>';
    [['mega','Mega','>$100B'],['large','Large','$20-100B'],['mid','Mid','$5-20B'],['small','Small','$1-5B'],['micro','Micro','<$1B']].forEach(([k,lbl,range])=>{
      if(!mcapCounts[k])return;
      const active=filterMcap.has(k);
      fh+=`<span class="fchip ${active?'active':''}" onclick="window._fMcap('${k}')" title="${range}">${lbl}<span class="cnt">${mcapCounts[k]}</span></span>`;
    });
    fh+='<span class="fsep"></span>';
    fh+='<span class="fbar-lbl">Phase</span>';
    fh+=`<select class="fsel" onchange="window._fPhase(this.value)"><option value="">All</option>`;
    PHASE_ORDER.forEach(p=>{if(phaseCounts[p])fh+=`<option value="${p}" ${filterPhase===p?'selected':''}>${PHASE_NAMES[p]} (${phaseCounts[p]})</option>`;});
    fh+='</select>';
    fh+='<span class="fsep"></span>';
    fh+=`<span class="fchip-rare ${filterRare===true?'active':''}" onclick="window._fRare()" title="Filter companies with rare disease indications">\u2605 Rare<span class="cnt">${rareCountCross}</span></span>`;
    // Right-aligned meta cluster
    fh+='<span class="fbar-meta">';
    if(filterL1.size||filterL2.size||filterL3.size||filterL4.size||filterRare===true){
      fh+=`<span class="fchip ${purityMode==='wtd'?'active':''}" onclick="window._purityMode()" style="padding:2px 8px;font-size:.62rem" title="Toggle: Raw TAM vs Risk-Adjusted (PoS\u00d7Apr weighted)">Purity: ${purityMode==='wtd'?'Risk-Adj':'Raw TAM'}</span>`;
    }
    if(filterL1.size||filterL2.size||filterL3.size||filterL4.size||filterPhase||filterRare!==null||activeFilter||filterMod1||filterMod2||filterMod3||filterMcap.size)
      fh+=`<span class="fchip" style="border-color:#ef444444;color:#fca5a5" onclick="window._fClear()">\u2715 Clear</span>`;
    fh+=`<span><b style="color:var(--text1)">${filtered.length}</b>/${rows.length}</span>`;
    fh+='</span>';
    fh+='</div>';

    // -------- Row 2: Disease area chips (sorted by aggregate TAM) --------
    fh+='<div class="fbar">';
    fh+='<span class="fbar-lbl">Area</span>';
    const sortedL1s=Object.keys(l1Counts).sort((a,b)=>{
      const ta=(l1Tams[a]||0), tb=(l1Tams[b]||0);
      if(ta!==tb) return tb-ta;
      return (l1Counts[b]||0)-(l1Counts[a]||0);
    });
    sortedL1s.forEach(l1=>{
      const active=filterL1.has(l1);
      const tt=l1Tams[l1]?` title="Total TAM \$${(l1Tams[l1]/1000).toFixed(1)}B"`:'';
      fh+=`<span class="fchip ${active?'active':''}" onclick="window._fL1('${l1}')"${tt}>${L1_NAMES[l1]||l1.replace(/_/g,' ')}<span class="cnt">${l1Counts[l1]}</span></span>`;
    });
    fh+='</div>';

    // ========== Drill-down sub-chips (Area L2/L3/L4 + Modality L1/L2/L3) ==========
    // These build into a separate buffer `navSub` injected into the left nav.
    // (Used to build into `fh`/sticky-filters; now lives in the sidebar.)
    let navSub='';
    // L2 sub-chips (show when L1 is active)
    if(filterL1.size){
      const l2s=Object.keys(l2Counts).filter(k=>[...filterL1].some(fl=>k.startsWith(fl+"."))).sort((a,b)=>(l2Counts[b]||0)-(l2Counts[a]||0));
      if(l2s.length>0){
        navSub+='<span class="nav-flbl" style="margin-top:6px">Area &rsaquo; L2</span><div class="fchip-row">';
        navSub+=`<span class="fl2chip ${!filterL2.size?'active':''}" onclick="window._fL2(null)">All</span>`;
        l2s.forEach(l2=>{
          const label=l2.split(".").pop().replace(/_/g," ");
          const active=filterL2.has(l2);
          navSub+=`<span class="fl2chip ${active?'active':''}" onclick="window._fL2('${l2}')">${label}<span class="cnt">${l2Counts[l2]}</span></span>`;
        });
        navSub+='</div>';
      }
    }
    // L3 sub-chips (show when L2 is active)
    if(filterL2.size){
      const l3s=Object.keys(l3Counts).filter(k=>[...filterL2].some(fl=>k.startsWith(fl+"."))).sort((a,b)=>(l3Counts[b]||0)-(l3Counts[a]||0));
      if(l3s.length>0){
        navSub+='<span class="nav-flbl">Area &rsaquo; L3</span><div class="fchip-row">';
        navSub+=`<span class="fl2chip ${!filterL3.size?'active':''}" onclick="window._fL3(null)">All</span>`;
        l3s.forEach(l3=>{
          const label=l3.split(".").pop().replace(/_/g," ");
          const active=filterL3.has(l3);
          navSub+=`<span class="fl2chip ${active?'active':''}" onclick="window._fL3('${l3}')">${label}<span class="cnt">${l3Counts[l3]}</span></span>`;
        });
        navSub+='</div>';
      }
    }
    // L4 sub-chips (show when L3 is active)
    if(filterL3.size){
      const l4Counts={};
      rows.forEach(r=>{r.meta.areas.forEach(a=>{const p=a.split(".");if(p.length>=4){const l4k=p.slice(0,4).join(".");if([...filterL3].some(fl=>l4k.startsWith(fl+"."))){l4Counts[l4k]=(l4Counts[l4k]||0)+1;}}});});
      const l4s=Object.keys(l4Counts).sort((a,b)=>(l4Counts[b]||0)-(l4Counts[a]||0));
      if(l4s.length>0){
        navSub+='<span class="nav-flbl">Area &rsaquo; L4</span><div class="fchip-row">';
        navSub+=`<span class="fl2chip ${!filterL4.size?'active':''}" onclick="window._fL4(null)">All</span>`;
        l4s.forEach(l4=>{
          const label=l4.split(".").pop().replace(/_/g," ");
          const active=filterL4.has(l4);
          navSub+=`<span class="fl2chip ${active?'active':''}" onclick="window._fL4('${l4}')">${label}<span class="cnt">${l4Counts[l4]}</span></span>`;
        });
        navSub+='</div>';
      }
    }

    // Platform (Modality L1) chips
    const MOD_NAMES={small_molecule:"Small Molecule",antibody:"Antibody",adc:"ADC",nucleic_acid:"Nucleic Acid",gene_therapy:"Gene Therapy",gene_editing:"Gene Editing",cell_therapy:"Cell Therapy",pegylated_protein:"Peg Protein",vaccine:"Vaccine",formulation_modifier:"Formulation",recombinant_protein:"Recomb. Protein",radiopharmaceutical:"Radio-Pharma",aesthetic_or_other:"Aesthetic/Other",peptide:"Peptide"};
    const MOD_ORDER=["small_molecule","antibody","adc","nucleic_acid","gene_therapy","gene_editing","cell_therapy","peptide","recombinant_protein","radiopharmaceutical","vaccine","formulation_modifier","aesthetic_or_other"];
    navSub+='<span class="nav-flbl">Platform</span><div class="fchip-row">';
    MOD_ORDER.forEach(m1=>{
      if(!m1Counts[m1])return;
      const active=filterMod1===m1;
      navSub+=`<span class="fchip ${active?'active':''}" style="${active?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod1('${m1}')">${MOD_NAMES[m1]||m1}<span class="cnt">${m1Counts[m1]}</span></span>`;
    });
    Object.keys(m1Counts).filter(m1=>!MOD_ORDER.includes(m1)).sort().forEach(m1=>{
      const active=filterMod1===m1;
      navSub+=`<span class="fchip ${active?'active':''}" style="${active?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod1('${m1}')">${MOD_NAMES[m1]||m1.replace(/_/g,' ')}<span class="cnt">${m1Counts[m1]}</span></span>`;
    });
    navSub+='</div>';
    // Mod L2 sub-chips
    if(filterMod1){
      const m2s=Object.keys(m2Counts).filter(k=>k.startsWith(filterMod1+".")).sort((a,b)=>(m2Counts[b]||0)-(m2Counts[a]||0));
      if(m2s.length>0){
        navSub+='<span class="nav-flbl">Platform &rsaquo; L2</span><div class="fchip-row">';
        navSub+=`<span class="fl2chip ${!filterMod2?'active':''}" style="${!filterMod2?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod2(null)">All</span>`;
        m2s.forEach(m2=>{
          const label=m2.split(".").pop().replace(/_/g," ");
          const active=filterMod2===m2;
          navSub+=`<span class="fl2chip ${active?'active':''}" style="${active?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod2('${m2}')">${label}<span class="cnt">${m2Counts[m2]}</span></span>`;
        });
        navSub+='</div>';
      }
    }

    // Mod L3 sub-chips
    if(filterMod2){
      const m3s=Object.keys(m3Counts).filter(k=>k.startsWith(filterMod2+".")).sort((a,b)=>(m3Counts[b]||0)-(m3Counts[a]||0));
      if(m3s.length>0){
        navSub+='<span class="nav-flbl">Platform &rsaquo; L3</span><div class="fchip-row">';
        navSub+=`<span class="fl2chip ${!filterMod3?'active':''}" style="${!filterMod3?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod3(null)">All</span>`;
        m3s.forEach(m3=>{
          const label=m3.split(".").pop().replace(/_/g," ");
          const active=filterMod3===m3;
          navSub+=`<span class="fl2chip ${active?'active':''}" style="${active?'background:#3b82f622;border-color:#3b82f6;color:#93c5fd':''}" onclick="window._fMod3('${m3}')">${label}<span class="cnt">${m3Counts[m3]}</span></span>`;
        });
        navSub+='</div>';
      }
    }
    // Bucket stats moved into the Market Valuation Overview card body (see below)
    // -- they were taking too much space when always visible.
    let bucketStatsHtml='<div class="stats">';
    [{k:"below_bear",c:"s-mb",l:"Below Bear",d:"Deep value — price < bear TP"},{k:"bear_base",c:"s-br",l:"Bear–Base",d:"Between bear and base TP"},{k:"base_bull",c:"s-bs",l:"Base–Bull",d:"Fair value range"},{k:"bull_pb",c:"s-bl",l:"Bull–Psych",d:"Above bull, below psych bull"},{k:"above_pb",c:"s-pb",l:"Above Psych Bull",d:"Extreme premium"}].forEach(b=>{
      const isActive=activeFilter===b.k;
      const dim=activeFilter&&!isActive;
      bucketStatsHtml+=`<div class="stat ${b.c}" onclick="window._filter('${b.k}')" style="cursor:pointer;transition:.2s;${isActive?'box-shadow:0 0 0 2px currentColor;transform:scale(1.03);':''}${dim?'opacity:.35;':''}"><div class="lbl">${b.l}</div><div class="val">${bk[b.k]}</div><div class="desc">${isActive?'Click to clear filter':b.d}</div></div>`;
    });
    bucketStatsHtml+='</div>';

    // Chart
    const visibleRows=filtered;
    const activeArea=filterL4.size?[...filterL4][0]:filterL3.size?[...filterL3][0]:filterL2.size?[...filterL2][0]:filterL1.size?[...filterL1][0]:null;
    const hasPurity=!!(activeArea||filterRare===true);

    // Market Explorer — drill-down through therapeutic areas L1 -> L4 -> companies
    (() => {
      // Build aggregated market data from all configs (not just visibleRows, so the explorer is complete)
      // {areaPath: {tam, som, sales, companies: [{ticker, name, asset, ind, area, som, sales, stage}]}}
      const areaData = {};
      for (const [tk, cfg] of Object.entries(configs)) {
        const coName = cfg.company.name || tk;
        for (const a of cfg.assets) {
          for (const ind of a.indications) {
            const area = ind.area || 'unclassified';
            // Skip pseudo-areas (prefix _) -- platform/discovery indications without
            // a specific lead disease. They appear in the Technology Explorer instead.
            if (area.startsWith('_')) continue;
            const m = ind.market || {};
            const reg = m.regions || {};
            const cs = m.company_slice || {};
            let tam = 0, som = 0;
            for (const rk of ['us','eu','row']) {
              const pr = reg[rk] || {};
              tam += (pr.patientsK||0) * ((pr.wtpPct||0)/100) * (pr.priceK||0);
              if (cs[rk]) {
                som += (pr.patientsK||0) * ((cs[rk].reachPct||0)/100) * ((cs[rk].wtpPct||0)/100) * (cs[rk].priceK||0);
              }
            }
            const sales = m.salesM || 0;
            // Generic-bucket flag: indication is part of an auto-expanded
            // generics/biosimilar mixTemplate franchise (vs a branded innovator)
            const isGen = !!m._genericBucket;
            const parts = area.split('.');
            // Register at every level: L1, L1.L2, L1.L2.L3, L1.L2.L3.L4
            for (let depth = 1; depth <= parts.length; depth++) {
              const path = parts.slice(0, depth).join('.');
              if (!areaData[path]) areaData[path] = { tamByLeaf: {}, som: 0, sales: 0, salesBranded: 0, salesGeneric: 0, companies: [] };
              // TAM deduped per leaf area (so rolling up doesn't double-count)
              areaData[path].tamByLeaf[area] = tam;
              areaData[path].som += som;
              areaData[path].sales += sales;
              if (isGen) areaData[path].salesGeneric += sales;
              else areaData[path].salesBranded += sales;
              if (depth === parts.length) {
                // At leaf level, register the company entry
                areaData[path].companies.push({
                  ticker: tk, name: coName, asset: a.name, assetId: a.id,
                  ind: ind.name, indId: ind.id, area, som, sales, tam,
                  stage: a.stage || '', isGeneric: isGen
                });
              }
            }
          }
        }
      }
      // Compute final TAM per path (sum of unique leaf TAMs under it)
      // Cap SOM at TAM: when multiple drugs target the same market, their SOMs
      // overlap (can't all capture same patients) so raw sum > TAM is impossible.
      Object.keys(areaData).forEach(p => {
        areaData[p].tam = Object.values(areaData[p].tamByLeaf).reduce((s,v)=>s+v, 0);
        areaData[p].somRaw = areaData[p].som;  // preserve raw sum for flagging
        if (areaData[p].tam > 0 && areaData[p].som > areaData[p].tam) {
          areaData[p].som = areaData[p].tam;
          areaData[p].somCapped = true;
        }
      });
      // Mark each leaf area as "pipeline-only" if no entry has salesM>0 and no
      // entry has a commercial/nda_filed stage. Then derive marketStatus per leaf:
      //   branded_incumbent          -- any covered drug has commercial revenue
      //   branded_incumbent_external -- override list (branded drug exists, sponsor not in coverage)
      //   generic_incumbent          -- override list (generic SoC dominates)
      //   novel                      -- no commercial drug anywhere
      // branded_incumbent (auto-derived from coverage data) takes precedence over overrides:
      //   if a covered drug ships, the leaf is contested whether or not external generics exist.
      const isPipelineOnlyLeaf = (entries) => {
        if (!entries || entries.length === 0) return false;
        for (const e of entries) {
          if ((e.sales || 0) > 0) return false;
          const st = (e.stage || '').toLowerCase();
          if (st.includes('commercial') || st.includes('nda_filed') || st.includes('approved')) return false;
        }
        return true;
      };
      const _ovGen = (window._marketStatusOverrides && window._marketStatusOverrides.generic_incumbent) || {};
      const _ovExt = (window._marketStatusOverrides && window._marketStatusOverrides.branded_incumbent_external) || {};
      Object.keys(areaData).forEach(p => {
        const entries = areaData[p].companies || [];
        const pipe = isPipelineOnlyLeaf(entries);
        areaData[p].pipelineOnly = pipe;
        // Generic share: % of total sales that comes from generic/biosimilar buckets
        const totS = (areaData[p].salesBranded || 0) + (areaData[p].salesGeneric || 0);
        areaData[p].genericSharePct = totS > 0 ? (areaData[p].salesGeneric / totS) * 100 : 0;
        // Only assign marketStatus for actual leaves (paths with entries)
        if (entries.length > 0) {
          if (!pipe) {
            // Auto-derive generic_incumbent when >=80% of leaf sales come from
            // generic/biosimilar buckets (no real branded innovator dominates).
            // Otherwise the leaf is genuinely contested by branded sponsors.
            if (areaData[p].genericSharePct >= 80) areaData[p].marketStatus = 'generic_incumbent';
            else areaData[p].marketStatus = 'branded_incumbent';
          }
          else if (p in _ovExt) areaData[p].marketStatus = 'branded_incumbent_external';
          else if (p in _ovGen) areaData[p].marketStatus = 'generic_incumbent';
          else areaData[p].marketStatus = 'novel';
        }
      });
      // For each path, compute leafCount, pipelineLeafCount, novelLeafCount, maxDepth,
      // PLUS filtered TAM/SOM/sales subtotals that aggregate ONLY over novel-status
      // leaves under that path (used when the pipeline-only filter is active so the
      // top stats and child cards reflect the filtered subset, not the parent total).
      const _allPaths = Object.keys(areaData);
      Object.keys(areaData).forEach(p => {
        const pref = p + '.';
        const leafSet = new Set();
        const pipeSet = new Set();
        const novelSet = new Set();
        let maxD = p.split('.').length;
        let novelTam = 0, novelSom = 0, novelSales = 0;
        const _accum = (k) => {
          if ((areaData[k].companies || []).length === 0) return;
          leafSet.add(k);
          if (areaData[k].pipelineOnly) pipeSet.add(k);
          if (areaData[k].marketStatus === 'novel') {
            novelSet.add(k);
            novelTam += areaData[k].tam || 0;
            novelSom += areaData[k].somRaw || areaData[k].som || 0;
            novelSales += areaData[k].sales || 0;
          }
        };
        _accum(p);
        for (const k of _allPaths) {
          if (!k.startsWith(pref)) continue;
          const d = k.split('.').length;
          if (d > maxD) maxD = d;
          _accum(k);
        }
        areaData[p].leafCount = leafSet.size;
        areaData[p].pipelineLeafCount = pipeSet.size;
        areaData[p].novelLeafCount = novelSet.size;
        areaData[p].novelTam = novelTam;
        areaData[p].novelSom = novelTam > 0 && novelSom > novelTam ? novelTam : novelSom;
        areaData[p].novelSales = novelSales;
        areaData[p].maxDepth = maxD;
      });
      // Root totals
      const _rootLeafCount = Object.keys(areaData).filter(k => (areaData[k].companies || []).length > 0).length;
      const _rootPipeLeafCount = Object.keys(areaData).filter(k => (areaData[k].companies || []).length > 0 && areaData[k].pipelineOnly).length;
      const _rootNovelLeafCount = Object.keys(areaData).filter(k => (areaData[k].companies || []).length > 0 && areaData[k].marketStatus === 'novel').length;
      const _rootMaxDepth = Object.keys(areaData).reduce((m,k) => Math.max(m, k.split('.').length), 1);

      const fmtB = v => v >= 1000 ? '$'+(v/1000).toFixed(1)+'B' : '$'+Math.round(v)+'M';
      const nice = s => window._nicelabel ? window._nicelabel(s) : s.replace(/_/g,' ');

      // Determine current level children
      const currentPath = mktNavPath.join('.');
      const currentData = currentPath ? areaData[currentPath] : null;
      const childPrefix = currentPath ? currentPath + '.' : '';
      const childDepth = mktNavPath.length + 1;
      let children = Object.keys(areaData)
        .filter(k => k.startsWith(childPrefix) && k.split('.').length === childDepth)
        .map(k => ({ path: k, name: k.slice(childPrefix.length), ...areaData[k] }));

      // ===== SEARCH FILTER =====
      // When search is active, ignore drill-down + show flat list of L3 (leaf) areas
      // matching the query. Matches against:
      //  - area path / nice name
      //  - drug names within indications
      //  - disease synonym group names + descriptions (expands to all linked areas)
      let searchActive = false;
      let synonymGroupHits = [];
      if (mktSearch && mktSearch.trim().length >= 2) {
        searchActive = true;
        const q = mktSearch.trim().toLowerCase();
        // Find matching synonym groups
        const matchedGroupAreas = new Set();
        for (const [gname, gmeta] of Object.entries(diseaseSynonymGroups)) {
          const gdesc = (gmeta.description || '').toLowerCase();
          if (gname.toLowerCase().includes(q) || gdesc.includes(q)) {
            synonymGroupHits.push({ name: gname, description: gmeta.description || '', areas: gmeta.areas || [] });
            (gmeta.areas || []).forEach(a => matchedGroupAreas.add(a));
          }
        }
        // Get all leaf area paths that match by name OR by drug OR by synonym group
        const allLeafPaths = Object.keys(areaData).filter(k => (areaData[k].companies || []).length > 0);
        const matchedLeafPaths = new Set();
        for (const path of allLeafPaths) {
          if (path.toLowerCase().includes(q)) { matchedLeafPaths.add(path); continue; }
          if (nice(path.split('.').pop()).toLowerCase().includes(q)) { matchedLeafPaths.add(path); continue; }
          if (matchedGroupAreas.has(path)) { matchedLeafPaths.add(path); continue; }
          // Drug name search
          for (const co of areaData[path].companies || []) {
            if ((co.asset || '').toLowerCase().includes(q) || (co.assetId || '').toLowerCase().includes(q) || (co.ticker || '').toLowerCase().includes(q)) {
              matchedLeafPaths.add(path); break;
            }
          }
        }
        children = [...matchedLeafPaths].map(k => ({ path: k, name: k, ...areaData[k] }));
        // Sort by current sort mode (re-applied below)
      }
      // Pipeline-only (novel) filter: keep branches that contain at least one
      // truly-novel leaf (marketStatus === 'novel'), i.e. no covered drug AND no
      // known external incumbent. At a leaf, keep only if itself novel.
      // When active, swap each child's TAM/SOM/sales for novel-only subtotals so
      // the stats reflect the filtered subset, not the parent totals.
      if (mktPipelineOnly) {
        children = children.filter(c => {
          const hasComps = (c.companies || []).length > 0;
          if (hasComps) return c.marketStatus === 'novel';
          return (c.novelLeafCount || 0) > 0;
        }).map(c => ({
          ...c,
          tam:   c.novelTam   != null ? c.novelTam   : c.tam,
          som:   c.novelSom   != null ? c.novelSom   : c.som,
          sales: c.novelSales != null ? c.novelSales : c.sales,
        }));
      }
      children.sort((a,b) => {
        if (mktSortMode === 'tam') return b.tam - a.tam;
        if (mktSortMode === 'som') return b.som - a.som;
        if (mktSortMode === 'sales') return b.sales - a.sales;
        if (mktSortMode === 'pen') return (b.tam>0?b.sales/b.tam:0) - (a.tam>0?a.sales/a.tam:0);
        return 0;
      });
      const isLeaf = children.length === 0 && currentData && !searchActive;

      h+=`<div class="card${secCls('sec-markets')}" id="sec-markets"><div class="card-title" ${titleAttrsFlex('sec-markets')}><div>${chev('sec-markets')}<div class="dot" style="background:linear-gradient(180deg,#f97316,#a855f7);display:inline-block;vertical-align:middle;margin-right:8px"></div>Market Explorer</div>`;
      // Search + sort chips
      h+='<div style="display:flex;gap:8px;align-items:center" onclick="event.stopPropagation()">';
      h+=`<input id="_mktSearchInput" type="search" placeholder="🔎 disease, drug, or family (e.g. sle, lupus, leqembi)" value="${mktSearch.replace(/"/g,'&quot;')}" oninput="window._mktSetSearch(this.value)" onclick="event.stopPropagation()" style="background:#0f1117;border:1px solid #ffffff22;border-radius:6px;padding:4px 8px;font-size:.7rem;color:#e2e4ea;width:280px;font-family:var(--mono)">`;
      h+='<div style="display:flex;gap:4px">';
      [['tam','TAM'],['som','SOM'],['sales','Sales'],['pen','Penetration']].forEach(([k,lbl])=>{
        const active = mktSortMode===k;
        h+=`<span class="fchip ${active?'active':''}" onclick="window._mktSort('${k}')" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
      });
      h+='</div>';
      // Novel-only filter chip (truly uncontested -- no covered drug + no known external incumbent)
      h+=`<span class="fchip ${mktPipelineOnly?'active':''}" onclick="window._mktTogglePipelineOnly()" title="Show only TRULY NOVEL leaves: no commercial drug in coverage AND no known generic/branded SoC outside coverage. Excludes leaves where covered pipeline competes against external incumbents." style="padding:2px 8px;font-size:.65rem;border-color:${mktPipelineOnly?'#a3e635':'#ffffff22'};color:${mktPipelineOnly?'#a3e635':''}">🌱 Novel only</span>`;
      h+='</div></div>';

      // Breadcrumb
      h+='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:10px 0;font-size:.75rem;font-family:var(--mono)">';
      h+=`<span onclick="window._mktGo([])" style="cursor:pointer;color:${mktNavPath.length===0?'#f97316':'#60a5fa'};font-weight:${mktNavPath.length===0?'700':'500'}">🏠 All Markets</span>`;
      mktNavPath.forEach((p, i) => {
        h+=`<span style="color:#6b7080">›</span>`;
        const isLast = i === mktNavPath.length - 1;
        h+=`<span onclick="window._mktGo(${i+1})" style="cursor:pointer;color:${isLast?'#f97316':'#60a5fa'};font-weight:${isLast?'700':'500'}">${nice(p)}</span>`;
      });
      h+='</div>';

      // Current level stats (drilled-in path) OR root totals (all-markets summary).
      // At root (mktNavPath=[]), currentData is null so we synthesize totals from L1
      // children -- safe because L1 trees don't share leaves so sums don't double-count.
      let statsTam, statsSom, statsSales, statsCount, statsLabel, somCapped = false, somRaw = 0;
      let statsLeaves = 0, statsMaxDepth = 0, statsPipeLeaves = 0, statsNovelLeaves = 0;
      if (currentData) {
        // When filter is on, swap to novel-only subtotals so stats reflect filtered set
        if (mktPipelineOnly) {
          statsTam = currentData.novelTam || 0;
          statsSom = currentData.novelSom || 0;
          statsSales = currentData.novelSales || 0;
        } else {
          statsTam = currentData.tam;
          statsSom = currentData.som;
          statsSales = currentData.sales;
        }
        statsCount = isLeaf ? currentData.companies.length : children.length;
        statsLabel = isLeaf ? 'Drugs' : 'Sub-markets';
        somCapped = !mktPipelineOnly && !!currentData.somCapped;
        somRaw = currentData.somRaw || 0;
        statsLeaves = currentData.leafCount || 0;
        statsPipeLeaves = currentData.pipelineLeafCount || 0;
        statsNovelLeaves = currentData.novelLeafCount || 0;
        statsMaxDepth = currentData.maxDepth || mktNavPath.length;
      } else {
        // Root view: aggregate across visible (post-filter) children
        statsTam = children.reduce((s,c) => s + (c.tam || 0), 0);
        statsSom = children.reduce((s,c) => s + (c.som || 0), 0);
        statsSales = children.reduce((s,c) => s + (c.sales || 0), 0);
        statsCount = children.length;
        statsLabel = 'L1 markets';
        statsLeaves = _rootLeafCount;
        statsPipeLeaves = _rootPipeLeafCount;
        statsNovelLeaves = _rootNovelLeafCount;
        statsMaxDepth = _rootMaxDepth;
      }
      const penOfTam = statsTam > 0 ? (statsSales/statsTam*100).toFixed(1) : 0;
      h+='<div style="display:flex;gap:16px;padding:8px 12px;background:#0f1117;border-radius:6px;margin-bottom:12px;flex-wrap:wrap">';
      h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">${currentData?'TAM (unique leaves)':'Total TAM'}</div><div style="font-size:1rem;font-weight:700;color:#f97316;font-family:var(--mono)">${fmtB(statsTam)}</div></div>`;
      const somCapNote = somCapped ? ` title="Drug SOMs overlap -- capped at TAM (raw sum was ${fmtB(somRaw)})"` : '';
      const somFlag = somCapped ? ' *' : '';
      h+=`<div${somCapNote}><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">${currentData?'SOM':'Total SOM'}${somFlag}</div><div style="font-size:1rem;font-weight:700;color:#a855f7;font-family:var(--mono)">${fmtB(statsSom)}</div></div>`;
      h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">${currentData?'2025 Sales':'Total Sales'}</div><div style="font-size:1rem;font-weight:700;color:#22c55e;font-family:var(--mono)">${fmtB(statsSales)}</div></div>`;
      h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Market penetration</div><div style="font-size:1rem;font-weight:700;color:#fbbf24;font-family:var(--mono)">${penOfTam}%</div></div>`;
      h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">${statsLabel}</div><div style="font-size:1rem;font-weight:700;color:#e2e4ea;font-family:var(--mono)">${statsCount}</div></div>`;
      if (!isLeaf) {
        const _curDepth = mktNavPath.length;
        const _depthRange = statsMaxDepth > _curDepth ? `L${_curDepth+1}–L${statsMaxDepth}` : `L${statsMaxDepth}`;
        h+=`<div title="Distinct disease leaves reachable from here.  🌱 = truly novel (no covered drug + no known external incumbent); ⚗️ = no covered drug (may have external incumbent)"><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">End leaves</div><div style="font-size:1rem;font-weight:700;color:#22d3ee;font-family:var(--mono)">${statsLeaves} <span style="color:#a3e635;font-size:.7rem">(🌱 ${statsNovelLeaves})</span> <span style="color:#94a3b8;font-size:.65rem">(⚗️ ${statsPipeLeaves})</span></div></div>`;
        h+=`<div title="Depth range of descendants (L1=root, L4=deepest sub-segment)"><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Depth</div><div style="font-size:1rem;font-weight:700;color:#94a3b8;font-family:var(--mono)">${_depthRange}</div></div>`;
      }
      h+='</div>';

      // Search synonym group banner
      if (searchActive && synonymGroupHits.length > 0) {
        h+='<div style="margin-bottom:12px;padding:10px 12px;background:#a855f714;border:1px solid #a855f733;border-radius:6px;font-size:.7rem">';
        h+='<div style="font-weight:700;color:#d8b4fe;margin-bottom:6px">📚 Disease synonym group matches:</div>';
        synonymGroupHits.forEach(g => {
          h+=`<div style="margin-bottom:4px;color:#e2e4ea">`;
          h+=`<span style="font-family:var(--mono);font-weight:600;color:#a855f7">${g.name}</span>`;
          h+=`<span style="color:var(--text2);font-size:.65rem"> — ${g.description} (${g.areas.length} areas)</span>`;
          h+=`</div>`;
        });
        h+='</div>';
      }
      // Search empty-state
      if (searchActive && children.length === 0) {
        h+=`<div style="padding:20px;text-align:center;color:var(--text2);font-size:.8rem">No disease, drug, or family matches "<span style="color:#f97316">${mktSearch}</span>". Try shorter query or check spelling.</div>`;
      }

      if (!isLeaf && children.length > 0) {
        // Child cards grid -- card size scales with TAM (no separate bar)
        const maxTam = Math.max(...children.map(c => c.tam || 1), 1);
        // 12-column grid; cards span more columns proportionally to TAM
        h+='<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:10px">';
        children.forEach(c => {
          const ratio = c.tam / maxTam;
          // Tier by TAM share vs biggest sibling
          let colSpan, tierPad, tierTitle, tierNum, tierSub;
          if (ratio >= 0.5)      { colSpan = 6; tierPad = 18; tierTitle = 1.05; tierNum = 1.3;  tierSub = 0.72; }
          else if (ratio >= 0.2) { colSpan = 4; tierPad = 14; tierTitle = 0.95; tierNum = 1.1;  tierSub = 0.68; }
          else if (ratio >= 0.05){ colSpan = 3; tierPad = 12; tierTitle = 0.85; tierNum = 0.95; tierSub = 0.62; }
          else                   { colSpan = 3; tierPad = 10; tierTitle = 0.78; tierNum = 0.85; tierSub = 0.58; }
          const penOfTam = c.tam > 0 ? (c.sales/c.tam*100).toFixed(1) : 0;
          const coCount = areaData[c.path]?.companies?.length || 0;
          const level = c.path.split('.').length;
          const subAreas = Object.keys(areaData).filter(k => k.startsWith(c.path + '.') && k.split('.').length === level+1).length;
          const cardLeaves = areaData[c.path]?.leafCount || 0;
          const cardMaxD = areaData[c.path]?.maxDepth || level;
          const cardDepthTxt = cardMaxD > level ? `→L${cardMaxD}` : '';
          const cardFlag = c.somCapped ? '*' : '';
          const cardTitle = c.somCapped ? `title="Drug SOMs overlap -- capped at TAM (raw sum was ${fmtB(c.somRaw)})"` : '';
          h+=`<div onclick="window._mktDrill('${c.path}')" style="grid-column:span ${colSpan};background:#0f1117;border:1px solid #ffffff12;border-radius:8px;padding:${tierPad}px;cursor:pointer;transition:border-color 0.15s;display:flex;flex-direction:column;justify-content:space-between;min-height:${tierPad*6}px" onmouseover="this.style.borderColor='#f97316'" onmouseout="this.style.borderColor='#ffffff12'">`;
          h+=`<div>`;
          // When searching, show full path (e.g. "oncology › hematology › cml") for clarity
          const cardLabel = searchActive ? c.path.split('.').map(seg => nice(seg)).join(' › ') : nice(c.name);
          h+=`<div style="font-size:${tierTitle}rem;font-weight:700;margin-bottom:4px;color:#e2e4ea">${cardLabel}</div>`;
          // Status badge -- only meaningful at leaf cards (no sub-areas)
          const statusBadge = (() => {
            if (subAreas > 0) return '';  // branch node, no single status
            const ms = c.marketStatus;
            const gShare = c.genericSharePct || 0;
            if (ms === 'novel') return ' <span style="color:#a3e635;font-weight:700" title="Truly novel: no covered drug + no known external incumbent">🌱 Novel</span>';
            if (ms === 'generic_incumbent') return ` <span style="color:#94a3b8" title="Generic/biosimilar dominated: ${gShare.toFixed(0)}% of leaf sales come from generic-bucket attributions">💊 Generic SoC${gShare>0?' '+gShare.toFixed(0)+'%':''}</span>`;
            if (ms === 'branded_incumbent_external') return ' <span style="color:#fbbf24" title="Pipeline-only in coverage; branded incumbent exists outside coverage">🏷️ Ext. branded</span>';
            if (ms === 'branded_incumbent') {
              const gTag = gShare >= 20 ? ` <span style="color:#94a3b8;font-size:.55rem;font-weight:600" title="Generic/biosimilar share of total leaf sales">+ ${gShare.toFixed(0)}% Gx</span>` : '';
              return ` <span style="color:#22c55e" title="Has commercial drug in coverage">✅ Commercial</span>${gTag}`;
            }
            return '';
          })();
          const subTxt = subAreas > 0
            ? `${subAreas} sub · ${cardLeaves} leaves${cardDepthTxt?' '+cardDepthTxt:''} · ${coCount} drugs`
            : `${coCount} drugs${statusBadge}`;
          h+=`<div style="font-size:${tierSub}rem;color:var(--text2);font-family:var(--mono);margin-bottom:10px">${subTxt}</div>`;
          h+='</div>';
          h+=`<div>`;
          h+=`<div style="display:flex;justify-content:space-between;font-size:${tierNum}rem;font-family:var(--mono);font-weight:700;margin-bottom:4px"><span style="color:#f97316">${fmtB(c.tam)}</span><span style="color:#a855f7" ${cardTitle}>${fmtB(c.som)}${cardFlag}</span></div>`;
          h+=`<div style="display:flex;justify-content:space-between;font-size:${tierSub}rem;font-family:var(--mono);color:var(--text2)"><span>TAM</span><span>SOM</span></div>`;
          // Split sales: branded vs generic when leaf has both, with tooltip
          const _sb = c.salesBranded || 0, _sg = c.salesGeneric || 0;
          const salesLbl = (_sb > 0 && _sg > 0)
            ? `Sales ${fmtB(c.sales)} <span style="color:#94a3b8;font-size:.55rem" title="Branded ${fmtB(_sb)} + Generic ${fmtB(_sg)}">(${fmtB(_sb)} br + ${fmtB(_sg)} Gx)</span>`
            : `Sales ${fmtB(c.sales)}`;
          h+=`<div style="display:flex;justify-content:space-between;font-size:${tierSub}rem;font-family:var(--mono);color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid #ffffff08"><span>${salesLbl}</span><span>${penOfTam}% pen</span></div>`;
          h+='</div>';
          h+='</div>';
        });
        h+='</div>';
      } else if (isLeaf && currentData) {
        // Company list at leaf
        const cos = [...currentData.companies];
        cos.sort((a,b) => {
          if (mktSortMode === 'som') return b.som - a.som;
          if (mktSortMode === 'sales') return b.sales - a.sales;
          if (mktSortMode === 'pen') return (b.tam>0?b.sales/b.tam:0) - (a.tam>0?a.sales/a.tam:0);
          return b.som - a.som;  // default by SOM at leaf
        });
        const maxSom = Math.max(...cos.map(c=>c.som), 1);
        h+='<div style="display:flex;flex-direction:column;gap:6px">';
        cos.forEach(c => {
          const pct = (c.som / maxSom) * 100;
          const stageCol = c.stage.toLowerCase().includes('commercial') ? '#22c55e' : c.stage.toLowerCase().includes('3')?'#f59e0b':c.stage.toLowerCase().includes('2')?'#fb923c':c.stage.toLowerCase().includes('1')?'#ef4444':'#6b7080';
          h+=`<div style="display:grid;grid-template-columns:60px 1fr 90px 90px 90px 70px;gap:8px;align-items:center;padding:8px 12px;background:#0f1117;border-radius:6px;border:1px solid #ffffff08;font-size:.7rem">`;
          const gxBadge = c.isGeneric ? ' <span style="font-size:.55rem;color:#94a3b8;font-weight:700;padding:1px 4px;background:#94a3b822;border-radius:3px" title="Generic/biosimilar bucket attribution (auto-expanded from mixTemplate franchise)">Gx</span>' : '';
          h+=`<a href="model.html?ticker=${c.ticker}" style="font-family:var(--mono);font-weight:700;color:#60a5fa;text-decoration:none">${c.ticker}</a>${gxBadge}`;
          h+=`<div><div style="color:#e2e4ea;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.asset}</div><div style="color:var(--text2);font-size:.6rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.ind}</div></div>`;
          h+=`<div style="position:relative;height:6px;background:#161920;border-radius:2px;overflow:hidden" title="SOM $${Math.round(c.som)}M / max $${Math.round(maxSom)}M"><div style="position:absolute;top:0;left:0;height:100%;width:${pct}%;background:#a855f7"></div></div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:#a855f7;font-weight:600" title="SOM">${fmtB(c.som)}</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:${c.sales>0?'#22c55e':'#6b7080'};font-weight:600" title="2025 reported sales">${c.sales>0?fmtB(c.sales):'—'}</div>`;
          h+=`<div style="text-align:right"><span style="font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:3px;background:${stageCol}22;color:${stageCol};font-family:var(--mono)">${c.stage.split('(')[0].trim().slice(0,14)||'—'}</span></div>`;
          h+='</div>';
