<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biotech Scenario Screener</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b12;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;color:#c8cdd8}
:root{--mb:#991b1b;--bear:#ef4444;--base:#f59e0b;--bull:#22c55e;--pb:#a855f7;--bg1:#0d1019;--bg2:#131722;--bg3:#1a1f2e;--border:#ffffff12;--text1:#e2e4ea;--text2:#8890a0;--mono:'JetBrains Mono',monospace}
.wrap{max-width:1800px;margin:0 auto;padding:24px 20px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.hdr h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr .bar{width:4px;height:36px;border-radius:99px;background:linear-gradient(180deg,#3b82f6,#8b5cf6);box-shadow:0 0 16px #3b82f644}
.sub{color:var(--text2);font-size:.95rem;margin-bottom:28px;margin-left:18px}
.sub a{color:#60a5fa;text-decoration:none}.sub a:hover{text-decoration:underline}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:22px}
.card-title{font-size:1.15rem;font-weight:700;color:var(--text1);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.card-title .dot{width:8px;height:22px;border-radius:99px}
.card-sub{font-size:.82rem;color:var(--text2);margin-bottom:18px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.stat{border-radius:10px;padding:14px;border:1px solid;text-align:center}
.stat .lbl{font-size:.72rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.stat .val{font-size:1.8rem;font-weight:800;font-family:var(--mono)}
.stat .desc{font-size:.65rem;color:var(--text2);margin-top:2px}
.stat.s-mb{background:linear-gradient(135deg,#991b1b18,#991b1b08);border-color:#991b1b44}.stat.s-mb .val{color:#f87171}
.stat.s-br{background:linear-gradient(135deg,#ef444418,#ef444408);border-color:#ef444444}.stat.s-br .val{color:#fca5a5}
.stat.s-bs{background:linear-gradient(135deg,#f59e0b18,#f59e0b08);border-color:#f59e0b44}.stat.s-bs .val{color:#fbbf24}
.stat.s-bl{background:linear-gradient(135deg,#22c55e18,#22c55e08);border-color:#22c55e44}.stat.s-bl .val{color:#86efac}
.stat.s-pb{background:linear-gradient(135deg,#a855f718,#a855f708);border-color:#a855f744}.stat.s-pb .val{color:#d8b4fe}
.ptf-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.ptf-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.78rem;font-family:var(--mono);cursor:pointer;transition:.15s;color:var(--text1)}
.ptf-tag:hover{border-color:#ef4444}.ptf-tag .x{color:#ef4444;font-weight:700;margin-left:4px}
.ptf-add{background:#3b82f622;border:1px dashed #3b82f644;border-radius:6px;padding:4px 12px;font-size:.78rem;color:#60a5fa;cursor:pointer;font-family:var(--mono)}
.ptf-add:hover{background:#3b82f633}
.ptf-results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ptf-res{border-radius:8px;padding:12px;text-align:center;border:1px solid}
.ptf-res .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.ptf-res .val{font-size:1.3rem;font-weight:800;font-family:var(--mono)}
.dd-wrap{position:relative;display:inline-block}
.dd-input{width:220px;padding:5px 10px;border-radius:6px;font-size:.8rem;font-family:var(--mono);background:var(--bg1);border:1px solid var(--border);color:var(--text1);outline:none}
.dd-input:focus{border-color:#3b82f6}
.dd-list{position:absolute;top:100%;left:0;width:320px;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;z-index:100;display:none}
.dd-list.open{display:block}
.dd-item{padding:6px 10px;cursor:pointer;font-size:.78rem;border-bottom:1px solid #ffffff04;display:flex;justify-content:space-between}
.dd-item:hover{background:#ffffff08}
.dd-item .t{font-family:var(--mono);font-weight:700;color:#60a5fa;margin-right:8px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;font-size:.8rem;border-collapse:collapse;white-space:nowrap}
thead{background:var(--bg1);border-bottom:2px solid #ffffff18}
th{padding:9px 10px;font-weight:600;text-align:left;color:var(--text2);cursor:pointer;transition:.15s;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:var(--text1);background:#ffffff06}
th.r,td.r{text-align:right}
td{padding:7px 10px}
tbody tr{border-bottom:1px solid #ffffff06;transition:.15s}
tbody tr:hover{background:#ffffff06}
.tk{color:#60a5fa;font-weight:700;font-family:var(--mono);cursor:pointer;text-decoration:none;font-size:.82rem}
.tk:hover{text-decoration:underline;color:#93c5fd}
.mono{font-family:var(--mono);font-weight:600}
.ptf-chk{width:14px;height:14px;accent-color:#a855f7;cursor:pointer}
.chart-box{background:var(--bg1);border-radius:10px;padding:16px;border:1px solid var(--border)}
.loading{text-align:center;padding:60px;color:var(--text2);font-size:.9rem}
@media(max-width:1000px){.stats,.ptf-results{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats,.ptf-results{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr"><div class="bar"></div><h1>Biotech Scenario Screener</h1></div>
<p class="sub">5-scenario rNPV/SOTP models · <a href="https://github.com/orbite-lab/BioTechStocks">orbite-lab/BioTechStocks</a> · Click any ticker to open full model</p>
<div id="app"><div class="loading">Loading configs&hellip;</div></div>
</div>
<script>
const CCY={EUR:"\u20AC",USD:"$",HKD:"HK$",SEK:"kr",JPY:"\u00A5",GBP:"\u00A3",CHF:"CHF "};
const ccySym=c=>CCY[c]||"$";
const ccyDec=c=>(c==="JPY"||c==="HKD"||c==="SEK")?0:2;
const SK=["mega_bear","bear","base","bull","psychedelic_bull"];
const SN={mega_bear:"Mega Bear",bear:"Bear",base:"Base",bull:"Bull",psychedelic_bull:"Psych Bull"};
const SC={mega_bear:"#991b1b",bear:"#ef4444",base:"#f59e0b",bull:"#22c55e",psychedelic_bull:"#a855f7"};
const SS={mega_bear:"s-mb",bear:"s-br",base:"s-bs",bull:"s-bl",psychedelic_bull:"s-pb"};

function computeScenario(cfg,scenKey,state){
  const co=cfg.company,scen=state.scenarios[scenKey],val=scen.val;
  const isSOTP=val.pipelineDR!=null;
  let pipeRA=0,pipeGross=0,commRev=0,totalRA=0,totalGross=0,lymeC=0;
  for(const asset of cfg.assets){for(const ind of asset.indications){
    const a=scen.assumptions?.[asset.id]?.[ind.id]||{pos:0,apr:0,pen:1};
    const m=ind.market;const isComm=asset.id==="commercial";
    if(isComm&&isSOTP){commRev=val.commercialRevM||0;continue;}
    let pk=0;
    if(m.patientsK)pk=m.patientsK*m.pricingK*(m.penPct/100)*a.pen;
    else if(m.tamB){const tam=m.tamB*(1+(m.expansionPct||0)/100);pk=tam*(m.penPct/100)*a.pen*1000;}
    const comp=(a.pos/100)*(a.apr/100),ra=pk*comp;
    if(isSOTP){pipeRA+=ra;pipeGross+=pk;}
    totalRA+=ra;totalGross+=pk;
    if(asset.id==="vla15")lymeC=comp;
  }}
  const dM=1-(val.dil||0)/100;let ev;
  if(isSOTP){
    const cEV=commRev*(val.commercialMult||2.5);
    const yr=(2031)-2026,df=Math.pow(1+(val.pipelineDR||14)/100,yr);
    const pEV=(pipeRA*(val.pipelineMult||4))/df;
    const mEV=(val.milestones||0)*lymeC;
    ev=cEV+pEV+mEV+(state.cash||0);
  }else{
    const can=val.cannib?totalRA*(val.cannib/100):0,net=totalRA-can;
    const yr=2033-2026,df=Math.pow(1+val.dr/100,yr);
    const pa=totalGross>0?(val.plat+val.exus)*(net/totalGross):0;
    ev=(net*val.mult+pa)/df+(state.cash||0);
  }
  return{tp:(ev/co.sharesOut)*dM,ev};
}
function computeAll(cfg){
  const st={scenarios:JSON.parse(JSON.stringify(cfg.scenarios)),cash:cfg.company.cash,markets:{}};
  for(const a of cfg.assets)for(const i of a.indications)st.markets[a.id+"_"+i.id]=i.market;
  const sks=Object.keys(st.scenarios),res={};
  sks.forEach(s=>{res[s]=computeScenario(cfg,s,st);});
  const wts=sks.map(s=>st.scenarios[s].wt),tW=wts.reduce((a,b)=>a+b,0);
  const nw=wts.map(w=>w/tW);
  const wTP=sks.reduce((s,k,i)=>s+res[k].tp*nw[i],0);
  return{results:res,weightedTP:wTP};
}

let barChart=null;
async function main(){
  const app=document.getElementById("app");
  let configs;
  try{
    const mr=await fetch("configs/manifest.json");if(!mr.ok)throw 0;
    const tks=await mr.json();
    const ents=await Promise.all(tks.map(async t=>{try{const r=await fetch("configs/"+t+".json");if(!r.ok)return null;return[t,await r.json()];}catch{return null;}}));
    configs={};ents.filter(Boolean).forEach(([t,c])=>{configs[t]=c;});
    if(!Object.keys(configs).length)throw 0;
  }catch{app.innerHTML='<div class="loading" style="color:#ef4444">Failed to load configs. Ensure configs/ folder is deployed.</div>';return;}

  const rows=[];
  for(const[tk,cfg]of Object.entries(configs)){
    const co=cfg.company,{results,weightedTP}=computeAll(cfg);
    const tps={};SK.forEach(s=>{tps[s]=results[s]?results[s].tp:null;});
    const cashPS=co.cash/co.sharesOut;
    const ev=Math.max(0,co.currentPrice*co.sharesOut-co.cash);
    const wtUp=((weightedTP-co.currentPrice)/co.currentPrice*100);
    rows.push({ticker:tk,name:co.name,ccy:ccySym(co.currency),dec:ccyDec(co.currency),
      price:co.currentPrice,cashPS,ev,tps,weightedTP,wtUp,currency:co.currency,subtitle:co.subtitle||""});
  }

  let sortKey="wtUp",sortDir=-1;
  const doSort=()=>{rows.sort((a,b)=>{
    let va,vb;
    if(SK.includes(sortKey)){va=a.tps[sortKey]?((a.tps[sortKey]-a.price)/a.price):0;vb=b.tps[sortKey]?((b.tps[sortKey]-b.price)/b.price):0;}
    else{va=a[sortKey];vb=b[sortKey];}
    if(typeof va==="string")return sortDir*va.localeCompare(vb);return sortDir*((va||0)-(vb||0));
  });};
  doSort();

  const ptfSet=new Set();
  let ddOpen=false;

  function buckets(){
    const b={below_bear:0,bear_base:0,base_bull:0,bull_pb:0,above_pb:0};
    rows.forEach(r=>{
      if(r.tps.bear!=null&&r.price<r.tps.bear)b.below_bear++;
      else if(r.tps.base!=null&&r.price<r.tps.base)b.bear_base++;
      else if(r.tps.bull!=null&&r.price<r.tps.bull)b.base_bull++;
      else if(r.tps.psychedelic_bull!=null&&r.price<r.tps.psychedelic_bull)b.bull_pb++;
      else b.above_pb++;
    });return b;
  }

  function render(){
    const bk=buckets();
    const ptfRows=rows.filter(r=>ptfSet.has(r.ticker));
    const ptfScen={};
    SK.forEach(sk=>{
      if(!ptfRows.length){ptfScen[sk]=0;return;}
      const tM=ptfRows.reduce((s,r)=>s+r.price,0);
      const tT=ptfRows.reduce((s,r)=>s+(r.tps[sk]||r.price),0);
      ptfScen[sk]=((tT-tM)/tM*100);
    });

    let h='';
    // Stats
    h+='<div class="stats">';
    [{k:"below_bear",c:"s-mb",l:"Below Bear",d:"Deep value — price < bear TP"},{k:"bear_base",c:"s-br",l:"Bear–Base",d:"Between bear and base TP"},{k:"base_bull",c:"s-bs",l:"Base–Bull",d:"Fair value range"},{k:"bull_pb",c:"s-bl",l:"Bull–Psych",d:"Above bull, below psych bull"},{k:"above_pb",c:"s-pb",l:"Above Psych Bull",d:"Extreme premium"}].forEach(b=>{
      h+=`<div class="stat ${b.c}"><div class="lbl">${b.l}</div><div class="val">${bk[b.k]}</div><div class="desc">${b.d}</div></div>`;
    });
    h+='</div>';

    // Chart
    h+='<div class="card"><div class="card-title"><div class="dot" style="background:linear-gradient(180deg,#3b82f6,#8b5cf6)"></div>Scenario Upside Map</div>';
    h+='<div class="card-sub">Upside/downside per scenario vs current price — sorted by weighted TP</div>';
    h+='<div class="chart-box" style="height:420px"><canvas id="barChart"></canvas></div></div>';

    // Portfolio
    h+='<div class="card"><div class="card-title"><div class="dot" style="background:linear-gradient(180deg,#a855f7,#ec4899)"></div>Portfolio Scenario Simulator</div>';
    h+='<div class="card-sub">Select stocks via checkboxes or search — equal-weight portfolio returns under each scenario</div>';
    h+='<div class="ptf-bar">';
    ptfSet.forEach(tk=>{h+=`<span class="ptf-tag" onclick="window._toggle('${tk}')">${tk}<span class="x">\u00d7</span></span>`;});
    h+='<div class="dd-wrap"><input class="dd-input" id="ddIn" placeholder="+ Add ticker\u2026" onfocus="window._ddOpen()" oninput="window._ddFilter(this.value)" onblur="setTimeout(()=>window._ddClose(),200)"/>';
    h+='<div class="dd-list" id="ddList">';
    rows.forEach(r=>{if(!ptfSet.has(r.ticker))h+=`<div class="dd-item" onmousedown="window._toggle('${r.ticker}')"><span><span class="t">${r.ticker}</span>${r.name}</span><span style="color:var(--text2);font-size:.7rem">${r.ccy}${r.price.toFixed(r.dec)}</span></div>`;});
    h+='</div></div></div>';
    h+='<div class="ptf-results">';
    SK.forEach(sk=>{
      const v=ptfScen[sk],cls=SS[sk];
      h+=`<div class="ptf-res stat ${cls}"><div class="lbl">${SN[sk]}</div><div class="val" style="color:${v>=0?SC[sk]:'#fca5a5'}">${ptfRows.length?((v>=0?"+":"")+v.toFixed(1)+"%"):"\u2014"}</div></div>`;
    });
    h+='</div>';
    if(ptfRows.length)h+=`<div style="margin-top:8px;font-size:.72rem;color:var(--text2)">${ptfRows.length} stocks \u00b7 Equal-weight \u00b7 Assumes each scenario applies to all positions</div>`;
    h+='</div>';

    // Table
    h+='<div class="card"><div class="card-title"><div class="dot" style="background:linear-gradient(180deg,#10b981,#14b8a6)"></div>Company Analysis</div>';
    h+='<div class="card-sub">Click ticker for full 5-scenario model \u00b7 Check box to add to portfolio \u00b7 Click headers to sort</div>';
    h+='<div class="tbl-wrap"><table><thead><tr>';
    h+='<th style="width:28px">Ptf</th>';
    h+='<th onclick="window._sort(\'ticker\')">Ticker</th>';
    h+='<th onclick="window._sort(\'name\')">Company</th>';
    h+='<th class="r" onclick="window._sort(\'price\')">Price</th>';
    h+='<th class="r" onclick="window._sort(\'ev\')">EV ($M)</th>';
    h+='<th class="r" onclick="window._sort(\'cashPS\')">Cash/Sh</th>';
    SK.forEach(sk=>{h+=`<th class="r" style="color:${SC[sk]}" onclick="window._sort('${sk}')">${SN[sk]}</th>`;});
    h+='<th class="r" onclick="window._sort(\'wtUp\')">Wtd Up%</th>';
    h+='</tr></thead><tbody>';
    rows.forEach(r=>{
      const c=r.ccy,d=r.dec;
      h+='<tr>';
      h+=`<td><input type="checkbox" class="ptf-chk" ${ptfSet.has(r.ticker)?'checked':''} onchange="window._toggle('${r.ticker}')"/></td>`;
      h+=`<td><a class="tk" href="model.html?ticker=${r.ticker}">${r.ticker}</a></td>`;
      h+=`<td style="color:var(--text2);font-size:.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.name}</td>`;
      h+=`<td class="r mono">${c}${r.price.toFixed(d)}</td>`;
      h+=`<td class="r mono" style="color:var(--text2)">${Math.round(r.ev).toLocaleString()}</td>`;
      h+=`<td class="r mono" style="color:#c084fc">${c}${r.cashPS.toFixed(d)}</td>`;
      SK.forEach(sk=>{
        const tp=r.tps[sk];if(tp==null){h+='<td class="r" style="opacity:.3">\u2014</td>';return;}
        const up=((tp-r.price)/r.price*100);
        const col=up>30?'#86efac':up>0?'#fbbf24':up>-20?'#fdba74':'#fca5a5';
        h+=`<td class="r mono" style="color:${col}">${c}${tp.toFixed(d)}</td>`;
      });
      const wc=r.wtUp>30?'#86efac':r.wtUp>0?'#fbbf24':'#fca5a5';
      h+=`<td class="r mono" style="color:${wc}">${r.wtUp>=0?'+':''}${r.wtUp.toFixed(0)}%</td>`;
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';

    h+=`<div style="padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:.78rem;color:var(--text2)">`;
    h+=`<strong style="color:var(--text1)">Data:</strong> ${Object.keys(configs).length} companies \u00b7 5 scenarios (mega bear 5% / bear 15% / base 50% / bull 25% / psych bull 5%) \u00b7 `;
    h+=`Weighted TP = probability-weighted average across scenarios \u00b7 <a href="https://github.com/orbite-lab/BioTechStocks" style="color:#60a5fa">Source configs</a> \u00b7 `;
    h+=`<a href="model.html" style="color:#60a5fa">Open model viewer</a></div>`;

    app.innerHTML=h;

    // Draw chart
    setTimeout(()=>{
      const cv=document.getElementById("barChart");if(!cv)return;
      if(barChart){barChart.destroy();barChart=null;}
      const sorted=[...rows].sort((a,b)=>b.wtUp-a.wtUp);
      barChart=new Chart(cv,{
        type:'bar',
        data:{
          labels:sorted.map(r=>r.ticker),
          datasets:SK.map(sk=>({
            label:SN[sk],
            data:sorted.map(r=>r.tps[sk]?((r.tps[sk]-r.price)/r.price*100):0),
            backgroundColor:SC[sk]+'55',borderColor:SC[sk],borderWidth:1,borderRadius:2,
            barPercentage:0.7,categoryPercentage:0.85
          }))
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{position:'top',labels:{color:'#8890a0',font:{size:10,family:'DM Sans'},boxWidth:10,padding:14}},
            tooltip:{backgroundColor:'#1a1f2e',titleColor:'#e2e4ea',bodyColor:'#c8cdd8',borderColor:'#ffffff18',borderWidth:1,
              callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y>=0?'+':''}${ctx.parsed.y.toFixed(0)}%`}}
          },
          scales:{
            x:{ticks:{color:'#6b7080',font:{size:8,family:'JetBrains Mono'},maxRotation:90,minRotation:45},grid:{color:'#ffffff06'}},
            y:{ticks:{color:'#6b7080',font:{size:10},callback:v=>v+'%'},grid:{color:'#ffffff08'},
              title:{display:true,text:'Upside / Downside vs Current Price',color:'#6b7080',font:{size:11}}}
          }
        }
      });
    },60);
  }

  window._sort=function(k){if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}doSort();render();};
  window._toggle=function(tk){if(ptfSet.has(tk))ptfSet.delete(tk);else ptfSet.add(tk);render();};
  window._ddOpen=function(){document.getElementById('ddList')?.classList.add('open');};
  window._ddClose=function(){document.getElementById('ddList')?.classList.remove('open');};
  window._ddFilter=function(q){const dd=document.getElementById('ddList');if(!dd)return;dd.classList.add('open');
    dd.querySelectorAll('.dd-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});};

  render();
}
main();
</script>
</body>
</html>
