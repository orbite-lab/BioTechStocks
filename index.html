<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biotech Scenario Screener</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b12;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;color:#c8cdd8}
:root{--mb:#991b1b;--bear:#ef4444;--base:#f59e0b;--bull:#22c55e;--pb:#a855f7;--bg1:#0d1019;--bg2:#131722;--bg3:#1a1f2e;--border:#ffffff12;--text1:#e2e4ea;--text2:#8890a0;--mono:'JetBrains Mono',monospace}
.wrap{max-width:1900px;margin:0 auto;padding:12px 12px 24px 240px}
@media(max-width:980px){.wrap{padding-left:20px}}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.hdr h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr .bar{width:4px;height:36px;border-radius:99px;background:linear-gradient(180deg,#3b82f6,#8b5cf6);box-shadow:0 0 16px #3b82f644}
.sub{color:var(--text2);font-size:.95rem;margin-bottom:28px;margin-left:18px}
.sub a{color:#60a5fa;text-decoration:none}.sub a:hover{text-decoration:underline}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px 18px;margin-bottom:18px;scroll-margin-top:180px}
.card.sec-collapsed > *:not(.card-title){display:none !important}
.card.sec-collapsed{padding-top:18px;padding-bottom:18px}
.sec-chev{cursor:pointer;margin-right:8px;color:#6b7080;font-size:.82rem;display:inline-block;width:14px;user-select:none;transition:color .15s}
.sec-chev:hover{color:#e2e4ea}
.card-title{font-size:1.15rem;font-weight:700;color:var(--text1);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.card-title .dot{width:8px;height:22px;border-radius:99px}
/* Left-nav-driven layout: the card header repeats the section name shown in
   the left nav, wasting vertical space. Hide the name + dot + (unused) chev
   from flex card titles; action chips on the right stay visible. Non-flex
   titles are hidden entirely via inline style="display:none" set by titleAttrs. */
.card-title > div:first-child{display:none}
.card-sub{font-size:.82rem;color:var(--text2);margin-bottom:18px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.stat{border-radius:10px;padding:14px;border:1px solid;text-align:center}
.stat .lbl{font-size:.72rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.stat .val{font-size:1.8rem;font-weight:800;font-family:var(--mono)}
.stat .desc{font-size:.65rem;color:var(--text2);margin-top:2px}
.stat.s-mb{background:linear-gradient(135deg,#991b1b18,#991b1b08);border-color:#991b1b44}.stat.s-mb .val{color:#f87171}
.stat.s-br{background:linear-gradient(135deg,#ef444418,#ef444408);border-color:#ef444444}.stat.s-br .val{color:#fca5a5}
.stat.s-bs{background:linear-gradient(135deg,#f59e0b18,#f59e0b08);border-color:#f59e0b44}.stat.s-bs .val{color:#fbbf24}
.stat.s-bl{background:linear-gradient(135deg,#22c55e18,#22c55e08);border-color:#22c55e44}.stat.s-bl .val{color:#86efac}
.stat.s-pb{background:linear-gradient(135deg,#a855f718,#a855f708);border-color:#a855f744}.stat.s-pb .val{color:#d8b4fe}
.ptf-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.ptf-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.78rem;font-family:var(--mono);cursor:pointer;transition:.15s;color:var(--text1)}
.ptf-tag:hover{border-color:#ef4444}.ptf-tag .x{color:#ef4444;font-weight:700;margin-left:4px}
.ptf-add{background:#3b82f622;border:1px dashed #3b82f644;border-radius:6px;padding:4px 12px;font-size:.78rem;color:#60a5fa;cursor:pointer;font-family:var(--mono)}
.ptf-add:hover{background:#3b82f633}
.ptf-results{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ptf-res{border-radius:8px;padding:12px;text-align:center;border:1px solid}
.ptf-res .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.ptf-res .val{font-size:1.3rem;font-weight:800;font-family:var(--mono)}
.dd-wrap{position:relative;display:inline-block}
.dd-input{width:220px;padding:5px 10px;border-radius:6px;font-size:.8rem;font-family:var(--mono);background:var(--bg1);border:1px solid var(--border);color:var(--text1);outline:none}
.dd-input:focus{border-color:#3b82f6}
.dd-list{position:absolute;top:100%;left:0;width:320px;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;z-index:100;display:none}
.dd-list.open{display:block}
.dd-item{padding:6px 10px;cursor:pointer;font-size:.78rem;border-bottom:1px solid #ffffff04;display:flex;justify-content:space-between}
.dd-item:hover{background:#ffffff08}
.dd-item .t{font-family:var(--mono);font-weight:700;color:#60a5fa;margin-right:8px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;font-size:.8rem;border-collapse:collapse;white-space:nowrap}
thead{background:var(--bg1);border-bottom:2px solid #ffffff18}
th{padding:9px 10px;font-weight:600;text-align:left;color:var(--text2);cursor:pointer;transition:.15s;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
th:hover{color:var(--text1);background:#ffffff06}
th.r,td.r{text-align:right}
td{padding:7px 10px}
tbody tr{border-bottom:1px solid #ffffff06;transition:.15s}
tbody tr:hover{background:#ffffff06}
.tk{color:#60a5fa;font-weight:700;font-family:var(--mono);cursor:pointer;text-decoration:none;font-size:.82rem}
.tk:hover{text-decoration:underline;color:#93c5fd}
.mono{font-family:var(--mono);font-weight:600}
.ptf-chk{width:14px;height:14px;accent-color:#a855f7;cursor:pointer}
.chart-box{background:var(--bg1);border-radius:10px;padding:16px;border:1px solid var(--border)}
.rs-wrap{background:var(--bg1);border-radius:10px;border:1px solid var(--border);padding:12px 0;overflow-x:auto}
.rs-legend{display:flex;gap:16px;padding:0 16px 12px;font-size:.72rem;font-weight:600;color:var(--text2);flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:8px}
.rs-legend .li{display:flex;align-items:center;gap:5px}.rs-legend .bx{width:10px;height:10px;border-radius:50%}
.rs-row{display:flex;align-items:center;padding:3px 0;transition:.15s}.rs-row:hover{background:#ffffff06}
.rs-tk{width:54px;text-align:right;padding-right:6px;font-family:var(--mono);font-weight:700;font-size:.75rem;color:#60a5fa;flex-shrink:0;cursor:pointer;text-decoration:none}
.rs-tk:hover{color:#93c5fd;text-decoration:underline}
.rs-rr{width:42px;text-align:right;padding-right:8px;font-family:var(--mono);font-weight:700;font-size:.68rem;flex-shrink:0}
.rs-track{flex:1;height:24px;position:relative;margin-right:12px}
.rs-line{position:absolute;top:50%;height:2px;transform:translateY(-50%);border-radius:1px}
.rs-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);border:1.5px solid var(--bg1);z-index:2;cursor:default}
.rs-dot:hover{width:13px;height:13px;z-index:3}
.rs-dot .tip{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:.68rem;font-family:var(--mono);white-space:nowrap;z-index:10;color:var(--text1);pointer-events:none}
.rs-dot:hover .tip{display:block}
.rs-zero{position:absolute;top:0;bottom:0;width:1px;background:#ffffff30;z-index:1}
.rs-zero-lbl{position:absolute;top:-14px;left:-6px;font-size:.6rem;color:var(--text2);font-family:var(--mono)}
.rs-axis{display:flex;align-items:center;margin-top:4px;border-top:1px solid var(--border);padding-top:6px}
.rs-axis-track{flex:1;position:relative;height:14px;margin-right:12px}
.rs-axis-lbl{position:absolute;top:0;transform:translateX(-50%);font-size:.6rem;color:var(--text2);font-family:var(--mono)}
.loading{text-align:center;padding:60px;color:var(--text2);font-size:.9rem}
.topbar{position:sticky;top:0;z-index:200;background:#080b12ee;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-weight:800;font-size:1rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.topbar-dd{position:relative;flex:1;max-width:400px}
.topbar-input{width:100%;padding:7px 12px;border-radius:7px;font-size:.82rem;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);color:var(--text1);outline:none}
.topbar-input:focus{border-color:#3b82f6}
.topbar-list{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;z-index:300;display:none}
.topbar-list.open{display:block}
.topbar-item{padding:8px 12px;cursor:pointer;font-size:.8rem;border-bottom:1px solid #ffffff04;display:flex;justify-content:space-between;align-items:center}
.topbar-item:hover{background:#ffffff08}
.topbar-item .t{font-family:var(--mono);font-weight:700;color:#60a5fa;margin-right:8px}
.topbar-item .n{color:var(--text2);font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-count{font-size:.75rem;color:var(--text2);font-family:var(--mono);white-space:nowrap}
.topbar-nav{display:flex;gap:4px;margin-left:auto;align-items:center}
.sig-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:.68rem;font-family:var(--mono);font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;border:1px solid transparent;user-select:none}
.sig-badge .sig-label{color:var(--text2);letter-spacing:.2px}
.sig-badge .sig-count{font-weight:800;font-size:.78rem}
.sig-badge:hover{background:#ffffff08}
.sig-badge.active{border-color:currentColor}
.sig-badge.empty{opacity:.35;cursor:default}
.sig-badge.empty:hover{background:transparent}
.sig-cash{color:#ef4444}
.sig-pdufa{color:#f59e0b}
.sig-rr{color:#22c55e}
.sig-hot{color:#60a5fa}
.sig-late{color:#dc2626;font-weight:700}
.sticky-filters{position:sticky;top:46px;z-index:190;background:#080b12ee;backdrop-filter:blur(12px);padding:6px 20px 0;border-bottom:1px solid var(--border);display:none}
.sticky-filters .fbar{margin-bottom:6px;padding:6px 10px}
.sticky-filters .fl2-row{margin-bottom:6px;padding:2px 10px 4px}
.sticky-filters .stats{margin-bottom:6px}
@media(max-width:1000px){.stats,.ptf-results{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats,.ptf-results{grid-template-columns:1fr}}
.fbar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.fbar:last-of-type{margin-bottom:14px}
.fbar.fbar-top{padding:6px 12px;background:var(--bg1)}
.fbar-lbl{font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-right:2px;font-weight:600;opacity:.7}
.fbar-meta{margin-left:auto;display:flex;gap:8px;align-items:center;font-size:.7rem;color:var(--text2);font-family:var(--mono)}
.fchip{padding:3px 9px;border-radius:5px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:.15s;white-space:nowrap}
.fchip:hover{border-color:#60a5fa;color:var(--text1)}
.fchip.active{background:#3b82f622;border-color:#3b82f6;color:#93c5fd}
.fchip .cnt{font-size:.6rem;opacity:.6;margin-left:5px}
.fchip-rare .cnt{font-size:.6rem;opacity:.7;margin-left:5px}
.fchip-rare{padding:4px 10px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid #f59e0b44;background:#f59e0b08;color:#f59e0b;transition:.15s}
.fchip-rare:hover{border-color:#f59e0b;color:#fbbf24;background:#f59e0b18}
.fchip-rare.active{background:#f59e0b22;border-color:#f59e0b;color:#fbbf24}
.fsep{width:1px;height:16px;background:var(--border);margin:0 5px;opacity:.5}
.fsel{padding:4px 8px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);outline:none;font-family:var(--mono)}
.fsel:focus{border-color:#3b82f6}
.fl2-row{display:flex;flex-wrap:wrap;gap:4px;padding:2px 14px 6px;margin-bottom:6px}
.fl2chip{padding:3px 8px;border-radius:5px;font-size:.67rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg1);color:var(--text2);transition:.15s}
.fl2chip:hover{border-color:#a855f7;color:var(--text1)}
.fl2chip.active{background:#a855f722;border-color:#a855f7;color:#d8b4fe}
.fl2chip .cnt{font-size:.58rem;opacity:.5;margin-left:2px}
.purity-badge{display:inline-block;font-size:.62rem;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:#a855f722;color:#c084fc;margin-left:5px;font-weight:700;border:1px solid #a855f733}

/* ===== Master-detail layout: edge-flush left nav (NAVIGATION ONLY, no scroll) ===== */
.app-shell{margin-top:4px}
.left-nav{position:fixed;left:0;top:46px;bottom:0;width:200px;overflow:hidden;padding:10px 6px;background:var(--bg2);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column}
.left-nav .nav-group{font-size:.56rem;text-transform:uppercase;letter-spacing:1.6px;color:var(--text2);opacity:.55;padding:14px 12px 5px;font-weight:700}
.left-nav .nav-group:first-child{padding-top:6px}
.left-nav .nav-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px 7px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--text1);margin:1px 4px;transition:background .12s,color .12s,border-left-color .12s;gap:8px;border-left:3px solid transparent}
.left-nav .nav-item:hover{background:#ffffff08}
.left-nav .nav-item.active{background:#60a5fa15;color:#bfdbfe;font-weight:600}
.left-nav .nav-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.main-area{min-width:0}
.main-area > .card{display:none}
.main-area > .card.active-section{display:block;margin-bottom:16px}

/* ===== Filter drawer (right slide-in) ===== */
.filter-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text1);font-size:.75rem;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.filter-btn:hover{border-color:#60a5fa;color:#bfdbfe}
.filter-btn.has-active{border-color:#60a5fa;background:#60a5fa18;color:#bfdbfe}
.filter-btn .badge{background:#60a5fa;color:#0a0c10;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center;font-family:var(--mono)}
.drawer-overlay{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(2px);z-index:300;opacity:0;pointer-events:none;transition:opacity .18s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.filter-drawer{position:fixed;right:0;top:0;bottom:0;width:380px;max-width:90vw;background:var(--bg2);border-left:1px solid var(--border);z-index:310;transform:translateX(100%);transition:transform .22s ease-out;display:flex;flex-direction:column;box-shadow:-12px 0 30px rgba(0,0,0,.4)}
.filter-drawer.open{transform:translateX(0)}
.drawer-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.drawer-header .title{font-size:.95rem;font-weight:700;color:var(--text1)}
.drawer-header .close{font-size:1.2rem;color:var(--text2);cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:4px}
.drawer-header .close:hover{background:#ffffff10;color:var(--text1)}
.drawer-body{flex:1;overflow-y:auto;padding:14px 18px;scrollbar-width:thin}
.drawer-body::-webkit-scrollbar{width:6px}
.drawer-body::-webkit-scrollbar-thumb{background:#ffffff14;border-radius:3px}
.drawer-body .nav-flbl{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);opacity:.7;font-weight:700;margin-top:14px;margin-bottom:5px;display:block}
.drawer-body .nav-flbl:first-child{margin-top:0}
.drawer-body .fchip-row{display:flex;flex-wrap:wrap;gap:4px}
.drawer-body .fchip,.drawer-body .fchip-rare,.drawer-body .fl2chip{padding:4px 9px;font-size:.7rem;margin:0;display:inline-flex}
.drawer-body .fsel{padding:5px 8px;font-size:.75rem;background:var(--bg3);border:1px solid var(--border);color:var(--text1);border-radius:5px;outline:none}
.drawer-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text2);font-family:var(--mono);flex-shrink:0}
.drawer-footer b{color:var(--text1)}

/* ===== Active-filter token strip (above active card) ===== */
.active-filters{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:8px 0 12px;font-size:.7rem;color:var(--text2)}
.active-filters .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 4px 3px 8px;background:#60a5fa18;border:1px solid #60a5fa44;border-radius:5px;color:#bfdbfe;font-size:.68rem;font-weight:600;cursor:pointer;transition:.12s}
.active-filters .pill:hover{background:#60a5fa28;border-color:#60a5fa}
.active-filters .pill .x{opacity:.6;font-weight:700;padding:0 2px}
.active-filters .pill:hover .x{opacity:1}
.active-filters .lbl{margin-right:2px;opacity:.6;font-size:.66rem;text-transform:uppercase;letter-spacing:.8px}

/* Hide the legacy sticky-filters element entirely (filters now in drawer) */
.sticky-filters{display:none !important}

@media (max-width:980px){
  .left-nav{position:relative;left:0;top:0;width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);padding-bottom:8px;flex-direction:row;flex-wrap:wrap;overflow:visible}
  .left-nav .nav-group{padding:6px 8px 2px;width:100%}
  .filter-drawer{width:90vw}
}
</style>
</head>
<body>
<div id="topbar" class="topbar" style="display:none">
  <span class="topbar-title">Biotech Screener</span>
  <div class="topbar-dd">
    <input class="topbar-input" id="topSearch" placeholder="Search company → open model..." onfocus="document.getElementById('topList').classList.add('open')" onblur="setTimeout(()=>document.getElementById('topList').classList.remove('open'),200)" oninput="window._topFilter(this.value)"/>
    <div class="topbar-list" id="topList"></div>
  </div>
  <span class="topbar-count" id="topCount"></span>
  <button class="filter-btn" id="filterBtn" onclick="window._toggleDrawer()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
    Filters <span class="badge" id="filterBadge" style="display:none">0</span>
  </button>
  <nav class="topbar-nav" id="topNav"></nav>
</div>
<div id="stickyFilters" class="sticky-filters"></div>
<div id="drawerOverlay" class="drawer-overlay" onclick="window._toggleDrawer()"></div>
<aside id="filterDrawer" class="filter-drawer">
  <div class="drawer-header">
    <span class="title">Filters</span>
    <button class="close" onclick="window._toggleDrawer()" aria-label="Close">×</button>
  </div>
  <div id="drawerBody" class="drawer-body"></div>
  <div class="drawer-footer">
    <span id="drawerCount"></span>
    <span id="drawerClear"></span>
  </div>
</aside>
<div class="wrap">
<div id="app"><div class="loading">Loading configs&hellip;</div></div>
</div>
<script>
const CCY={EUR:"\u20AC",USD:"$",HKD:"HK$",SEK:"kr",DKK:"kr",JPY:"\u00A5",GBP:"\u00A3",CHF:"CHF ",AUD:"A$"};
const ccySym=c=>CCY[c]||"$";
const ccyDec=c=>(c==="JPY"||c==="HKD"||c==="SEK"||c==="DKK")?0:2;
const FX_TO_USD={USD:1,EUR:1.08,GBP:1.27,CHF:1.12,JPY:0.0067,HKD:0.128,SEK:0.095,DKK:0.144,AUD:0.66,INR:0.012,KRW:0.00073,CNY:0.14}; // approximate rates
const toUSD=(val,ccy)=>val*(FX_TO_USD[ccy]||1);
const SK=["mega_bear","bear","base","bull","psychedelic_bull"];
const SN={mega_bear:"Mega Bear",bear:"Bear",base:"Base",bull:"Bull",psychedelic_bull:"Psych Bull"};
const SC={mega_bear:"#991b1b",bear:"#ef4444",base:"#f59e0b",bull:"#22c55e",psychedelic_bull:"#a855f7"};

function deriveCompanyMeta(cfg){
  const areas=new Set(),modalities=new Set(),areaTAM={},areaWTD={};
  let totalTAM=0,rareTAM=0,totalWTD=0,rareWTD=0;
  const baseAssump=cfg.scenarios?.base?.assumptions||{};
  for(const asset of cfg.assets){
    if(asset.modality){modalities.add(asset.modality);const p=asset.modality.split(".");modalities.add(p[0]);if(p[1])modalities.add(p[0]+"."+p[1]);if(p[2])modalities.add(p[0]+"."+p[1]+"."+p[2]);}
    for(const ind of asset.indications){
      if(ind.area){
        areas.add(ind.area);
        const p=ind.area.split(".");areas.add(p[0]);if(p[1])areas.add(p[0]+"."+p[1]);if(p[2])areas.add(p[0]+"."+p[1]+"."+p[2]);
        let tam=0;
        const _m=ind.market||{};
        if(_m.regions){for(const _r of Object.values(_m.regions)){if(_r)tam+=(_r.patientsK||0)*((_r.wtpPct||0)/100)*(_r.priceK||0);}tam/=1000;}
        else if(_m.tamB)tam=_m.tamB;
        else if(_m.patientsK&&_m.pricingK)tam=_m.patientsK*_m.pricingK/1000;
        const a=baseAssump[asset.id]?.[ind.id]||{};
        const pos=(a.pos??100)/100,apr=(a.apr??100)/100;
        const wtd=tam*pos*apr;
        areaTAM[ind.area]=(areaTAM[ind.area]||0)+tam;
        areaWTD[ind.area]=(areaWTD[ind.area]||0)+wtd;
        if(p[1]){areaTAM[p[0]+"."+p[1]]=(areaTAM[p[0]+"."+p[1]]||0)+tam;areaWTD[p[0]+"."+p[1]]=(areaWTD[p[0]+"."+p[1]]||0)+wtd;}
        if(p[2]){const l3=p[0]+"."+p[1]+"."+p[2];areaTAM[l3]=(areaTAM[l3]||0)+tam;areaWTD[l3]=(areaWTD[l3]||0)+wtd;}
        areaTAM[p[0]]=(areaTAM[p[0]]||0)+tam;areaWTD[p[0]]=(areaWTD[p[0]]||0)+wtd;
        totalTAM+=tam;totalWTD+=wtd;
        if(ind.rare){rareTAM+=tam;rareWTD+=wtd;}
      }
    }
  }
  const mkFocus=(tamMap,total)=>total>0?Object.entries(tamMap).filter(([k])=>k.split(".").length>=2).map(([area,t])=>({area,purity:Math.round(t/total*100)})).sort((a,b)=>b.purity-a.purity):[];
  // Optionality = total TAM leverage (raw / risk-adjusted - 1)
  const optionality=totalWTD>0?Math.round((totalTAM/totalWTD-1)*100):0;
  return{areas:[...areas],modalities:[...modalities],
    focus:mkFocus(areaTAM,totalTAM),focusWtd:mkFocus(areaWTD,totalWTD),
    phase:cfg.company.phase||"phase1",
    rare:cfg.assets.some(a=>a.indications.some(i=>i.rare)),
    rarePurity:totalTAM>0?Math.round(rareTAM/totalTAM*100):0,
    rarePurityWtd:totalWTD>0?Math.round(rareWTD/totalWTD*100):0,
    optionality,totalTAM,totalWTD};
}

function computeScenario(cfg,scenKey,state){
  const co=cfg.company,scen=state.scenarios[scenKey],val=scen.val;
  const isSOTP=val.pipelineDR!=null;
  let pipeRA=0,pipeGross=0,commRev=0,totalRA=0,totalGross=0,lymeC=0;
  for(const asset of cfg.assets){for(const ind of asset.indications){
    const a=scen.assumptions?.[asset.id]?.[ind.id]||{pos:0,apr:0,pen:1};
    const m=ind.market;const stgL=(asset.stage||"").toLowerCase();
    const isComm=asset.id==="commercial"||(isSOTP&&(stgL.includes("commercial")||stgL.includes("launched")||stgL.includes("marketed")));
    if(isComm&&isSOTP){continue;}
    let pk=0;
    if(m.company_slice&&m.regions){let som=0;for(const[rk,cs]of Object.entries(m.company_slice)){const tr=m.regions[rk];if(!tr||!cs)continue;som+=(tr.patientsK||0)*((cs.reachPct||0)/100)*((cs.wtpPct||0)/100)*(cs.priceK||0);}if(m.cagrPct){const yr=(m.peakYear||2033)-2026;som*=Math.pow(1+m.cagrPct/100,yr);}if(m.expansionPct)som*=(1+m.expansionPct/100);pk=som*a.pen;}
    else if(m.regions){let addr=0;for(const _r of Object.values(m.regions)){if(_r)addr+=(_r.patientsK||0)*((_r.wtpPct||0)/100)*(_r.priceK||0);}if(m.cagrPct){const yr=(m.peakYear||2033)-2026;addr*=Math.pow(1+m.cagrPct/100,yr);}if(m.expansionPct)addr*=(1+m.expansionPct/100);pk=addr*((m.penPct||0)/100)*a.pen;}
    else if(m.patientsK)pk=m.patientsK*m.pricingK*(m.penPct/100)*a.pen;
    else if(m.tamB){const yr=(m.peakYear||2033)-2026;const tam=m.tamB*(m.cagrPct?Math.pow(1+m.cagrPct/100,yr):1)*(1+(m.expansionPct||0)/100);pk=tam*(m.penPct/100)*a.pen*1000;}
    const comp=(a.pos/100)*(a.apr/100),ra=pk*comp;
    if(isSOTP){pipeRA+=ra;pipeGross+=pk;}
    totalRA+=ra;totalGross+=pk;
    if(asset.id==="vla15")lymeC=comp;
  }}
  const dM=1-(val.dil||0)/100;let ev;
  if(isSOTP){
    commRev=val.commercialRevM||commRev||0;
    const cEV=commRev*(val.commercialMult||2.5);
    const yr=(2031)-2026,df=Math.pow(1+(val.pipelineDR||14)/100,yr);
    const pEV=(pipeRA*(val.pipelineMult||4))/df;
    const mEV=(val.milestones||0)*lymeC;
    ev=cEV+pEV+mEV+(state.cash||0);
  }else{
    const can=val.cannib?totalRA*(val.cannib/100):0,net=totalRA-can;
    const yr=2033-2026,df=Math.pow(1+val.dr/100,yr);
    const pa=totalGross>0?(val.plat+val.exus)*(net/totalGross):0;
    ev=(net*val.mult+pa)/df+(state.cash||0);
  }
  return{tp:(ev/co.sharesOut)*dM,ev};
}
function computeAll(cfg){
  const st={scenarios:JSON.parse(JSON.stringify(cfg.scenarios)),cash:cfg.company.cash,markets:{}};
  for(const a of cfg.assets)for(const i of a.indications)st.markets[a.id+"_"+i.id]=i.market;
  const sks=Object.keys(st.scenarios),res={};
  sks.forEach(s=>{res[s]=computeScenario(cfg,s,st);});
  const wts=sks.map(s=>st.scenarios[s].wt),tW=wts.reduce((a,b)=>a+b,0);
  const nw=wts.map(w=>w/tW);
  const wTP=sks.reduce((s,k,i)=>s+res[k].tp*nw[i],0);
  return{results:res,weightedTP:wTP};
}
// Compute weighted TP with overridden PoS/Apr for a specific asset.indication
// Flat override: force asset.indication to specific pos/apr across ALL scenarios
function computeTPOverride(cfg,assetId,indId,pos,apr){
  const mod=JSON.parse(JSON.stringify(cfg));
  for(const sk in mod.scenarios){
    const a=mod.scenarios[sk].assumptions;
    if(!a[assetId])a[assetId]={};
    if(!a[assetId][indId])a[assetId][indId]={pos:0,apr:0,pen:1};
    a[assetId][indId].pos=pos;
    a[assetId][indId].apr=apr;
  }
  return computeAll(mod).weightedTP;
}
// Compute weighted TP with floor/ceiling PoS override + custom scenario weights
// mode='floor': MAX(current, override) — for success (lift pessimists, keep optimists)
// mode='ceil':  MIN(current, override) — for fail (lower optimists, keep pessimists)
function computeTPShifted(cfg,assetId,indId,pos,apr,weights,mode){
  const mod=JSON.parse(JSON.stringify(cfg));
  const sks=Object.keys(mod.scenarios);
  for(const sk of sks){
    const a=mod.scenarios[sk].assumptions;
    if(!a[assetId])a[assetId]={};
    if(!a[assetId][indId])a[assetId][indId]={pos:0,apr:0,pen:1};
    const cur=a[assetId][indId];
    if(mode==='floor'){
      cur.pos=Math.max(cur.pos,pos);
      cur.apr=Math.max(cur.apr,apr);
    }else{
      cur.pos=Math.min(cur.pos,pos);
      cur.apr=Math.min(cur.apr,apr);
    }
    mod.scenarios[sk].wt=weights[sk];
  }
  return computeAll(mod).weightedTP;
}

// ================================================================
// PORTFOLIO KELLY OPTIMIZER (multi-asset, taxonomy-correlated)
// Solves: max_f E[ln(1 + Σ f_i·r_i)]  s.t.  f∈[0,maxPos], Σf≤1, per-L1 ≤ maxL2
// ================================================================
function _tickerCorr(a,b){
  if(!a||!b) return 0.15;                                 // baseline biotech beta
  const A=a.split("."), B=b.split(".");
  if(A[0]!==B[0]) return 0.15;                            // different L1
  if(A.length<2||B.length<2||A[1]!==B[1]) return 0.25;    // same L1
  if(A.length<3||B.length<3||A[2]!==B[2]) return 0.45;    // same L2
  return 0.70;                                            // same L3
}
function _cholesky(M){
  const n=M.length, L=Array.from({length:n},()=>new Float64Array(n));
  for(let i=0;i<n;i++) for(let j=0;j<=i;j++){
    let s=M[i][j];
    for(let k=0;k<j;k++) s-=L[i][k]*L[j][k];
    if(i===j){ L[i][j]=Math.sqrt(Math.max(s,1e-10)); }
    else L[i][j]=s/L[j][j];
  }
  return L;
}
function _randn(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function _ncdf(x){ const t=1/(1+0.2316419*Math.abs(x)); const d=0.3989422804*Math.exp(-x*x/2);
  const p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274)))); return x>0?1-p:p; }
function _primaryArea(meta){
  const foc=(meta.focusWtd&&meta.focusWtd.length?meta.focusWtd:(meta.focus||[]));
  if(!foc.length) return "";
  const l3=foc.find(f=>f.area.split(".").length>=3); if(l3) return l3.area;
  const l2=foc.find(f=>f.area.split(".").length===2); if(l2) return l2.area;
  return foc[0].area;
}
function runPortfolioKelly(rows, configs, opts){
  opts=opts||{};
  const N=opts.N||5000, maxPos=opts.maxPos||0.25, maxL2=opts.maxL2||0.40;
  const kFrac=opts.kFrac||0.5, iters=opts.iters||300, ridge=opts.ridge||0.10;

  // Build ticker list with scenario (p, r) pairs
  const tix=[];
  rows.forEach(r=>{
    const cfg=configs[r.ticker]; if(!cfg||!cfg.scenarios) return;
    const sks=Object.keys(cfg.scenarios);
    const wts=sks.map(s=>cfg.scenarios[s].wt||0);
    const tw=wts.reduce((a,b)=>a+b,0); if(tw<=0) return;
    const pairs=sks.map((sk,i)=>({p:wts[i]/tw, r:(r.tps[sk]-r.price)/r.price}))
                   .filter(x=>isFinite(x.r));
    if(pairs.length<2) return;
    let cum=0; const cdf=pairs.map(x=>({r:x.r, upTo:(cum+=x.p)}));
    const area=_primaryArea(r.meta);
    tix.push({ticker:r.ticker, area, l1:area.split(".")[0]||"_other", pairs, cdf,
              expR: pairs.reduce((s,p)=>s+p.p*p.r,0)});
  });
  const K=tix.length; if(K<2) return null;

  // Correlation matrix with ridge shrinkage toward identity (ensures PD)
  const C=Array.from({length:K},()=>new Float64Array(K));
  for(let i=0;i<K;i++){ C[i][i]=1;
    for(let j=0;j<i;j++){
      const rho=(1-ridge)*_tickerCorr(tix[i].area, tix[j].area);
      C[i][j]=rho; C[j][i]=rho;
    }
  }
  const L=_cholesky(C);

  // Monte Carlo: N samples × K assets
  const R=Array.from({length:N},()=>new Float64Array(K));
  const g=new Float64Array(K), z=new Float64Array(K);
  for(let n=0;n<N;n++){
    for(let k=0;k<K;k++) g[k]=_randn();
    for(let i=0;i<K;i++){ let s=0; for(let j=0;j<=i;j++) s+=L[i][j]*g[j]; z[i]=s; }
    for(let i=0;i<K;i++){
      const u=_ncdf(z[i]); const cdf=tix[i].cdf;
      let pick=cdf[cdf.length-1].r;
      for(const c of cdf){ if(u<=c.upTo){ pick=c.r; break; } }
      R[n][i]=pick;
    }
  }

  const l1Groups={}; tix.forEach((t,i)=>{ (l1Groups[t.l1]=l1Groups[t.l1]||[]).push(i); });

  function gradU(f){
    const grad=new Float64Array(K); let U=0;
    for(let n=0;n<N;n++){
      let pr=1; const row=R[n];
      for(let i=0;i<K;i++) pr+=f[i]*row[i];
      if(pr<1e-6) pr=1e-6;
      U+=Math.log(pr);
      const inv=1/pr;
      for(let i=0;i<K;i++) grad[i]+=row[i]*inv;
    }
    for(let i=0;i<K;i++) grad[i]/=N;
    return {U:U/N, g:grad};
  }
  function project(f){
    for(let i=0;i<K;i++){ if(f[i]<0) f[i]=0; if(f[i]>maxPos) f[i]=maxPos; }
    for(const l1 in l1Groups){ let s=0; const idx=l1Groups[l1];
      for(const i of idx) s+=f[i];
      if(s>maxL2){ const sc=maxL2/s; for(const i of idx) f[i]*=sc; }
    }
    let tot=0; for(let i=0;i<K;i++) tot+=f[i];
    if(tot>1){ const sc=1/tot; for(let i=0;i<K;i++) f[i]*=sc; }
  }

  // Warm start: seed proportional to positive expected return
  const fFull=new Float64Array(K);
  let posEdge=0; tix.forEach((t,i)=>{ if(t.expR>0){ fFull[i]=t.expR; posEdge+=t.expR; } });
  if(posEdge>0){ const sc=0.5/posEdge; for(let i=0;i<K;i++) fFull[i]*=sc; } // start at 50% total
  project(fFull);

  let eta=0.05, prevU=-Infinity;
  for(let it=0;it<iters;it++){
    const {U,g}=gradU(fFull);
    for(let i=0;i<K;i++) fFull[i]+=eta*g[i];
    project(fFull);
    if(it>30 && Math.abs(U-prevU)<1e-6) break;
    prevU=U; eta*=0.996;
  }

  // Fractional Kelly scaling
  const fUse=new Float64Array(K);
  for(let i=0;i<K;i++) fUse[i]=fFull[i]*kFrac;

  // Stats on the CHOSEN fractional portfolio
  const rets=new Float64Array(N);
  for(let n=0;n<N;n++){ let pr=0; for(let i=0;i<K;i++) pr+=fUse[i]*R[n][i]; rets[n]=pr; }
  const sorted=Array.from(rets).sort((a,b)=>a-b);
  const pct=q=>sorted[Math.max(0,Math.min(N-1,Math.floor(q*N)))];
  const meanArith=sorted.reduce((a,b)=>a+b,0)/N;
  let meanLog=0; for(let n=0;n<N;n++) meanLog+=Math.log(Math.max(1+rets[n],1e-6));
  meanLog/=N;
  const drawProb=sorted.filter(r=>r<-0.2).length/N;
  let totalDeployed=0; for(let i=0;i<K;i++) totalDeployed+=fUse[i];

  const weights=tix.map((t,i)=>({ticker:t.ticker, area:t.area, l1:t.l1,
      wFull:fFull[i], w:fUse[i], expR:t.expR}))
    .sort((a,b)=>b.w-a.w);

  return {weights, expectedLog:meanLog, expectedArith:meanArith,
          pct5:pct(0.05), pct50:pct(0.5), pct95:pct(0.95),
          drawdownProb:drawProb, totalDeployed, N, K, maxPos, maxL2, kFrac};
}

// ================================================================
// CATALYST-AWARE KELLY: single-event binary Kelly + Gaussian-kernel
// schedule + walk-forward Monte Carlo simulation
// ================================================================
function catEventKelly(cat){
  // Binary Kelly: with prob p win ru (>0), with prob (1-p) lose |rd| (rd<0)
  // f* = (p*ru - (1-p)*|rd|) / (ru*|rd|)
  const p=(cat.yourPoS||0)/100;
  const ru=(cat.successMove||0)/100;
  const rd=(cat.failMove||0)/100;
  const expR=p*ru+(1-p)*rd;
  let kelly=0;
  if(ru>1e-4 && rd<-1e-4){
    kelly=(p*ru-(1-p)*Math.abs(rd))/(ru*Math.abs(rd));
  } else if(expR>0){
    // Degenerate: both tails same sign but positive EV -- size modestly
    kelly=Math.min(0.10, Math.abs(expR));
  }
  return {kelly, expR, p, ru, rd};
}

function buildCatalystSchedule(universe, catalysts, baseWeights, opts){
  const horizonD=opts.horizonM*30;
  const stepD=7;
  const steps=Math.ceil(horizonD/stepD)+1;
  const timeline=[]; for(let i=0;i<steps;i++) timeline.push(i*stepD);
  const tickers=universe.map(r=>r.ticker);
  const series={}; tickers.forEach(tk=>series[tk]=new Float64Array(steps));
  const baseMap={}; baseWeights.forEach(w=>{baseMap[w.ticker]=w.w;});
  // Baseline weight: fraction of static Kelly result, blended by (1 - catInfluence)
  const baseScale=1-opts.catInfluence+opts.catInfluence*0.4; // structural core always ≥40% of static
  tickers.forEach(tk=>{
    const bw=(baseMap[tk]||0)*baseScale;
    for(let i=0;i<steps;i++) series[tk][i]=bw;
  });
  // Catalyst bumps (Gaussian kernel)
  const eventTable=[];
  const sigma=opts.sigma, sig2=2*sigma*sigma;
  catalysts.forEach(c=>{
    if(c.daysOut>horizonD || c.daysOut<0) return;
    const ek=catEventKelly(c);
    if(ek.kelly<opts.minKelly) { eventTable.push({...c, ...ek, skipped:true, eventBump:0}); return; }
    const bump=ek.kelly*opts.kFrac*opts.catInfluence;
    const tk=c.ticker;
    if(!series[tk]) return; // ticker not in filtered universe
    for(let i=0;i<steps;i++){
      const dt=timeline[i]-c.daysOut;
      const g=Math.exp(-(dt*dt)/sig2);
      series[tk][i]+=bump*g;
    }
    eventTable.push({...c, ...ek, eventBump:bump, skipped:false});
  });
  // Cap per-name at 25% and normalize total ≤ 100% at each step
  const CAP=0.25;
  const totals=new Float64Array(steps);
  for(let i=0;i<steps;i++){
    let sum=0;
    for(const tk of tickers){ if(series[tk][i]>CAP) series[tk][i]=CAP; sum+=series[tk][i]; }
    if(sum>1){ const sc=1/sum; for(const tk of tickers) series[tk][i]*=sc; sum=1; }
    totals[i]=sum;
  }
  // Peak weight per ticker (for ranking)
  const peak={}; tickers.forEach(tk=>{ let mx=0; for(let i=0;i<steps;i++) if(series[tk][i]>mx) mx=series[tk][i]; peak[tk]=mx; });
  return {timeline, series, tickers, eventTable, totals, peak, steps, horizonD, stepD};
}

function walkForwardKellySim(catalysts, opts, N){
  const sorted=[...catalysts].filter(c=>c.kelly>=opts.minKelly && !c.skipped).sort((a,b)=>a.daysOut-b.daysOut);
  if(!sorted.length) return null;
  const finals=new Float64Array(N);
  const pathPeakDD=new Float64Array(N);
  for(let s=0;s<N;s++){
    let cap=1.0, peakCap=1.0, maxDD=0;
    for(const c of sorted){
      const f=c.kelly*opts.kFrac*opts.catInfluence;
      const win=Math.random()<c.p;
      const ret=win?c.ru:c.rd;
      cap*=(1+f*ret);
      if(cap<=0){ cap=1e-6; break; }
      if(cap>peakCap) peakCap=cap;
      const dd=(peakCap-cap)/peakCap;
      if(dd>maxDD) maxDD=dd;
    }
    finals[s]=cap;
    pathPeakDD[s]=maxDD;
  }
  const sortedF=Array.from(finals).sort((a,b)=>a-b);
  const sortedDD=Array.from(pathPeakDD).sort((a,b)=>a-b);
  const pct=(arr,q)=>arr[Math.max(0,Math.min(N-1,Math.floor(q*N)))];
  const mean=sortedF.reduce((a,b)=>a+b,0)/N;
  let meanLog=0; for(let i=0;i<N;i++) meanLog+=Math.log(Math.max(finals[i],1e-6)); meanLog/=N;
  return {
    N, events:sorted.length, finals:sortedF,
    median:pct(sortedF,0.5)-1, mean:mean-1, meanLog,
    p5:pct(sortedF,0.05)-1, p95:pct(sortedF,0.95)-1, p25:pct(sortedF,0.25)-1, p75:pct(sortedF,0.75)-1,
    medianDD:pct(sortedDD,0.5), p95DD:pct(sortedDD,0.95),
    probLoss:sortedF.filter(x=>x<1).length/N
  };
}

// Compute catalyst impact as % change in model TP (not vs stock price)
function computeCatalysts(cfg,currentPrice){
  if(!cfg.catalysts||!cfg.catalysts.length)return[];
  const baseA=cfg.scenarios?.base?.assumptions||{};
  const {results:baseResults,weightedTP:baseWTP}=computeAll(cfg);
  const today=new Date();
  const SKS=Object.keys(cfg.scenarios);
  const sorted=SKS.slice().sort((a,b)=>baseResults[a].tp-baseResults[b].tp);
  const optimism={};
  const mid=(sorted.length-1)/2;
  sorted.forEach((sk,i)=>{optimism[sk]=i;});
  const origWts={};SKS.forEach(sk=>{origWts[sk]=cfg.scenarios[sk].wt;});

  return cfg.catalysts.map(cat=>{
    // Materiality — what fraction of weighted TP comes from this asset?
    const zeroTP=computeTPOverride(cfg,cat.asset,cat.indication,0,0);
    const m=baseWTP>0?Math.min(1,Math.max(0,(baseWTP-zeroTP)/baseWTP)):0;

    // Shift scenario weights proportional to materiality
    function shiftWeights(direction){
      const raw={};
      SKS.forEach(sk=>{
        const shift=direction==='success'?(optimism[sk]-mid):(mid-optimism[sk]);
        raw[sk]=Math.max(0.001,origWts[sk]*(1+m*shift));
      });
      const total=Object.values(raw).reduce((s,v)=>s+v,0);
      SKS.forEach(sk=>{raw[sk]=raw[sk]/total*100;});
      return raw;
    }

    // Compute TPs with shifted weights + floor/ceiling PoS override
    const successWts=shiftWeights('success');
    const failWts=shiftWeights('fail');
    const successTP=computeTPShifted(cfg,cat.asset,cat.indication,cat.success_pos,cat.success_apr,successWts,'floor');
    const failTP=computeTPShifted(cfg,cat.asset,cat.indication,cat.fail_pos,cat.fail_apr,failWts,'ceil');

    // NEW: Moves as % change in model TP (not vs stock price)
    const successMove=baseWTP>0?Math.round((successTP-baseWTP)/baseWTP*100):0;
    const failMove=baseWTP>0?Math.max(-100,Math.round((failTP-baseWTP)/baseWTP*100)):0;
    const swingPct=successMove-failMove;

    // Your PoS by catalyst type
    const ba=baseA[cat.asset]?.[cat.indication]||{};
    const CLINICAL_TYPES=new Set(['phase1_data','phase2_data','phase3_data','phase3_start','phase2_start']);
    const REGULATORY_TYPES=new Set(['pdufa','ema_approval','label_expansion']);
    const yourPoS=CLINICAL_TYPES.has(cat.type)?Math.round(ba.pos||0)
      :REGULATORY_TYPES.has(cat.type)?Math.round(ba.apr||0)
      :Math.round((ba.pos||0)/100*(ba.apr||0)/100*100);

    // Expected return
    const expectedReturn=Math.round(yourPoS/100*successMove+(1-yourPoS/100)*failMove);
    const catDate=new Date(cat.dateSort);
    const daysOut=Math.max(0,Math.round((catDate-today)/(1000*60*60*24)));
    return{...cat,failTP,successTP,baseTP:baseWTP,swingPct,successMove,failMove,
      yourPoS,expectedReturn,daysOut,materiality:Math.round(m*100)};
  }).sort((a,b)=>a.daysOut-b.daysOut);
}

function buildRangeStrip(rows,activeArea,filterRare,sortMode,purityMode){
  // Helper: compute purity for a row given active filters and mode
  function getPurity(r){
    const foc=purityMode==='wtd'?r.meta.focusWtd:r.meta.focus;
    const rp=purityMode==='wtd'?r.meta.rarePurityWtd:r.meta.rarePurity;
    if(activeArea&&foc){
      const depth=activeArea.split(".").length;
      if(depth===1)return foc.filter(f=>f.area.startsWith(activeArea+".")&&f.area.split(".").length===2).reduce((s,f)=>s+f.purity,0);
      const m=foc.find(f=>f.area===activeArea);return m?m.purity:0;
    }
    if(filterRare===true)return rp||0;
    return 0;
  }
  // Compute per-row metrics for sorting
  const enriched=rows.map(r=>{
    const baseUp=r.tps.base?((r.tps.base-r.price)/r.price*100):0;
    // R/R
    const bullUp=r.tps.bull!=null&&r.tps.bull>r.price?((r.tps.bull-r.price)/r.price*100):0;
    let bearDn=r.tps.bear!=null&&r.tps.bear<r.price?((r.price-r.tps.bear)/r.price*100):0;
    if(bearDn<1&&r.tps.mega_bear!=null&&r.tps.mega_bear<r.price)bearDn=((r.price-r.tps.mega_bear)/r.price*100);
    const rr=bearDn>1?(bullUp/bearDn):(bullUp>0?999:0);
    // Purity
    let purity=getPurity(r);
    return{...r,baseUp,rr,purity,optionality:r.meta.optionality||0};
  });

  // Sort
  if(sortMode==='rr') enriched.sort((a,b)=>b.rr-a.rr);
  else if(sortMode==='purity') enriched.sort((a,b)=>b.purity-a.purity||b.baseUp-a.baseUp);
  else if(sortMode==='optionality') enriched.sort((a,b)=>b.optionality-a.optionality||b.baseUp-a.baseUp);
  else enriched.sort((a,b)=>b.baseUp-a.baseUp);

  const sorted=enriched;
  // Compute upside for each stock × scenario: (TP - Price) / Price
  // Positive = TP above price (upside), Negative = TP below price (downside)
  const data=sorted.map(r=>{
    const vals={};
    SK.forEach(sk=>{vals[sk]=r.tps[sk]?((r.tps[sk]-r.price)/r.price*100):null;});
    return{ticker:r.ticker,name:r.name,vals,price:r.price,ccy:r.ccy,dec:r.dec,meta:r.meta,purity:r.purity};
  });
  // Scale: -100 to +500, cap outliers
  const LO=-100,HI=500;
  const pct=v=>{const clamped=Math.max(LO,Math.min(HI,v));return((clamped-LO)/(HI-LO))*100;};
  const zeroPct=pct(0);

  let h='<div class="rs-wrap">';
  // Legend
  h+='<div class="rs-legend">';
  SK.forEach(sk=>{h+=`<div class="li"><div class="bx" style="background:${SC[sk]}"></div>${SN[sk]}</div>`;});
  h+='<div class="li" style="margin-left:auto;color:#ffffff40">R/R = bull up \u00f7 worst down \u00b7 \u25C0 Downside | Upside \u25B6</div>';
  h+='</div>';
  // Rows
  data.forEach(d=>{
    const allVals=SK.map(sk=>d.vals[sk]).filter(v=>v!=null);
    if(!allVals.length)return;
    const minV=Math.min(...allVals),maxV=Math.max(...allVals);
    // Risk/Reward: bull upside / bear downside (absolute values)
    const bullUp=d.vals.bull!=null&&d.vals.bull>0?d.vals.bull:0;
    // Use bear downside, fall back to mega_bear downside if bear has no downside
    let bearDn=d.vals.bear!=null&&d.vals.bear<0?Math.abs(d.vals.bear):0;
    if(bearDn<1&&d.vals.mega_bear!=null&&d.vals.mega_bear<0)bearDn=Math.abs(d.vals.mega_bear);
    const rr=bearDn>1?(bullUp/bearDn):null;
    let rrCol,rrTxt;
    if(rr==null){rrCol='#86efac';rrTxt=bullUp>0?'\u221E':'—';}
    else if(rr<0.01){rrCol='#ef4444';rrTxt='\u26A0 0x';}
    else if(rr<0.3){rrCol='#ef4444';rrTxt=rr.toFixed(2)+'x';}
    else if(rr<1){rrCol='#fb923c';rrTxt=rr.toFixed(1)+'x';}
    else if(rr<2){rrCol='#fbbf24';rrTxt=rr.toFixed(1)+'x';}
    else if(rr<10){rrCol='#86efac';rrTxt=rr.toFixed(1)+'x';}
    else{rrCol='#86efac';rrTxt=rr.toFixed(0)+'x';}
    h+=`<div class="rs-row">`;
    h+=`<a class="rs-tk" href="model.html?ticker=${d.ticker}">${d.ticker}</a>`;
    // Purity when area filter active
    // Purity badge
    const pVal=d.purity||0;
    const pCol2=filterRare===true?'#fbbf24':'#c084fc';
    if(pVal>0)h+=`<span style="width:28px;text-align:right;padding-right:2px;font-family:var(--mono);font-weight:700;font-size:.58rem;color:${pCol2};flex-shrink:0">${Math.min(pVal,100)}%</span>`;
    else h+=`<span style="width:28px;flex-shrink:0"></span>`;
    h+=`<span class="rs-rr" style="color:${rrCol}" title="R/R: bull up ${bullUp.toFixed(0)}% \u00f7 ${d.vals.bear!=null&&d.vals.bear<-1?'bear':'mega bear'} down ${bearDn.toFixed(0)}%">${rrTxt}</span>`;
    h+=`<div class="rs-track">`;
    // Zero line
    h+=`<div class="rs-zero" style="left:${zeroPct}%"><div class="rs-zero-lbl"></div></div>`;
    // Connecting line from leftmost to rightmost dot
    const leftPct=pct(Math.max(LO,minV)),rightPct=pct(Math.min(HI,maxV));
    h+=`<div class="rs-line" style="left:${leftPct}%;width:${rightPct-leftPct}%;background:linear-gradient(90deg,${SC.mega_bear}44,${SC.psychedelic_bull}44)"></div>`;
    // Dots — draw in reverse order so mega_bear (rightmost usually) is on top
    SK.forEach(sk=>{
      const v=d.vals[sk];if(v==null)return;
      const x=pct(v);
      const capped=v>HI||v<LO;
      const label=(v>=0?'+':'')+v.toFixed(0)+'%';
      h+=`<div class="rs-dot" style="left:${x}%;background:${SC[sk]}" title="${SN[sk]}: ${label}">`;
      h+=`<div class="tip"><span style="color:${SC[sk]}">${SN[sk]}</span> ${label}${capped?' \u26A0':''}</div>`;
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  // Axis labels
  h+='<div class="rs-axis"><div style="width:124px;flex-shrink:0"></div><div class="rs-axis-track">';
  [-100,-50,0,50,100,200,300,400,500].forEach(v=>{
    h+=`<div class="rs-axis-lbl" style="left:${pct(v)}%;${v===0?'color:#e2e4ea;font-weight:700':''}">${v>=0?'+':''}${v}%</div>`;
  });
  h+='</div></div>';
  h+='</div></div>';
  return h;
}

const CORS_PROXIES=[
  url=>"https://corsproxy.io/?"+encodeURIComponent(url),
  url=>"https://api.allorigins.win/raw?url="+encodeURIComponent(url),
];
async function fetchLivePrice(yahooTicker){
  if(!yahooTicker)return null;
  const url="https://query1.finance.yahoo.com/v8/finance/chart/"+yahooTicker+"?interval=1d&range=1d";
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(url),{signal:AbortSignal.timeout(5000)});
      if(!res.ok)continue;
      const data=await res.json();
      const meta=data?.chart?.result?.[0]?.meta;
      if(meta?.regularMarketPrice)return{price:meta.regularMarketPrice,prevClose:meta.chartPreviousClose||meta.previousClose};
    }catch{}
  }
  return null;
}

  let livePrices={};

      }

    }
  }catch{/* prices cache not available — fall back to live fetch */}

  // Load target index (auto-rebuilt by CI from asset.targets[] in configs)
  let targetsIdx={};
  try{
    const tr=await fetch("data/targets.json?v="+Date.now());
    if(tr.ok){
      const tj=await tr.json();
      targetsIdx=tj.targets||{};
    }
  }catch{/* ok if missing -- Target Explorer will show empty */}

  // Load taxonomy display_names for friendly UI labels + disease synonym groups
  let displayNames={};
  let diseaseSynonymGroups={};
  let marketStatusOverrides={generic_incumbent:{}, branded_incumbent_external:{}};
  try{
    const tr=await fetch("data/taxonomy.json?v="+Date.now());
    if(tr.ok){
      const tx=await tr.json();
      displayNames=tx.display_names||{};
      diseaseSynonymGroups=tx.disease_synonym_groups||{};
    }
  }catch{/* ok if missing -- nice() falls back to underscore replace */}
  try{
    const mr=await fetch("data/market_status_overrides.json?v="+Date.now());
    if(mr.ok){
      const mo=await mr.json();
      marketStatusOverrides.generic_incumbent=mo.generic_incumbent||{};
      marketStatusOverrides.branded_incumbent_external=mo.branded_incumbent_external||{};
    }
  }catch{/* ok if missing -- everything defaults to novel */}
  window._diseaseSynonymGroups=diseaseSynonymGroups;
  window._marketStatusOverrides=marketStatusOverrides;
  // Friendly label helper: prefer display_names map, fall back to last-segment underscore-replace
  window._nicelabel=function(key){
    if(!key) return '';
    if(displayNames[key]) return displayNames[key];
    // Try last segment of dotted path (e.g. "small_molecule.gpcr.cgrp_antagonist" -> "cgrp_antagonist" -> lookup)
    const last=key.split('.').pop();
    if(displayNames[last]) return displayNames[last];
    return last.replace(/_/g,' ');
  };

  // Build rows with config prices initially

  function buildRows(){
    const r=[];
    for(const[tk,cfg]of Object.entries(configs)){
      const co=cfg.company;
      const isPrivate=!!co.private;
      const lp=livePrices[tk];
      // Private companies: no equity tradeable -> no price/TP/EV/cash makes sense.
      // Show only sales + pipeline; null out market-derived fields.
      const price=isPrivate?null:(lp?lp.price:co.currentPrice);
      const prevClose=lp?lp.prevClose:null;
      let tps={},weightedTP=null,wtUp=null,cashPS=null,ev=null,evUSD=null,mcapUSDB=null,mcapTier='private';
      let chg1D=null,chg1W=null,chg1M=null,chgYTD=null;
      if(!isPrivate){
        const r2=computeAll(cfg);
        SK.forEach(s=>{tps[s]=r2.results[s]?r2.results[s].tp:null;});
        weightedTP=r2.weightedTP;
        cashPS=co.cash/co.sharesOut;
        ev=Math.max(0,price*co.sharesOut-co.cash);
        evUSD=toUSD(ev,co.currency||'USD')/1000;
        mcapUSDB=toUSD(price*co.sharesOut,co.currency||'USD')/1000;
        mcapTier=mcapUSDB>=100?'mega':mcapUSDB>=20?'large':mcapUSDB>=5?'mid':mcapUSDB>=1?'small':'micro';
        wtUp=((weightedTP-price)/price*100);
        // Period changes (require live + historical from prices.json)
        if(lp){
          if(lp.prevClose>0) chg1D=((price-lp.prevClose)/lp.prevClose)*100;
          if(lp.price1W>0)   chg1W=((price-lp.price1W)/lp.price1W)*100;
          if(lp.price1M>0)   chg1M=((price-lp.price1M)/lp.price1M)*100;
          if(lp.priceYTD>0)  chgYTD=((price-lp.priceYTD)/lp.priceYTD)*100;
        }
      }
      const meta=deriveCompanyMeta(cfg);
      const catalysts=isPrivate?[]:computeCatalysts(cfg,price);
      // Sum reported drug sales 2025 across all indications. Per CLAUDE.md convention,
      // m.salesM is in USD $M for ALL configs (regardless of company.currency).
      // Includes pseudo-area heritage tails (_established_products.*_heritage etc) so
      // this is the full company-level revenue picture -- intentionally NOT matching
      // Market Explorer (which excludes pseudo-areas by design for disease taxonomy).
      let salesM2025USD=0;
      for(const a of cfg.assets||[]){
        for(const ind of a.indications||[]){
          const m=ind.market||{};
          if(m.salesM&&(!m.salesYear||m.salesYear===2025)) salesM2025USD+=m.salesM;
        }
      }
      r.push({ticker:tk,name:co.name,ccy:ccySym(co.currency),dec:ccyDec(co.currency),
        isPrivate,price,prevClose,configPrice:co.currentPrice,live:!!lp,chg1D,chg1W,chg1M,chgYTD,cashPS,ev,evUSD,mcapUSDB,mcapTier,tps,weightedTP,wtUp,currency:co.currency,subtitle:co.subtitle||"",yahooTicker:co.yahooTicker||tk,meta,catalysts,salesM2025:salesM2025USD});
    }
    return r;
  }

  let rows=buildRows();

  // Populate sticky topbar
  function populateTopbar(){
    const tb=document.getElementById('topbar');
    const tl=document.getElementById('topList');
    const tc=document.getElementById('topCount');
    if(!tb||!tl)return;
    tb.style.display='flex';
    tc.textContent=Object.keys(configs).length+' companies';
    let items='';
    for(const[tk,cfg]of Object.entries(configs)){
      const co=cfg.company;
      const isPrivate=!!co.private;
      const lp=livePrices[tk];
      const displayPrice=(lp&&lp.price>0)?lp.price:co.currentPrice;
      const isLive=!!(lp&&lp.price>0);
      const priceColor=isPrivate?'#94a3b8':(isLive?'var(--text)':'var(--text2)');
      const priceOpacity=isPrivate?'0.7':(isLive?'1':'0.6');
      const priceTitle=isPrivate?'Private (no equity tradeable)':(isLive?'live (prices.json)':'stale (config default)');
      const priceLabel=isPrivate?'Private':`${ccySym(co.currency)}${Number(displayPrice).toFixed(2)}`;
      items+=`<a class="topbar-item" href="model.html?ticker=${tk}" style="text-decoration:none;color:inherit"><span><span class="t">${tk}</span><span class="n">${co.name}</span></span><span title="${priceTitle}" style="font-family:var(--mono);font-size:.7rem;color:${priceColor};opacity:${priceOpacity}">${priceLabel}</span></a>`;
    }
    tl.innerHTML=items;
  }
  populateTopbar();

  // Signal filter state (must be declared BEFORE renderSignalBadges reads it)
  let filterSignal=null; // {kind:'cash'|'pdufa'|'rr'|'hot', tickers:Set, label:string}

  // Signal badges: 4 auto-computed condition counts rendered into #topNav.
  // Click applies a filter (narrows every card to the matching tickers).
  function computeSignals(){
    const cashT=new Set(), pdufaT=new Set(), rrT=new Set(), hotT=new Set(), lateT=new Set();
    const today=new Date();
    for(const r of rows){
      if(r.ev<0) cashT.add(r.ticker);
      // Match Catalyst Map filtering: exclude resolved + use strictly-future daysOut.
      // Otherwise the badge counts events that already happened (resolved but
      // dateSort still within the window) and the map shows fewer rows than the badge.
      if(r.catalysts&&r.catalysts.some(c=>c.type==='pdufa'&&c.daysOut>0&&c.daysOut<=30&&!c.resolved&&!c._resolvedAt)) pdufaT.add(r.ticker);
      if(r.catalysts&&r.catalysts.some(c=>c.daysOut>0&&c.daysOut<=7&&!c.resolved&&!c._resolvedAt)) hotT.add(r.ticker);
      // Late catalysts: dateSort in the past, still unresolved. Red-flag signal --
      // the timeline slipped and no resolution was captured. Could be stalled program,
      // missed deadline, or stale config.
      if(r.catalysts&&r.catalysts.some(c=>{
        if(!c.dateSort||c.resolved||c._resolvedAt) return false;
        return new Date(c.dateSort)<today;
      })) lateT.add(r.ticker);
      if(r.tps&&r.price>0){
        const bullUp=((r.tps.bull||0)-r.price)/r.price;
        const megaDn=(r.price-(r.tps.mega_bear||0))/r.price;
        if(bullUp>0&&megaDn>0&&(bullUp/megaDn)>=5) rrT.add(r.ticker);
      }
    }
    return {cash:cashT,pdufa:pdufaT,rr:rrT,hot:hotT,late:lateT};
  }
  function renderSignalBadges(){
    const nv=document.getElementById('topNav');if(!nv)return;
    const sig=computeSignals();
    const defs=[
      {kind:'cash',  cls:'sig-cash',  label:'\u003c cash',   tickers:sig.cash},
      {kind:'pdufa', cls:'sig-pdufa', label:'PDUFA 30d',     tickers:sig.pdufa},
      {kind:'rr',    cls:'sig-rr',    label:'R/R \u00b75',   tickers:sig.rr},
      {kind:'hot',   cls:'sig-hot',   label:'hot 7d',        tickers:sig.hot},
      {kind:'late',  cls:'sig-late',  label:'⚠ late',   tickers:sig.late},
    ];
    const activeKind=filterSignal?filterSignal.kind:null;
    nv.innerHTML=defs.map(d=>{
      const n=d.tickers.size;
      const isActive=activeKind===d.kind;
      const emptyCls=n===0?' empty':'';
      const activeCls=isActive?' active':'';
      const onClick=n===0?'':`onclick="window._toggleSignal('${d.kind}')"`;
      return `<div class="sig-badge ${d.cls}${emptyCls}${activeCls}" ${onClick} title="${[...d.tickers].join(' \u00b7 ')||'none'}"><span class="sig-label">${d.label}</span><span class="sig-count">${n}</span></div>`;
    }).join('');
  }
  window._toggleSignal=function(kind){
    if(filterSignal&&filterSignal.kind===kind){filterSignal=null;}
    else{
      const sig=computeSignals();
      const tickers=sig[kind];
      if(!tickers||tickers.size===0)return;
      const labels={cash:'< cash',pdufa:'PDUFA 30d',rr:'R/R \u00b75',hot:'hot 7d',late:'\u26a0 late'};
      filterSignal={kind,tickers:new Set(tickers),label:labels[kind]};
    }
    doSort();render();renderSignalBadges();
    // Scroll to range card so the filter effect is visible
    const r=document.getElementById('sec-range');if(r)r.scrollIntoView({behavior:'smooth',block:'start'});
  };
  renderSignalBadges();

  window._topFilter=function(q){
    const tl=document.getElementById('topList');if(!tl)return;
    tl.classList.add('open');
    tl.querySelectorAll('.topbar-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});
  };

  let sortKey="wtUp",sortDir=-1;
  const doSort=()=>{rows.sort((a,b)=>{
    // Push private rows to bottom of sorts that depend on price/TP/upside
    const aPriv=a.isPrivate, bPriv=b.isPrivate;
    if(aPriv!==bPriv && (sortKey==='wtUp'||sortKey==='price'||SK.includes(sortKey))) return aPriv?1:-1;
    let va,vb;
    if(SK.includes(sortKey)){va=a.tps[sortKey]&&a.price?((a.tps[sortKey]-a.price)/a.price):0;vb=b.tps[sortKey]&&b.price?((b.tps[sortKey]-b.price)/b.price):0;}
    else{va=a[sortKey];vb=b[sortKey];}
    if(typeof va==="string")return sortDir*va.localeCompare(vb);return sortDir*((va||0)-(vb||0));
  });};
  doSort();

  let techSortMode="som"; // tam | som | sales | count
  let targetSort="companies"; // companies | modalities | diseases | name

  let targetExpanded=null;    // string -- which target's detail panel is open

  // Collapsible sections (Market Explorer and below all collapsed by default)

  let collapsedSec={
    'sec-markets':false, 'sec-tech':false, 'sec-target':false, 'sec-range':false, 'sec-pipeline':false, 'sec-ev-tam':false,

  const chev=id=>'';

  // Catalyst-Aware Kelly Schedule state
