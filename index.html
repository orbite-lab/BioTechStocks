        h+='</div>';
      }

      // Legend when any SOM is capped
      const anyCapped = (isLeaf ? currentData?.somCapped : children.some(c => c.somCapped)) || currentData?.somCapped;
      if (anyCapped) {
        h+='<div style="margin-top:12px;padding:8px 10px;background:#a855f714;border:1px solid #a855f733;border-radius:6px;font-size:.65rem;color:#d8b4fe">';
        h+='<span style="font-weight:700">*</span> SOM capped at TAM: multiple drugs target the same patients, so raw sum of drug-specific SOMs exceeds the total market. Hover for the uncapped value.';
        h+='</div>';
      }
      h+='</div>';  // close card
    })();

    // ============== TECHNOLOGY EXPLORER (modality drill-down) ==============
    (() => {
      // Build aggregated data keyed by modality path (L1, L1.L2, L1.L2.L3)
      // Each asset can have a single modality string like "cell_therapy.car_t_autologous.bcma"
      const techData = {};
      for (const [tk, cfg] of Object.entries(configs)) {
        const coName = cfg.company.name || tk;
        for (const a of cfg.assets) {
          const mod = a.modality || '_unclassified';
          // Sum SOM/sales across all indications of this asset
          let assetSom=0, assetSales=0;
          const diseaseAreas = new Set();
          for (const ind of a.indications) {
            const m = ind.market || {}; const reg = m.regions || {}; const cs = m.company_slice || {};
            for (const rk of ['us','eu','row']) {
              const pr = reg[rk] || {};
              if (cs[rk]) assetSom += (pr.patientsK||0) * ((cs[rk].reachPct||0)/100) * ((cs[rk].wtpPct||0)/100) * (cs[rk].priceK||0);
            }
            assetSales += m.salesM || 0;
            if (ind.area) diseaseAreas.add(ind.area.split('.').slice(0,2).join('.')); // L2 disease tag
          }
          const parts = mod.split('.');
          for (let depth = 1; depth <= parts.length; depth++) {
            const path = parts.slice(0, depth).join('.');
            if (!techData[path]) techData[path] = { som:0, sales:0, assets:[], diseaseAreas:new Set() };
            techData[path].som += assetSom;
            techData[path].sales += assetSales;
            diseaseAreas.forEach(d => techData[path].diseaseAreas.add(d));
            if (depth === parts.length) {
              techData[path].assets.push({
                ticker: tk, name: coName, asset: a.name, assetId: a.id,
                modality: mod, som: assetSom, sales: assetSales, stage: a.stage || '',
                diseases: [...diseaseAreas]
              });
            }
          }
        }
      }
      const currentPath = techNavPath.join('.');
      const currentData = currentPath ? techData[currentPath] : null;
      const childPrefix = currentPath ? currentPath + '.' : '';
      const childDepth = techNavPath.length + 1;
      const children = Object.keys(techData)
        .filter(k => k.startsWith(childPrefix) && k.split('.').length === childDepth)
        .map(k => ({ path: k, name: k.slice(childPrefix.length), ...techData[k] }));
      children.sort((a,b) => {
        if (techSortMode === 'som') return b.som - a.som;
        if (techSortMode === 'sales') return b.sales - a.sales;
        if (techSortMode === 'count') return b.assets.length - a.assets.length;
        return b.som - a.som;
      });
      const isLeaf = children.length === 0 && currentData;
      const fmtB = v => v >= 1000 ? '$'+(v/1000).toFixed(1)+'B' : '$'+Math.round(v)+'M';
      const nice = s => window._nicelabel ? window._nicelabel(s) : s.replace(/_/g,' ');

      h+=`<div class="card${secCls('sec-tech')}" id="sec-tech"><div class="card-title" ${titleAttrsFlex('sec-tech')}><div>${chev('sec-tech')}<div class="dot" style="background:linear-gradient(180deg,#06b6d4,#a855f7);display:inline-block;vertical-align:middle;margin-right:8px"></div>Technology Explorer <span style="font-size:.62rem;color:#6b7080;font-weight:400;margin-left:6px">modality \u00b7 cross-disease pivot</span></div>`;
      h+='<div style="display:flex;gap:4px">';
      [['som','SOM'],['sales','Sales'],['count','Asset count']].forEach(([k,lbl])=>{
        const active = techSortMode===k;
        h+=`<span class="fchip ${active?'active':''}" onclick="window._techSort('${k}')" style="padding:2px 8px;font-size:.65rem">${lbl}</span>`;
      });
      h+='</div></div>';

      // Breadcrumb
      h+='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:10px 0;font-size:.75rem;font-family:var(--mono)">';
      h+=`<span onclick="window._techGo([])" style="cursor:pointer;color:${techNavPath.length===0?'#06b6d4':'#60a5fa'};font-weight:${techNavPath.length===0?'700':'500'}">\u{1F9EC} All Technologies</span>`;
      techNavPath.forEach((p,i)=>{
        h+=`<span style="color:#6b7080">\u203A</span>`;
        const last = i===techNavPath.length-1;
        h+=`<span onclick="window._techGo(${i+1})" style="cursor:pointer;color:${last?'#06b6d4':'#60a5fa'};font-weight:${last?'700':'500'}">${nice(p)}</span>`;
      });
      h+='</div>';

      // Stats
      if (currentData) {
        h+='<div style="display:flex;gap:16px;padding:8px 12px;background:#0f1117;border-radius:6px;margin-bottom:12px;flex-wrap:wrap">';
        h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Total SOM</div><div style="font-size:1rem;font-weight:700;color:#a855f7;font-family:var(--mono)">${fmtB(currentData.som)}</div></div>`;
        h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">2025 Sales</div><div style="font-size:1rem;font-weight:700;color:#22c55e;font-family:var(--mono)">${fmtB(currentData.sales)}</div></div>`;
        h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">${isLeaf?'Assets':'Sub-platforms'}</div><div style="font-size:1rem;font-weight:700;color:#e2e4ea;font-family:var(--mono)">${isLeaf?currentData.assets.length:children.length}</div></div>`;
        h+=`<div><div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Disease areas treated</div><div style="font-size:1rem;font-weight:700;color:#06b6d4;font-family:var(--mono)">${currentData.diseaseAreas.size}</div></div>`;
        h+='</div>';
      }

      if (!isLeaf) {
        const maxSom = Math.max(...children.map(c=>c.som||1),1);
        h+='<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:10px">';
        children.forEach(c=>{
          const ratio = c.som / maxSom;
          let colSpan, tierPad, tierTitle, tierNum;
          if (ratio >= 0.5)      { colSpan=6; tierPad=18; tierTitle=1.05; tierNum=1.3; }
          else if (ratio >= 0.2) { colSpan=4; tierPad=14; tierTitle=0.95; tierNum=1.1; }
          else if (ratio >= 0.05){ colSpan=3; tierPad=12; tierTitle=0.85; tierNum=0.95; }
          else                   { colSpan=3; tierPad=10; tierTitle=0.78; tierNum=0.85; }
          const subCount = Object.keys(techData).filter(k => k.startsWith(c.path+'.') && k.split('.').length === c.path.split('.').length+1).length;
          h+=`<div onclick="window._techDrill('${c.path}')" style="grid-column:span ${colSpan};background:#0f1117;border:1px solid #ffffff12;border-radius:8px;padding:${tierPad}px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;min-height:${tierPad*6}px" onmouseover="this.style.borderColor='#06b6d4'" onmouseout="this.style.borderColor='#ffffff12'">`;
          h+=`<div><div style="font-size:${tierTitle}rem;font-weight:700;margin-bottom:4px;color:#e2e4ea">${nice(c.name)}</div>`;
          h+=`<div style="font-size:.62rem;color:var(--text2);font-family:var(--mono);margin-bottom:10px">${subCount>0?subCount+' sub-platforms':c.assets.length+' assets'} \u00b7 ${c.diseaseAreas.size} disease${c.diseaseAreas.size===1?'':'s'}</div></div>`;
          h+=`<div><div style="display:flex;justify-content:space-between;font-size:${tierNum}rem;font-family:var(--mono);font-weight:700;margin-bottom:4px"><span style="color:#a855f7">${fmtB(c.som)}</span><span style="color:#22c55e">${fmtB(c.sales)}</span></div>`;
          h+=`<div style="display:flex;justify-content:space-between;font-size:.62rem;font-family:var(--mono);color:var(--text2)"><span>SOM</span><span>Sales</span></div></div>`;
          h+='</div>';
        });
        h+='</div>';
      } else if (isLeaf && currentData) {
        // Asset list
        const assets = [...currentData.assets].sort((a,b)=>b.som-a.som);
        const maxSom = Math.max(...assets.map(a=>a.som),1);
        h+='<div style="display:flex;flex-direction:column;gap:6px">';
        assets.forEach(c=>{
          const pct = (c.som/maxSom)*100;
          const stageCol = c.stage.toLowerCase().includes('commercial')?'#22c55e':c.stage.toLowerCase().includes('3')?'#f59e0b':c.stage.toLowerCase().includes('2')?'#fb923c':'#6b7080';
          h+=`<div style="display:grid;grid-template-columns:60px 1fr 200px 90px 90px 80px;gap:8px;align-items:center;padding:8px 12px;background:#0f1117;border-radius:6px;border:1px solid #ffffff08;font-size:.7rem">`;
          h+=`<a href="model.html?ticker=${c.ticker}" style="font-family:var(--mono);font-weight:700;color:#60a5fa;text-decoration:none">${c.ticker}</a>`;
          h+=`<div><div style="color:#e2e4ea;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.asset}</div><div style="color:var(--text2);font-size:.6rem">${c.diseases.map(d=>nice(d)).join(' \u00b7 ')||'—'}</div></div>`;
          h+=`<div style="position:relative;height:6px;background:#161920;border-radius:2px;overflow:hidden"><div style="position:absolute;top:0;left:0;height:100%;width:${pct}%;background:#06b6d4"></div></div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:#a855f7;font-weight:600">${fmtB(c.som)}</div>`;
          h+=`<div style="text-align:right;font-family:var(--mono);color:${c.sales>0?'#22c55e':'#6b7080'};font-weight:600">${c.sales>0?fmtB(c.sales):'\u2014'}</div>`;
          h+=`<div style="text-align:right"><span style="font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:3px;background:${stageCol}22;color:${stageCol};font-family:var(--mono)">${c.stage.split('(')[0].trim().slice(0,12)||'\u2014'}</span></div>`;
          h+='</div>';
        });
        h+='</div>';
      }
      h+='</div>'; // close card
    })();
    // ============== /TECHNOLOGY EXPLORER ==============

    // ============== TARGET EXPLORER ==============
    // Molecular-target axis derived from asset.targets[]. Cross-cuts modality
    // and disease -- surfaces "GLP1R hit by peptide + small-mol + formulation"
    // at a glance. Click a target to filter the universe.
    (() => {
      h+=`<div class="card${secCls('sec-target')}" id="sec-target"><div class="card-title" ${titleAttrsFlex('sec-target')}><div>${chev('sec-target')}<div class="dot" style="background:linear-gradient(180deg,#ec4899,#a855f7);display:inline-block;vertical-align:middle;margin-right:8px"></div>Target Explorer <span style="font-size:.62rem;color:#6b7080;font-weight:400;margin-left:6px">molecular target \u00b7 cross-modality + cross-disease</span></div>`;
      h+='<div style="display:flex;gap:4px">';
      [['name','Name'],['companies','Companies'],['modalities','Modalities'],['diseases','Diseases'],['tam','TAM'],['som','SOM'],['sales','Sales'],['cagr','CAGR']].forEach(([k,lbl])=>{

      h+='</div></div>';

      const allTargets = Object.entries(targetsIdx);
      const filteredByMode = allTargets.filter(([,v])=>{
        if(targetFilterMode==='multi_mod') return v.modalityClassCount>=2;
        if(targetFilterMode==='multi_dis') return v.areaCount>=2;
        return true;
      });
      // Use the pre-signal universe so clicking a target card doesn't also
      // shrink the target grid (click is for filtering the DOWNSTREAM cards).
      const allowedTickers = new Set(filteredPreSignal.map(r=>r.ticker));
      const visible = filteredByMode.filter(([,v])=>v.companies.some(c=>allowedTickers.has(c)));
      const totalMM = allTargets.filter(([,v])=>v.modalityClassCount>=2).length;
      const totalMD = allTargets.filter(([,v])=>v.areaCount>=2).length;
      h+='<div class="card-sub">Each target aggregates its asset hits across companies, modality classes, and L3 disease areas. Click to filter the universe to companies working on that target.</div>';
      h+='<div style="display:flex;gap:6px;margin:6px 0 10px;flex-wrap:wrap">';
      const modes=[['all',`All (${allTargets.length})`],['multi_mod',`Multi-modality (${totalMM})`],['multi_dis',`Multi-disease (${totalMD})`]];
      modes.forEach(([k,lbl])=>{
        const active = targetFilterMode===k;
        h+=`<span class="fchip ${active?'active':''}" onclick="window._targetMode('${k}')" style="padding:3px 10px;font-size:.7rem">${lbl}</span>`;
      });
      h+=`<span style="margin-left:auto;font-size:.65rem;color:#6b7080;font-family:var(--mono);align-self:center">Showing ${visible.length} of ${allTargets.length}</span>`;
      h+='</div>';

      const sorter = {
        name:       ([a],[b]) => a.localeCompare(b),
        companies:  ([,a],[,b]) => (b.companies.length-a.companies.length) || (b.assetCount-a.assetCount),
        modalities: ([,a],[,b]) => (b.modalityClassCount-a.modalityClassCount) || (b.modalityCount-a.modalityCount),
        diseases:   ([,a],[,b]) => (b.areaCount-a.areaCount) || (b.assetCount-a.assetCount),
        tam:        ([,a],[,b]) => ((b.totalTAM||0)-(a.totalTAM||0)) || ((b.totalSOM||0)-(a.totalSOM||0)),
        som:        ([,a],[,b]) => ((b.totalSOM||0)-(a.totalSOM||0)) || ((b.totalTAM||0)-(a.totalTAM||0)),
        sales:      ([,a],[,b]) => ((b.totalSales||0)-(a.totalSales||0)) || ((b.totalSOM||0)-(a.totalSOM||0)),
        cagr:       ([,a],[,b]) => ((b.cagrPct||0)-(a.cagrPct||0)) || ((b.totalSOM||0)-(a.totalSOM||0)),
      };
      const sorted = visible.slice().sort(sorter[targetSort]||sorter.companies);

      // ── Detail panel (when a target is expanded) ──
      // Renders ABOVE the grid so the user doesn't have to scroll past
      // hundreds of cards. Aggregates TAM/SOM/CAGR/peakYear across all
      // assets hitting this target; renders an asset x indication breakdown
      // table and a "Filter universe" CTA so the click flow is two-step.
      if (targetExpanded && targetsIdx[targetExpanded]) {
        const v = targetsIdx[targetExpanded];
        const fmtB = x => x >= 1000 ? '$'+(x/1000).toFixed(1)+'B' : '$'+Math.round(x)+'M';
        const fmtV = x => x >= 1000 ? '$'+(x/1000).toFixed(1)+'B' : '$'+Math.round(x)+'M';
        const nice = s => window._nicelabel ? window._nicelabel(s) : (s||'').replace(/_/g,' ');
        let totalSOM=0, totalTAM=0, weightedCAGR=0, weightedPeakYear=0;
        const seenAreas=new Set();
        const detailRows=[];
        for (const aRef of (v.assets||[])) {
          const cfg = configs[aRef.ticker];
          if (!cfg) continue;
          const asset = (cfg.assets||[]).find(a=>a.id===aRef.asset);
          if (!asset) continue;
          for (const ind of (asset.indications||[])) {
            const m = ind.market||{};
            const regs = m.regions||{};
            const cs = m.company_slice||{};
            const tam = ['us','eu','row'].reduce((s,rk)=>s + ((regs[rk]?.patientsK||0)*((regs[rk]?.wtpPct||0)/100)*(regs[rk]?.priceK||0)),0);
            const som = ['us','eu','row'].reduce((s,rk)=>s + ((regs[rk]?.patientsK||0)*((cs[rk]?.reachPct||0)/100)*((cs[rk]?.wtpPct||0)/100)*(cs[rk]?.priceK||0)),0);
            if (ind.area && !seenAreas.has(ind.area)) { seenAreas.add(ind.area); totalTAM += tam; }
            totalSOM += som;
            const cg = m.cagrPct||0, pk = m.peakYear||2033;
            weightedCAGR += cg*som;
            weightedPeakYear += pk*som;
            detailRows.push({
              ticker: aRef.ticker, assetName: asset.name||'', modality: asset.modality||'',
              area: ind.area||'', indName: ind.name||'',
              som, tam, salesM: m.salesM||0, cagrPct: cg, peakYear: pk
            });
          }
        }
        const cagrAvg = totalSOM>0 ? weightedCAGR/totalSOM : 0;
        const peakYearAvg = totalSOM>0 ? Math.round(weightedPeakYear/totalSOM) : 2033;
        // "Last two segments" of an area path -> "L2 › L3" (drops L1).
        // For pseudo-areas (`_*`) just show the leaf with the underscore.
        const niceArea = (areaPath) => {
          if (!areaPath) return '';
          if (areaPath.startsWith('_')) return nice(areaPath.split('.').pop());
          const parts = areaPath.split('.');
          const tail = parts.slice(-2);  // last two segments
          return tail.map(p => nice(p)).join(' › ');
        };
        // Sort table according to current targetTableSort
        const colKey = (targetTableSort && targetTableSort.col) || 'som';
        const colDir = (targetTableSort && targetTableSort.dir) || -1;  // -1 desc, +1 asc
        const tableAccessor = {
          ticker:   r => r.ticker,
          asset:    r => r.assetName,
          modality: r => r.modality,
          area:     r => r.area,
          tam:      r => r.tam,
          som:      r => r.som,
          sales:    r => r.salesM,
          peak:     r => r.peakYear,
        };
        const acc = tableAccessor[colKey] || tableAccessor.som;
        detailRows.sort((a,b) => {
          const va = acc(a), vb = acc(b);
          if (typeof va === 'number' && typeof vb === 'number') return (vb - va) * (colDir < 0 ? 1 : -1);
          return String(va).localeCompare(String(vb)) * (colDir < 0 ? -1 : 1);
        });

        h += '<div style="margin-bottom:14px;padding:14px 16px;background:#0f1117;border:1px solid #ec489944;border-radius:8px">';
        h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">`;
        h += `<div><span style="font-family:var(--mono);font-weight:800;color:#ec4899;font-size:1.05rem">◎ ${targetExpanded}</span> <span style="font-size:.7rem;color:var(--text2);margin-left:8px">${v.assetCount} asset${v.assetCount===1?'':'s'} · ${v.companies.length} compan${v.companies.length===1?'y':'ies'} · ${v.modalityClassCount} modality class${v.modalityClassCount===1?'':'es'} · ${v.areaCount} disease area${v.areaCount===1?'':'s'}</span></div>`;
        h += `<div style="display:flex;gap:6px">`;
        h += `<span class="fchip" style="padding:4px 12px;font-size:.7rem;background:#ec489922;border-color:#ec4899;color:#fda4af;cursor:pointer" onclick="event.stopPropagation();window._filterByTarget('${targetExpanded}')">Filter universe →</span>`;
        h += `<span class="fchip" style="padding:4px 12px;font-size:.7rem;cursor:pointer" onclick="event.stopPropagation();window._targetExpand('${targetExpanded}')">✕ Close</span>`;
        h += `</div>`;
        h += `</div>`;
        h += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;padding:10px 12px;background:#0a0d14;border-radius:6px">`;
        h += `<div><div style="font-size:.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2;margin-bottom:2px">TAM (deduped by area)</div><div style="font-size:1.05rem;font-weight:800;color:#f97316;font-family:var(--mono)">${fmtB(totalTAM)}</div></div>`;
        h += `<div><div style="font-size:.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2;margin-bottom:2px">Aggregate SOM</div><div style="font-size:1.05rem;font-weight:800;color:#a855f7;font-family:var(--mono)">${fmtB(totalSOM)}</div></div>`;
        h += `<div><div style="font-size:.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2;margin-bottom:2px">CAGR (SOM-weighted)</div><div style="font-size:1.05rem;font-weight:800;color:#22c55e;font-family:var(--mono)">${cagrAvg.toFixed(1)}%</div></div>`;
        h += `<div><div style="font-size:.55rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2;margin-bottom:2px">Peak year (SOM-wtd)</div><div style="font-size:1.05rem;font-weight:800;color:#06b6d4;font-family:var(--mono)">${peakYearAvg}</div></div>`;
        h += `</div>`;
        h += `<div style="font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1.2;margin-bottom:6px">Asset × indication breakdown · click a column header to sort</div>`;
        const headerStyle = `display:grid;grid-template-columns:55px 1.4fr 1.5fr 1.5fr 70px 70px 70px 50px;gap:8px;font-size:.55rem;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:1;padding-bottom:6px;border-bottom:1px solid #ffffff14`;
        const arrowFor = (k) => colKey === k ? (colDir < 0 ? ' ▾' : ' ▴') : '';
        const colCell = (k, lbl, align) => `<span onclick="event.stopPropagation();window._targetTableSort('${k}')" style="cursor:pointer;${align==='right'?'text-align:right':''};color:${colKey===k?'#ec4899':'var(--text2)'};user-select:none">${lbl}${arrowFor(k)}</span>`;
        h += `<div style="${headerStyle}">`;
        h += colCell('ticker','Tick','left');
        h += colCell('asset','Asset','left');
        h += colCell('modality','Modality','left');
        h += colCell('area','Area','left');
        h += colCell('tam','TAM','right');
        h += colCell('som','SOM','right');
        h += colCell('sales','Sales','right');
        h += colCell('peak','Peak','right');
        h += `</div>`;
        const rowStyle = `display:grid;grid-template-columns:55px 1.4fr 1.5fr 1.5fr 70px 70px 70px 50px;gap:8px;font-size:.7rem;font-family:var(--mono);padding:6px 0;border-bottom:1px solid #ffffff05;align-items:baseline`;
        detailRows.forEach(r=>{
          h += `<div style="${rowStyle}">`;
          h += `<a href="model.html?ticker=${r.ticker}" style="color:#60a5fa;font-weight:700;text-decoration:none">${r.ticker}</a>`;
          h += `<span style="color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.assetName}">${r.assetName.slice(0,40)}</span>`;
          h += `<span style="color:#06b6d4;font-size:.6rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.modality}">${(r.modality||'').replace(/_/g,' ')}</span>`;

          h += `<span style="text-align:right;color:#f97316">${fmtV(r.tam)}</span>`;
          h += `<span style="text-align:right;color:#a855f7;font-weight:700">${fmtV(r.som)}</span>`;
          h += `<span style="text-align:right;color:#22c55e">${r.salesM>0?fmtV(r.salesM):'—'}</span>`;
          h += `<span style="text-align:right;color:var(--text2)">${r.peakYear}</span>`;
          h += `</div>`;
        });
        h += '</div>';
      }

      if(sorted.length===0){
        h+='<div style="padding:18px;color:var(--text2);text-align:center;font-size:.85rem">No targets match the current filter combination.</div>';
      } else {
        h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;padding:4px 0">';
        sorted.forEach(([tgt,v])=>{

          const uniqueL1s = [...new Set(diseaseL1s)];

          const isActive = !!(filterSignal && filterSignal.kind==='target' && filterSignal.targetName===tgt);
          const borderCol = isActive ? '#ec4899' : '#ffffff14';
          const tip = `Companies: ${v.companies.join(', ')}\nModalities: ${v.modalities.join(', ')}\nAreas: ${v.areas.join(', ')}`;
          const isExpanded = targetExpanded === tgt;
          const finalBorder = isExpanded ? '#ec4899' : borderCol;
          h+=`<div onclick="window._targetExpand('${tgt}')" title="${tip.replace(/"/g,'&quot;')}" style="background:${isExpanded?'#1a0e16':'#0f1117'};border:1px solid ${finalBorder};border-radius:7px;padding:9px 11px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:border-color .15s" onmouseover="this.style.borderColor='#ec4899'" onmouseout="this.style.borderColor='${finalBorder}'">`;
          h+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
          h+=`<span style="font-family:var(--mono);font-weight:800;font-size:.82rem;color:#ec4899">${tgt}</span>`;
          h+=`<span style="font-size:.58rem;color:#6b7080;font-family:var(--mono)">${v.assetCount} asset${v.assetCount===1?'':'s'}</span>`;
          h+=`</div>`;
          // Market-size strip (pre-click): TAM (deduped) | SOM | observed sales | CAGR
          const fmtCardB = x => x >= 1000 ? '$'+(x/1000).toFixed(1)+'B' : (x>0?'$'+Math.round(x)+'M':'—');
          const tT = v.totalTAM || 0, tS = v.totalSOM || 0, tSales = v.totalSales || 0, tCAGR = v.cagrPct || 0;
          h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;font-family:var(--mono);font-size:.58rem;padding:4px 0;border-top:1px solid #ffffff08;border-bottom:1px solid #ffffff08">`;
          h+=`<div><div style="color:#6b7080;font-size:.5rem;text-transform:uppercase;letter-spacing:.4px">TAM</div><div style="color:#f97316;font-weight:700">${fmtCardB(tT)}</div></div>`;
          h+=`<div><div style="color:#6b7080;font-size:.5rem;text-transform:uppercase;letter-spacing:.4px">SOM</div><div style="color:#a855f7;font-weight:700">${fmtCardB(tS)}</div></div>`;
          h+=`<div><div style="color:#6b7080;font-size:.5rem;text-transform:uppercase;letter-spacing:.4px">Sales</div><div style="color:${tSales>0?'#22c55e':'#6b7080'};font-weight:700">${fmtCardB(tSales)}</div></div>`;
          h+=`<div><div style="color:#6b7080;font-size:.5rem;text-transform:uppercase;letter-spacing:.4px">CAGR</div><div style="color:${tCAGR>0?'#06b6d4':'#6b7080'};font-weight:700">${tCAGR>0?tCAGR.toFixed(1)+'%':'—'}</div></div>`;
          h+=`</div>`;
          h+=`<div style="display:flex;gap:10px;font-size:.62rem;font-family:var(--mono);color:#6b7080">`;
          h+=`<span><span style="color:#e2e4ea;font-weight:700">${v.companies.length}</span> co</span>`;
          h+=`<span><span style="color:${mmColor};font-weight:700">${v.modalityClassCount}</span> mod class${v.modalityClassCount===1?'':'es'}</span>`;
          h+=`<span><span style="color:${mdColor};font-weight:700">${v.areaCount}</span> disease${v.areaCount===1?'':'s'}</span>`;
          h+=`</div>`;
          if(v.modalityClasses.length){
            h+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:2px">`;
            v.modalityClasses.slice(0,4).forEach(mc=>{
              h+=`<span style="padding:1px 5px;border-radius:3px;background:#06b6d418;color:#06b6d4;font-size:.55rem;font-family:var(--mono);font-weight:600">${mc.replace(/_/g,' ')}</span>`;
            });
            if(v.modalityClasses.length>4) h+=`<span style="font-size:.55rem;color:#6b7080">+${v.modalityClasses.length-4}</span>`;
            h+=`</div>`;
          }
          if(uniqueL1s.length){
            h+=`<div style="display:flex;gap:3px;flex-wrap:wrap">`;
            uniqueL1s.slice(0,4).forEach(l1=>{
              h+=`<span style="padding:1px 5px;border-radius:3px;background:#f9731618;color:#f97316;font-size:.55rem;font-family:var(--mono);font-weight:600">${l1.replace(/_/g,' ')}</span>`;
            });
            if(uniqueL1s.length>4) h+=`<span style="font-size:.55rem;color:#6b7080">+${uniqueL1s.length-4}</span>`;
            h+=`</div>`;
          }
          h+=`</div>`;
        });
        h+='</div>';
      }

      h+='</div>'; // close card
    })();
    // ============== /TARGET EXPLORER ==============

    h+=`<div class="card${secCls('sec-range')}" id="sec-range"><div class="card-title" ${titleAttrsFlex('sec-range')}><div>${chev('sec-range')}<div class="dot" style="background:linear-gradient(180deg,#3b82f6,#8b5cf6);display:inline-block;vertical-align:middle;margin-right:8px"></div>Market Valuation Overview</div>`;
    h+='<div style="display:flex;gap:4px">';
    h+=`<span class="fchip ${stripSort==='base'?'active':''}" onclick="window._stripSort('base')" style="padding:2px 8px;font-size:.65rem">Base Upside</span>`;
    h+=`<span class="fchip ${stripSort==='rr'?'active':''}" onclick="window._stripSort('rr')" style="padding:2px 8px;font-size:.65rem">R/R Ratio</span>`;
    h+=`<span class="fchip ${stripSort==='optionality'?'active':''}" onclick="window._stripSort('optionality')" style="padding:2px 8px;font-size:.65rem">Optionality</span>`;
    if(hasPurity)h+=`<span class="fchip ${stripSort==='purity'?'active':''}" onclick="window._stripSort('purity')" style="padding:2px 8px;font-size:.65rem;${stripSort==='purity'?'background:#a855f722;border-color:#a855f7;color:#d8b4fe':''}">Purity</span>`;
    h+='</div></div>';
    h+='<div class="card-sub">Upside / downside to scenario targets · Dots right of 0% = upside</div>';
    // Bucket counts (5 colored boxes -- click to filter rows by valuation bucket)
    h+=bucketStatsHtml;
    h+=buildRangeStrip(visibleRows,activeArea,filterRare,stripSort,purityMode);

    // Optionality card — total TAM (raw vs risk-adjusted)
    const optRows=[...visibleRows].filter(r=>r.meta.optionality>10&&r.meta.totalTAM>0&&!(r.evUSD>0&&r.meta.totalWTD>0&&r.evUSD>r.meta.totalWTD)).sort((a,b)=>b.meta.optionality-a.meta.optionality);
    if(optRows.length>0){
      const maxRaw=Math.max(...optRows.map(r=>r.meta.totalTAM));
      h+=`<div class="card${secCls('sec-pipeline')}" id="sec-pipeline"><div class="card-title" ${titleAttrs('sec-pipeline')}>${chev('sec-pipeline')}<div class="dot" style="background:linear-gradient(180deg,#f59e0b,#ef4444)"></div>Pipeline Optionality</div>`;
      h+='<div class="card-sub">Total TAM bars (all assets) · Optionality % = pipeline-only leverage (excludes commercial at 100% PoS) · EV marker = current market valuation</div>';
      h+='<div style="padding:8px 0">';
      optRows.slice(0,15).forEach(r=>{
        const raw=r.meta.totalTAM,wtd=r.meta.totalWTD;
        const evB=r.evUSD;
        const rawPct=(raw/maxRaw)*100;
        const wtdPct=(wtd/maxRaw)*100;
        const evPct=Math.min((evB/maxRaw)*100,100);
        const opt=r.meta.optionality;
        const optCol=opt>200?'#ef4444':opt>100?'#f59e0b':'#22c55e';
        const pricedIn=wtd>0?Math.round(evB/wtd*100):0;
        const piCol=pricedIn>80?'#ef4444':pricedIn>40?'#f59e0b':'#22c55e';
        h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">`;
        h+=`<a href="model.html?ticker=${r.ticker}" style="width:48px;text-align:right;font-family:var(--mono);font-weight:700;font-size:.75rem;color:#60a5fa;text-decoration:none">${r.ticker}</a>`;
        h+=`<span style="width:48px;text-align:right;font-family:var(--mono);font-weight:700;font-size:.68rem;color:${optCol}">${opt>=1000?(opt/100).toFixed(0)+'x':opt+'%'}</span>`;
        h+=`<div style="flex:1;position:relative;height:32px">`;
        h+=`<div style="position:absolute;top:0;left:0;height:14px;width:${rawPct}%;background:#f97316;opacity:.25;border-radius:4px" title="Raw TAM: $${raw.toFixed(0)}B"></div>`;
        h+=`<div style="position:absolute;top:0;left:0;height:14px;width:${rawPct}%;border:1.5px solid #f9731666;border-radius:4px;box-sizing:border-box"></div>`;
        h+=`<div style="position:absolute;top:17px;left:0;height:14px;width:${wtdPct}%;background:#22c55e;opacity:.35;border-radius:4px" title="Risk-adj TAM: $${wtd.toFixed(1)}B"></div>`;
        h+=`<div style="position:absolute;top:17px;left:0;height:14px;width:${wtdPct}%;border:1.5px solid #22c55e66;border-radius:4px;box-sizing:border-box"></div>`;
        if(evPct>0){
          h+=`<div style="position:absolute;top:-3px;left:${evPct}%;width:2.5px;height:38px;background:#fff;border-radius:1px;z-index:2;opacity:.9" title="Current EV: $${evB.toFixed(1)}B"></div>`;

      // Cluster-overlap detection: flag catalysts whose options expiry window likely

      }
      const hiddenCount=allCatsRaw.length-allCats.length;

      const yMin=allCats.length>0?Math.min(-30,...allCats.map(c=>c.expectedReturn),-10):-30;
      const BREAK=150;
      const yMaxAbove=allCats.length>0?Math.max(BREAK+50,...allCats.map(c=>c.swingPct)):BREAK+50;

      const yPct=v=>{
        if(v<=BREAK) return Math.max(0,Math.min(BREAK_PCT,(v-yMin)/(BREAK-yMin)*BREAK_PCT));

      };
      h+=`<div class="card${secCls('sec-catalyst')}" id="sec-catalyst"><div class="card-title" ${titleAttrsFlex('sec-catalyst')}><div>${chev('sec-catalyst')}<div class="dot" style="background:linear-gradient(180deg,#22c55e,#ef4444);display:inline-block;vertical-align:middle;margin-right:8px"></div>Catalyst Asymmetry Map</div>`;

      h+='</div>';
      const filtersActive=catMatMin>0||catERMin!=null||catERMax!=null||catTickerFilter!=null;

      }
      h+=`<span style="margin-left:auto;opacity:.7">${allCats.length} of ${timeFiltered.length} shown</span>`;
      h+='</div>';
      // Chart area — wrap in a left-gutter container so tick labels and axis titles have room
      h+='<div style="position:relative;margin:16px 0 8px;padding-left:52px;padding-right:8px">';

      h+='<div style="position:absolute;top:8px;left:-46px;font-size:.55rem;color:#f97316;font-family:var(--mono);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;letter-spacing:.05em;font-weight:600">Swing %</div>';
      h+='<div style="position:absolute;bottom:8px;left:-46px;font-size:.55rem;color:#60a5fa;font-family:var(--mono);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;letter-spacing:.05em;font-weight:600">E[Return]</div>';
      h+='<div style="position:absolute;bottom:-18px;right:0;font-size:.55rem;color:var(--text2);font-family:var(--mono)">Days to catalyst</div>';
      // X grid — adaptive tick spacing
      const tickStep=maxDays<=30?7:maxDays<=60?14:maxDays<=90?15:maxDays<=180?30:maxDays<=365?60:90;

        const x=d/maxDays*100;
        h+=`<div style="position:absolute;bottom:0;left:${x}%;width:1px;height:100%;background:#ffffff06"></div>`;

      for(let v=Math.ceil(yMin/25)*25;v<=BREAK;v+=25){

        h+=`<div style="position:absolute;bottom:${yp}%;left:0;width:100%;height:${isZero?'1.5px':'1px'};background:${isZero?'#ffffff28':'#ffffff06'}"></div>`;
        h+=`<div style="position:absolute;bottom:${yp}%;left:-38px;width:32px;text-align:right;font-size:.5rem;color:${isZero?'#ffffff66':'var(--text2)'};font-family:var(--mono);transform:translateY(50%)">${v>0?'+':''}${v}%</div>`;

      h+=`<path d="M0,5 L50,2 L100,8 L150,2 L200,8 L250,2 L300,8 L350,2 L400,8 L450,2 L500,8 L550,2 L600,8 L650,2 L700,8 L750,2 L800,8 L850,2 L900,8 L950,2 L1000,5" stroke="#ffffff22" stroke-width="2" fill="none"/>`;
      h+=`</svg>`;
      h+=`<div style="position:absolute;bottom:${brkY}%;left:-38px;width:32px;text-align:right;font-size:.5rem;color:#f59e0b;font-family:var(--mono);transform:translateY(50%);font-weight:700">${BREAK}%</div>`;
      // Y grid — above break
      const aboveStep=Math.max(100,Math.ceil((yMaxAbove-BREAK)/3/100)*100);
      for(let v=BREAK+aboveStep;v<=yMaxAbove;v+=aboveStep){
        const yp=yPct(v);
        h+=`<div style="position:absolute;bottom:${yp}%;left:0;width:100%;height:1px;background:#ffffff04"></div>`;
        h+=`<div style="position:absolute;bottom:${yp}%;left:-38px;width:32px;text-align:right;font-size:.45rem;color:var(--text2);font-family:var(--mono);transform:translateY(50%);opacity:.5">${v}%</div>`;
      }
      // Timeline X positions with collision nudging for same-day catalysts
      const catPos=allCats.map(c=>({c,x:Math.min(Math.max(c.daysOut/maxDays*100,1),98)}));
      catPos.sort((a,b)=>a.x-b.x);
      const MIN_GAP=3.5;
      for(let pass=0;pass<8;pass++){
        let moved=false;
        for(let i=1;i<catPos.length;i++){
          if(catPos[i].x-catPos[i-1].x<MIN_GAP){
            const shift=(MIN_GAP-(catPos[i].x-catPos[i-1].x))/2;
            catPos[i-1].x-=shift;
            catPos[i].x+=shift;
            moved=true;
          }

        if(!moved)break;
      }
      catPos.forEach(p=>{p.x=Math.max(1,Math.min(98,p.x));});

      // Materiality → radius (bottom E[R] dot size)
      function matRadius(mat){
        const m=Math.max(0,Math.min(100,mat||0));
        return Math.max(3,3+Math.sqrt(m)*1.4); // 3px at 0%, ~17px at 100%
      }
      function matOpacity(mat){
        if(mat<5)return 0.32;
        if(mat<20)return 0.60;
        if(mat<50)return 0.85;
        return 1.0;
      }

      // === Label placement: greedy anti-collision in chart-% space ===
      // Tracks occupied rectangles and tries candidate Y positions in order of
      // preference (above top dot first, then below bottom dot, alternating by
      // parity for variety). Falls back to first candidate if every slot is
      // taken. Leader line is drawn at render time when label is displaced > 5%.
      const labelPositions=new Array(catPos.length);
      const placedRects=[];
      const LABEL_H_PCT=3.2;
      function estLabelWidth(c){
        const txt=c.ticker+(c.swingPct>BREAK?' '+c.swingPct+'%':'')+(c.options&&c.options.direction&&c.options.direction!=='neutral'?' \u25B2':'');
        return Math.max(4.0,txt.length*0.85);
      }
      function rectsOverlap(a,b){
        const pad=0.5;
        return !(a.x+a.w+pad<b.x||b.x+b.w+pad<a.x||a.y+a.h+pad<b.y||b.y+b.h+pad<a.y);
      }
      catPos.forEach((p,idx)=>{
        const c=p.c;
        const w=estLabelWidth(c);
        const ySwing=yPct(c.swingPct);
        const yER=yPct(c.expectedReturn);
        const topY=Math.max(ySwing,yER);
        const botY=Math.min(ySwing,yER);
        const rBot=matRadius(c.materiality||0);
        // Build candidate Y positions: alternate above/below starting from dot edge,
        // pushing outward. Parity on idx just adds variety to break ties.
        const cands=[];
        const startAbove=idx%2===0;
        for(let step=0;step<10;step++){
          const dy=3+step*LABEL_H_PCT;
          if(startAbove){
            cands.push({y:topY+dy,side:'top'});
            cands.push({y:botY-dy-rBot/3,side:'bot'});
          }else{
            cands.push({y:botY-dy-rBot/3,side:'bot'});
            cands.push({y:topY+dy,side:'top'});
          }
        }
        let chosen=null;
        for(const cand of cands){
          if(cand.y<2||cand.y>97)continue;
          const rect={x:p.x-w/2,y:cand.y-LABEL_H_PCT/2,w,h:LABEL_H_PCT};
          if(!placedRects.some(r=>rectsOverlap(rect,r))){
            placedRects.push(rect);
            chosen={...cand,displaced:Math.abs(cand.y-(cand.side==='top'?topY:botY))>6};
            break;
          }
        }
        if(!chosen){
          // Fallback — take first candidate, accept overlap
          chosen={...cands[0],displaced:true};
        }
        labelPositions[idx]=chosen;
      });

      catPos.forEach(({c,x},idx)=>{
        const ySwing=yPct(c.swingPct);
        const yER=yPct(c.expectedReturn);
        const er=c.expectedReturn;
        // Color tercile — simpler and cleaner
        const col=er>10?'#22c55e':er>-10?'#6b7080':'#ef4444';
        const op=matOpacity(c.materiality||0);
        const rBot=matRadius(c.materiality||0);
        const rTop=5; // top swing dot fixed small
        const optSwingTT=c.options&&c.options.impliedMove?(c.options.impliedMove*2)+'%':'n/a';
        const volEdgeTT=c.options&&c.options.impliedMove&&c.swingPct?(c.swingPct/(c.options.impliedMove*2)).toFixed(1)+'x':'n/a';
        // Shared tooltip strings
        const swingTT=`${c.ticker}: ${c.title}\nDays: ${c.daysOut} | Swing: ${c.swingPct}% | Mkt: ${optSwingTT} | Vol Edge: ${volEdgeTT}\nE[R]: ${c.expectedReturn>0?'+':''}${c.expectedReturn}% | PoS: ${c.yourPoS}%\nIf win: ${c.successMove>0?'+':''}${c.successMove}% | If fail: ${c.failMove>0?'+':''}${c.failMove}%\nMateriality: ${c.materiality}%`;
        const erTT=`${c.ticker}: E[R]=${c.expectedReturn>0?'+':''}${c.expectedReturn}% | Materiality ${c.materiality}%`;

  window._sort=function(k){if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=-1;}doSort();render();};

  window._fL4=function(l4){if(l4===null){filterL4.clear();}else if(filterL4.has(l4)){filterL4.delete(l4);}else{filterL4.add(l4);}render();};

    _mktSearchDebounce=setTimeout(()=>{

      render();

      requestAnimationFrame(()=>{
        const el=document.getElementById('_mktSearchInput');

      });

    render();
  };
  window._setCatERMin=function(v){
    const n=parseInt(v);
    catERMin=isNaN(n)?null:n;
    // Don't allow min to cross max
    if(catERMax!=null&&catERMin!=null&&catERMin>catERMax)catERMin=catERMax;
    render();
  };
  window._setCatERMax=function(v){
    const n=parseInt(v);
    catERMax=isNaN(n)?null:n;
    if(catERMin!=null&&catERMax!=null&&catERMax<catERMin)catERMax=catERMin;
    render();
  };
  window._resetCatFilters=function(){
    catMatMin=0;
    catERMin=null;
    catERMax=null;
    catTickerFilter=null;
    render();
  };
  window._setCatSort=function(key){
    if(catSortKey===key){
      catSortDir=catSortDir==='desc'?'asc':'desc';
    }else{
      catSortKey=key;
      // Default direction: ascending for text columns, descending for numeric
      catSortDir=(key==='ticker'||key==='title')?'asc':'desc';
    }
    render();
  };
  window._purityMode=function(){purityMode=purityMode==='wtd'?'raw':'wtd';render();};
  window._catY=function(m){catYAxis=m;render();};
  window._fClear=function(){filterL1.clear();filterL2.clear();filterL3.clear();filterL4.clear();filterPhase=null;filterRare=null;filterMod1=null;filterMod2=null;filterMod3=null;activeFilter=null;stripSort='base';filterMcap.clear();filterSignal=null;render();renderSignalBadges();};
  window._fMcap=function(k){if(filterMcap.has(k))filterMcap.delete(k);else filterMcap.add(k);render();};
  window._setCorr=function(v){window._corrVal=+v;render();};
  window._setOvr=function(tk,v){if(!window._manualOvr)window._manualOvr={};if(v==='auto')delete window._manualOvr[tk];else window._manualOvr[tk]=+v;render();};
  // Portfolio Kelly handlers
  window._kellyToggle=function(){kellyOpen=!kellyOpen;render();};
  window._kellyRun=function(){
    if(kellyRunning) return;
    if(!kellyUniverse || kellyUniverse.length<2){
      alert('Kelly needs at least 2 names. Relax your filters.');
      return;
    }
    kellyRunning=true; render();
    // Snapshot universe size at run-time so stale-detection works if user filters again
    const universeSnap=kellyUniverse.slice();
    const universeTickers=new Set(universeSnap.map(r=>r.ticker));
    setTimeout(()=>{
      try{
        kellyResult=runPortfolioKelly(universeSnap, configs, kellyOpts);
        if(kellyResult){ kellyResult._universeTickers=universeTickers; kellyResult._universeSize=universeSnap.length; }
      }
      catch(e){ console.error('Kelly failed',e); kellyResult=null; }
      kellyRunning=false; render();
    },30);
  };
  window._kellyFrac=function(v){kellyOpts.kFrac=+v; render();};
  window._kellyMaxPos=function(v){kellyOpts.maxPos=+v/100; render();};
  window._kellyMaxL2=function(v){kellyOpts.maxL2=+v/100; render();};
  window._secToggle=function(id){collapsedSec[id]=!collapsedSec[id]; render();};
  window._navTo=function(sec){activeNavSec=sec; render(); window.scrollTo({top:0,behavior:'smooth'});};
  window._toggleDrawer=function(){drawerOpen=!drawerOpen; render();};
  // ESC closes drawer
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&drawerOpen){drawerOpen=false;render();}});
  // Click anywhere on the title bar to toggle, UNLESS the click was on an
  // interactive child (chip/select/input/a/button, or any element with its
  // own onclick attribute). Walks up from event.target until it hits the card-title.
  window._secTitleClick=function(ev,id){
    let el=ev.target;
    while(el && !(el.classList && el.classList.contains('card-title'))){
      if(el.onclick || el.tagName==='SELECT' || el.tagName==='INPUT' || el.tagName==='BUTTON' || el.tagName==='A' || el.tagName==='OPTION'){
        return; // interactive child → don't toggle
      }
      el=el.parentElement;
    }
    collapsedSec[id]=!collapsedSec[id]; render();
  };
  // Catalyst-aware Kelly handlers
  window._catKellyToggle=function(){catKellyOpen=!catKellyOpen; render();};
  window._catKellyTab=function(t){catKellyTab=t; render();};
  window._catKellyHorizon=function(v){catKellyOpts.horizonM=+v; render();};
  window._catKellyFrac=function(v){catKellyOpts.kFrac=+v; render();};
  window._catKellyInfluence=function(v){catKellyOpts.catInfluence=+v/100; render();};
  window._catKellySigma=function(v){catKellyOpts.sigma=+v; render();};
  window._ddOpen=function(){document.getElementById('ddList')?.classList.add('open');};
  window._ddClose=function(){document.getElementById('ddList')?.classList.remove('open');};
  window._ddFilter=function(q){const dd=document.getElementById('ddList');if(!dd)return;dd.classList.add('open');
    dd.querySelectorAll('.dd-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});};

  render();

  // Hash-based deep links (e.g. model.html target chip -> index.html#target=CD19)
  (function applyHashFilter(){
    const h=(window.location.hash||"").replace(/^#/,"");
    if(!h)return;
    const parts=Object.fromEntries(h.split("&").map(p=>{const [k,v]=p.split("=");return [k,decodeURIComponent(v||"")];}));
    if(parts.target && targetsIdx[parts.target]){
      // Defer one tick so render() finishes before filter side-effects
      setTimeout(()=>window._filterByTarget(parts.target),0);
    }
  })();

  // Background: fetch live prices for any tickers missing from prices.json cache
  (async()=>{
    const tickers=Object.keys(configs).filter(tk=>!livePrices[tk]);
    if(tickers.length===0){pricesLoaded=true;return;}
    const BATCH=6;
    let updated=0;
    for(let i=0;i<tickers.length;i+=BATCH){
      const batch=tickers.slice(i,i+BATCH);
      const results=await Promise.all(batch.map(tk=>{
        const yt=configs[tk].company.yahooTicker||tk;
        return fetchLivePrice(yt).then(r=>r?[tk,r]:null);
      }));
      results.filter(Boolean).forEach(([tk,lp])=>{livePrices[tk]=lp;updated++;});
      if(updated>0){rows=buildRows();doSort();render();populateTopbar();renderSignalBadges();}
    }
    if(updated>0){pricesLoaded=true;rows=buildRows();doSort();render();populateTopbar();renderSignalBadges();}
  })();
}
main();
// Scroll observer for nav button highlighting
(function(){
  const secs=['sec-markets','sec-range','sec-pipeline','sec-catalyst','sec-portfolio','sec-table'];
  const btns=document.querySelectorAll('#topNav button');
  if(!btns.length)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        btns.forEach(b=>b.classList.remove('active'));
        const btn=[...btns].find(b=>b.dataset.sec===en.target.id);
        if(btn)btn.classList.add('active');
      }
    });
  },{rootMargin:'-30% 0px -50% 0px',threshold:0});
  // Observe once sections exist (after first render)
  setTimeout(()=>{secs.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});},2000);
})();
</script>
</body>
